<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 70px; padding: 12px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 28px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 18px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 20px 30px 0; }
  .cols { flex: 1; display: flex; gap: 12px; align-items: flex-end; }
  .col { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .col-card { width: 100%; border-radius: 6px 6px 0 0; display: flex; flex-direction: column; padding: 14px; }
  .col-num { font-size: 32px; font-weight: 900; color: #fff; text-align: center; margin-bottom: 6px; }
  .col-title { font-size: 14px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 8px; }
  .col-desc { font-size: 11px; color: rgba(255,255,255,0.85); line-height: 1.6; text-align: center; }
  .timeline { height: 50px; display: flex; align-items: center; flex-shrink: 0; position: relative; margin: 0 -30px; padding: 0 30px; background: #f0f4fa; }
  .tl-line { position: absolute; left: 30px; right: 30px; top: 50%; height: 2px; background: #1a3a6b; }
  .tl-dots { display: flex; width: 100%; justify-content: space-between; position: relative; z-index: 1; }
  .tl-dot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tl-dot-circle { width: 12px; height: 12px; border-radius: 50%; background: #1a3a6b; }
  .tl-dot-label { font-size: 11px; color: #1a3a6b; font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">项目规划 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="cols">
      <!-- 列1：最矮，深蓝 -->
      <div class="col">
        <div class="col-card" style="background:#1a3a6b; height:200px;">
          <div class="col-num">01</div>
          <div class="col-title">市场调研</div>
          <div class="col-desc">按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</div>
        </div>
      </div>
      <!-- 列2：稍高，中深蓝 -->
      <div class="col">
        <div class="col-card" style="background:#2a5090; height:270px;">
          <div class="col-num">02</div>
          <div class="col-title">营销策划</div>
          <div class="col-desc">按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</div>
        </div>
      </div>
      <!-- 列3：中等，中蓝 -->
      <div class="col">
        <div class="col-card" style="background:#3a6abf; height:340px;">
          <div class="col-num">03</div>
          <div class="col-title">执行监控</div>
          <div class="col-desc">按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</div>
        </div>
      </div>
      <!-- 列4：较高，浅中蓝 -->
      <div class="col">
        <div class="col-card" style="background:#5a8ad4; height:410px;">
          <div class="col-num">04</div>
          <div class="col-title">细节优化</div>
          <div class="col-desc">按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</div>
        </div>
      </div>
      <!-- 列5：最高，浅蓝灰 -->
      <div class="col">
        <div class="col-card" style="background:#8ab0d8; height:480px;">
          <div class="col-num">05</div>
          <div class="col-title">总结复盘</div>
          <div class="col-desc">按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</div>
        </div>
      </div>
    </div>
    <!-- 底部时间轴 -->
    <div class="timeline">
      <div class="tl-line"></div>
      <div class="tl-dots">
        <div class="tl-dot"><div class="tl-dot-circle"></div><div class="tl-dot-label">2024.4</div></div>
        <div class="tl-dot"><div class="tl-dot-circle"></div><div class="tl-dot-label">2024.5</div></div>
        <div class="tl-dot"><div class="tl-dot-circle"></div><div class="tl-dot-label">2024.6</div></div>
        <div class="tl-dot"><div class="tl-dot-circle"></div><div class="tl-dot-label">2024.7</div></div>
        <div class="tl-dot"><div class="tl-dot-circle"></div><div class="tl-dot-label">2024.8</div></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
