<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 60px; padding: 10px 20px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 28px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 18px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 12px 20px 0; min-height:0; }
  .top-nodes { background: #f0f4fa; border-radius: 10px; padding: 16px 40px; display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 12px; flex-shrink: 0; }
  .node-circle { width: 110px; height: 110px; border-radius: 50%; background: #1a3a6b; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .node-circle .nc-title { font-size: 17px; font-weight: 900; color: #fff; text-align: center; line-height: 1.3; }
  .arrow-h { flex: 1; display: flex; align-items: center; padding: 0 10px; position: relative; }
  .arrow-h-line { flex: 1; height: 2px; background: #1a3a6b; position: relative; }
  .arrow-h-line:after { content: ""; position: absolute; right: -8px; top: -5px; border-left: 12px solid #1a3a6b; border-top: 6px solid transparent; border-bottom: 6px solid transparent; }
  .arrow-label { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #1a3a6b; white-space: nowrap; }
  .table-area { flex: 1; display: flex; gap: 12px; min-height:0; }
  .table-col { flex: 1; display: flex; flex-direction: column; }
  .table-head { padding: 12px 16px; font-size: 15px; font-weight: 700; color: #fff; border-radius: 4px 4px 0 0; }
  .table-body { flex: 1; border: 1.5px solid #dde4f0; border-top: none; padding: 12px; display: flex; flex-direction: column; gap: 14px; }
  .table-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #444; line-height: 1.6; }
  .table-item:before { content: "\2022"; color: #1a3a6b; font-size: 14px; flex-shrink: 0; }
  .footer { background: #1a3a6b; color: #fff; text-align: center; padding: 12px; font-size: 13px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">项目规划 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="top-nodes">
      <div class="node-circle"><div class="nc-title">市场<br>调研</div></div>
      <div class="arrow-h">
        <span class="arrow-label">研究用户倾向内容</span>
        <div class="arrow-h-line"></div>
      </div>
      <div class="node-circle"><div class="nc-title">制定<br>方案</div></div>
      <div class="arrow-h">
        <span class="arrow-label">研究用户倾向内容</span>
        <div class="arrow-h-line"></div>
      </div>
      <div class="node-circle"><div class="nc-title">产品<br>投放</div></div>
    </div>
    <div class="table-area">
      <div class="table-col">
        <div class="table-head" style="background:#1a3a6b;">研究用户倾向内容</div>
        <div class="table-body">
          <div class="table-item">研究用户首次进入的使用情况</div>
          <div class="table-item">研究用户观看直播的使用情况</div>
          <div class="table-item">研究用户如何产生消费动机</div>
        </div>
      </div>
      <div class="table-col">
        <div class="table-head" style="background:#3a6abf;">制定可实施的具体方案</div>
        <div class="table-body">
          <div class="table-item">制定可实施的具体方案</div>
          <div class="table-item">制定可实施的具体方案</div>
          <div class="table-item">制定可实施的具体方案</div>
        </div>
      </div>
      <div class="table-col">
        <div class="table-head" style="background:#8ab0d8;">根据实际情况进行优化</div>
        <div class="table-body">
          <div class="table-item">研究用户首次进入的使用情况</div>
          <div class="table-item">研究用户观看直播的使用情况</div>
          <div class="table-item">研究用户如何产生消费动机</div>
        </div>
      </div>
    </div>
  </div>
  <div class="footer">用户激励与转化 User motivation and transformation</div>
</div>
</body>
</html>
