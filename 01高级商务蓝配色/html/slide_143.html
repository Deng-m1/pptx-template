<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
  }
  .title {
    position: absolute;
    left: 48px;
    top: 31px;
    font-size: 31px;
    line-height: 1;
    font-weight: 900;
    color: #0f458e;
  }
  .subtitle {
    position: absolute;
    right: 48px;
    top: 49px;
    font-size: 19px;
    line-height: 1;
    font-style: italic;
    color: #123f82;
  }
  .top-line {
    position: absolute;
    left: 48px;
    top: 83px;
    width: 1184px;
    height: 2px;
    background: #1b5996;
  }
  .card {
    position: absolute;
    top: 122px;
    width: 282px;
    height: 114px;
    border-radius: 4px;
    color: #fff;
    padding: 22px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card1 { left: 48px; background: #0d47a1; }
  .card2 { left: 348px; background: #5f8fd3; }
  .card3 { left: 648px; background: #8bb6da; }
  .card4 { left: 948px; background: #b8b8b8; }
  .card-label {
    width: 126px;
    flex-shrink: 0;
    font-size: 23px;
    line-height: 1.12;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .card-value {
    font-size: 58px;
    line-height: 1;
    font-weight: 700;
    margin-left: 8px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .panel {
    position: absolute;
    border: 1px solid #ececec;
    border-radius: 8px;
    background: #fff;
  }
  .main-panel {
    left: 48px;
    top: 252px;
    width: 1184px;
    height: 238px;
    padding: 18px 24px 0 24px;
  }
  .main-title {
    text-align: center;
    font-size: 21px;
    color: #7f7f7f;
    margin-bottom: 8px;
  }
  .small-panel {
    top: 506px;
    width: 582px;
    height: 180px;
    padding: 14px 18px 0 18px;
  }
  .small-left { left: 48px; }
  .small-right { left: 650px; }
  .small-title {
    font-size: 19px;
    color: #666;
    margin-bottom: 4px;
  }
  svg text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
</style>
</head>
