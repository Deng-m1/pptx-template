<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .header {
    height: 68px;
    padding: 12px 48px 0;
    border-bottom: 2px solid #153f97;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 32px;
    line-height: 1;
    font-weight: 900;
    color: #153f97;
  }
  .header-sub {
    font-size: 20px;
    line-height: 1;
    color: #153f97;
    font-style: italic;
    margin-top: 10px;
  }
  .body {
    flex: 1;
    display: flex;
    gap: 18px;
    padding: 38px 48px 34px;
  }
  .left-col {
    width: 430px;
    border: 1px solid #e6e8ec;
    padding: 22px 24px 18px;
    display: flex;
    flex-direction: column;
  }
  .pie-title {
    text-align: center;
    font-size: 22px;
    color: #7a7a7a;
    margin-bottom: 12px;
    letter-spacing: 0.2px;
  }
  .pie-wrap {
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pie-legend {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 6px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #666;
    white-space: nowrap;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    flex-shrink: 0;
  }
  .divider {
    height: 1px;
    background: #1b4c95;
    margin: 2px 0 18px;
  }
  .sales-title {
    font-size: 20px;
    font-weight: 900;
    color: #154090;
    margin-bottom: 14px;
  }
  .sales-num {
    font-size: 74px;
    line-height: 0.95;
    font-weight: 900;
    color: #1550ad;
    letter-spacing: 0.5px;
    margin-bottom: 18px;
  }
  .sales-desc {
    font-size: 15px;
    line-height: 1.85;
    color: #8b8b8b;
  }

  .right-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .banner {
    height: 128px;
    background: #153f97;
    display: flex;
    color: #fff;
  }
  .banner-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .banner-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 26px;
    width: 1px;
    height: 76px;
    background: rgba(255,255,255,0.8);
  }
  .banner-label {
    font-size: 17px;
    line-height: 1;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .banner-value {
    font-size: 52px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: 0.5px;
  }
  .banner-value.small {
    font-size: 50px;
  }
  .banner-value.quarter {
    font-size: 58px;
  }

  .chart-box {
    flex: 1;
    border: 1px solid #e6e8ec;
    padding: 26px 24px 16px;
    display: flex;
    flex-direction: column;
  }
  .chart-title {
    text-align: center;
    font-size: 18px;
    color: #707070;
    margin-bottom: 10px;
  }
  .chart-area {
    flex: 1;
  }
  .chart-legend {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 8px;
  }
  .y-label { font-size: 12px; fill: #777; }
  .x-label { font-size: 12px; fill: #666; }
  .grid { stroke: #d9dee6; stroke-width: 1; }
</style>
</head>
