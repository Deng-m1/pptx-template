<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; padding: 14px 24px; gap: 14px; }
  .left-col { width: 380px; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .pie-title { font-size: 14px; color: #888; text-align: center; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .divider { border: none; border-top: 1px solid #eee; }
  .stat-label { font-size: 16px; font-weight: 700; color: #1a3a6b; }
  .stat-num { font-size: 40px; font-weight: 900; color: #1a3a6b; }
  .stat-desc { font-size: 11px; color: #666; line-height: 1.6; }
  .right-col { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .top-banner { background: #1a3a6b; border-radius: 4px; padding: 14px 20px; display: flex; gap: 0; }
  .banner-item { flex: 1; display: flex; flex-direction: column; gap: 4px; border-right: 1px solid rgba(255,255,255,0.2); padding: 0 20px; }
  .banner-item:first-child { padding-left: 0; }
  .banner-item:last-child { border-right: none; }
  .banner-label { font-size: 14px; color: rgba(255,255,255,0.8); }
  .banner-num { font-size: 32px; font-weight: 900; color: white; }
  .chart-box { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; }
  .chart-title { font-size: 13px; color: #888; text-align: center; margin-bottom: 8px; }
  .chart-legend { display: flex; gap: 12px; justify-content: center; margin-top: 6px; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">部门销售业绩汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="left-col">
      <div class="pie-title">部门销量占比分析</div>
      <svg width="100%" height="220" viewBox="0 0 300 220">
        <!-- Pie chart: 40% dark blue, 20% medium blue, 30% light blue, 10% lightest -->
        <!-- 40%: 0 to 144deg -->
        <path d="M 150,110 L 150,30 A 80,80 0 0,1 219,62 Z" fill="#1a3a6b"/>
        <!-- 20%: 144 to 216deg -->
        <path d="M 150,110 L 219,62 A 80,80 0 0,1 219,158 Z" fill="#3a6abf"/>
        <!-- 30%: 216 to 324deg -->
        <path d="M 150,110 L 219,158 A 80,80 0 0,1 81,158 Z" fill="#6a9ac4"/>
        <!-- 10%: 324 to 360deg -->
        <path d="M 150,110 L 81,158 A 80,80 0 0,1 150,30 Z" fill="#c0d4e8"/>
        <!-- Labels -->
        <text x="185" y="90" font-size="14" font-weight="700" fill="white">40%</text>
        <text x="210" y="130" font-size="14" font-weight="700" fill="white">20%</text>
        <text x="130" y="175" font-size="14" font-weight="700" fill="white">30%</text>
        <text x="95" y="100" font-size="14" font-weight="700" fill="#555">10%</text>
      </svg>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>电商1部</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>电商2部</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6a9ac4;"></div>电商3部</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c0d4e8;"></div>电商4部</div>
      </div>
      <hr class="divider">
      <div class="stat-label">电商部总销售额</div>
      <div class="stat-num">¥ 668320</div>
      <div class="stat-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值，确保数据的准确性和可靠性。</div>
    </div>
    <div class="right-col">
      <div class="top-banner">

        </div>

        </div>
        <div class="banner-item">
          <span class="banner-label">主要增长时间</span>

        </div>
      </div>

        </svg>
        <div class="chart-legend">

</div>
</body>
</html>
