<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .header {
    height: 84px;
    padding: 18px 48px 0;
    border-bottom: 2px solid #11489c;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 33px;
    line-height: 1;
    font-weight: 900;
    color: #11489c;
    letter-spacing: 0.2px;
  }
  .header-sub {
    font-size: 20px;
    line-height: 1;
    color: #11489c;
    font-style: italic;
    margin-top: 8px;
  }
  .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 48px 0;
  }
  .top-row {
    display: flex;
    align-items: flex-start;
    gap: 28px;
    margin-bottom: 12px;
  }
  .sub-title {
    flex-shrink: 0;
    font-size: 22px;
    line-height: 1.1;
    font-weight: 900;
    color: #11489c;
    margin-top: 2px;
  }
  .sub-desc {
    width: 860px;
    font-size: 14px;
    line-height: 1.9;
    color: #8c8c8c;
    letter-spacing: 0.1px;
  }
  .charts-row {
    display: flex;
    gap: 14px;
    height: 300px;
    margin-bottom: 12px;
  }
  .chart-box {
    flex: 1;
    border: 1px solid #e7e7e7;
    padding: 18px 18px 12px;
    display: flex;
    flex-direction: column;
  }
  .chart-title {
    font-size: 18px;
    color: #6d6d6d;
    text-align: center;
    margin-top: 2px;
    margin-bottom: 6px;
  }
  .axis-text {
    font-size: 11px;
    fill: #777;
  }
  .x-text {
    font-size: 11px;
    fill: #666;
  }
  .grid {
    stroke: #dfe3e8;
    stroke-width: 1;
  }
  .bottom-cards {
    display: flex;
    gap: 14px;
    flex: 1;
    min-height: 120px;
  }
  .stat-card {
    flex: 1;
    position: relative;
    overflow: hidden;
    padding: 14px 18px 12px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .card-num {
    font-size: 38px;
    line-height: 1;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.4px;
    margin-bottom: 8px;
  }
  .card-label {
    font-size: 19px;
    line-height: 1.25;
    color: rgba(255,255,255,0.98);
    margin-bottom: 10px;
  }
  .card-sub {
    font-size: 14px;
    line-height: 1.2;
    color: rgba(255,255,255,0.95);
  }
  .card-arrow {
    position: absolute;
    right: 8px;
    bottom: 8px;
    width: 78px;
    height: 62px;
    opacity: 0.96;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="header-title">个人业绩汇报 Powerpoint Template</div>
    <div class="header-sub">Work Arrangement</div>
  </div>

  <div class="body">
    <div class="top-row">
      <div class="sub-title">个人年度销售报告概述</div>
      <div class="sub-desc">报告旨在总结我在过去一年内的销售表现，并分析关键趋势及其对业务的影响。在此期间，我致力于达成销售目标，不断优化销售策略以提升个人和团队绩效。</div>
    </div>

    <div class="charts-row">
      <div class="chart-box">
        <div class="chart-title">年度总销售额</div>
        <svg width="100%" height="100%" viewBox="0 0 560 300" preserveAspectRatio="none">
          <line class="grid" x1="56" y1="28" x2="540" y2="28"/>
          <line class="grid" x1="56" y1="78" x2="540" y2="78"/>
          <line class="grid" x1="56" y1="128" x2="540" y2="128"/>
          <line class="grid" x1="56" y1="178" x2="540" y2="178"/>
          <line class="grid" x1="56" y1="228" x2="540" y2="228"/>
          <line class="grid" x1="56" y1="272" x2="540" y2="272"/>

          <text class="axis-text" x="45" y="32" text-anchor="end">125</text>
          <text class="axis-text" x="45" y="82" text-anchor="end">100</text>
          <text class="axis-text" x="45" y="132" text-anchor="end">75</text>
          <text class="axis-text" x="45" y="182" text-anchor="end">50</text>
          <text class="axis-text" x="45" y="232" text-anchor="end">25</text>
          <text class="axis-text" x="45" y="276" text-anchor="end">0</text>

          <rect x="98"  y="78"  width="52" height="194" fill="#143f96"/>
          <rect x="218" y="222" width="52" height="50"  fill="#143f96"/>
          <rect x="338" y="168" width="52" height="104" fill="#143f96"/>
          <rect x="458" y="86"  width="52" height="186" fill="#143f96"/>

          <text class="x-text" x="124" y="292" text-anchor="middle">第一季度</text>
          <text class="x-text" x="244" y="292" text-anchor="middle">第二季度</text>
          <text class="x-text" x="364" y="292" text-anchor="middle">第三季度</text>
          <text class="x-text" x="484" y="292" text-anchor="middle">第四季度</text>
        </svg>
      </div>

      <div class="chart-box">
        <div class="chart-title">年度总销量</div>
        <svg width="100%" height="100%" viewBox="0 0 560 300" preserveAspectRatio="none">
          <line class="grid" x1="56" y1="28" x2="540" y2="28"/>
          <line class="grid" x1="56" y1="78" x2="540" y2="78"/>
          <line class="grid" x1="56" y1="128" x2="540" y2="128"/>
          <line class="grid" x1="56" y1="178" x2="540" y2="178"/>
          <line class="grid" x1="56" y1="228" x2="540" y2="228"/>
          <line class="grid" x1="56" y1="272" x2="540" y2="272"/>

          <text class="axis-text" x="45" y="32" text-anchor="end">100</text>
          <text class="axis-text" x="45" y="82" text-anchor="end">80</text>
          <text class="axis-text" x="45" y="132" text-anchor="end">60</text>
          <text class="axis-text" x="45" y="182" text-anchor="end">40</text>
          <text class="axis-text" x="45" y="232" text-anchor="end">20</text>
          <text class="axis-text" x="45" y="276" text-anchor="end">0</text>

          <path d="M 108 78 C 146 108, 184 176, 228 190 C 270 202, 316 134, 354 128 C 396 122, 442 168, 494 202" fill="none" stroke="#0f4a98" stroke-width="3.2" stroke-linecap="round"/>

          <text class="x-text" x="108" y="292" text-anchor="middle">第一季度</text>
          <text class="x-text" x="228" y="292" text-anchor="middle">第二季度</text>
          <text class="x-text" x="354" y="292" text-anchor="middle">第三季度</text>
          <text class="x-text" x="494" y="292" text-anchor="middle">第四季度</text>
        </svg>
      </div>
    </div>

    <div class="bottom-cards">
      <div class="stat-card" style="background:#143f96;">
        <div class="card-num">320,000</div>
        <div class="card-label">第一季度销售总额</div>
        <div class="card-sub">环比增长10%</div>
        <svg class="card-arrow" viewBox="0 0 78 62">
          <path d="M8 54 C 28 54, 40 48, 49 37 C 55 29, 58 22, 59 14" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
          <path d="M49 18 L61 11 L66 25" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="stat-card" style="background:#5a88c7;">
        <div class="card-num">120,000</div>
        <div class="card-label">第一季度销售总额</div>
        <div class="card-sub">环比增长10%</div>
        <svg class="card-arrow" viewBox="0 0 78 62">
          <path d="M8 54 C 28 54, 40 48, 49 37 C 55 29, 58 22, 59 14" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
          <path d="M49 18 L61 11 L66 25" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="stat-card" style="background:#8bb4d7;">
        <div class="card-num">200,000</div>
        <div class="card-label">第一季度销售总额</div>
        <div class="card-sub">环比增长10%</div>
        <svg class="card-arrow" viewBox="0 0 78 62">
          <path d="M8 54 C 28 54, 40 48, 49 37 C 55 29, 58 22, 59 14" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
          <path d="M49 18 L61 11 L66 25" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="stat-card" style="background:#143f96;">
        <div class="card-num">280,000</div>
        <div class="card-label">第一季度销售总额</div>
        <div class="card-sub">环比增长10%</div>
        <svg class="card-arrow" viewBox="0 0 78 62">
          <path d="M8 54 C 28 54, 40 48, 49 37 C 55 29, 58 22, 59 14" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
          <path d="M49 18 L61 11 L66 25" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>
</div>
</body>
</html>
