<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #fff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .header {
    height: 78px;
    padding: 14px 48px 0;
    border-bottom: 2px solid #1b4a83;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 46px;
    line-height: 1;
    font-weight: 900;
    color: #11438d;
    letter-spacing: -1px;
  }
  .header-sub {
    font-size: 24px;
    line-height: 1;
    color: #11438d;
    font-style: italic;
    margin-top: 8px;
  }
  .body {
    flex: 1;
    padding: 26px 48px 34px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .sub-title {
    font-size: 26px;
    line-height: 1.1;
    font-weight: 800;
    color: #11438d;
    margin-bottom: 2px;
  }
  .top-stats {
    height: 166px;
    border: 1px solid #e3e8ef;
    display: flex;
    background: #fff;
  }
  .stat-item {
    flex: 1;
    padding: 22px 24px 18px;
    border-right: 1px solid #eceff4;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .stat-item:last-child { border-right: none; }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .stat-num {
    font-size: 43px;
    line-height: 1;
    font-weight: 900;
    color: #11438d;
    letter-spacing: -1px;
  }
  .stat-tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 82px;
    height: 38px;
    padding: 0 13px;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-sub {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    margin-bottom: 10px;
    color: #777;
    font-size: 15px;
  }
  .stat-pct {
    font-weight: 700;
  }
  .progress-bar {
    height: 10px;
    width: 100%;
    border-radius: 10px;
    background: #edf2f7;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
  }
  .chart-box {
    flex: 1;
    border: 1px solid #e3e8ef;
    background: #fff;
    padding: 14px 16px 12px;
    display: flex;
    flex-direction: column;
  }
  .chart-title {
    font-size: 18px;
    line-height: 1;
    color: #8b8b8b;
    text-align: center;
    margin: 4px 0 6px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="header-title">平台数据分析 Powerpoint Template</div>
    <div class="header-sub">Work Arrangement</div>
  </div>

  <div class="body">
    <div class="sub-title">平台运营数据每周分析</div>

    <div class="top-stats">
      <div class="stat-item">
        <div class="stat-row">
          <span class="stat-num">28篇</span>
          <span class="stat-tag" style="background:#11438d;">笔记发文</span>
        </div>
        <div class="stat-sub">
          <span>环比增长</span>
          <span class="stat-pct" style="color:#11438d;">+20%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:98%; background:#11438d;"></div></div>
      </div>

      <div class="stat-item">
        <div class="stat-row">
          <span class="stat-num" style="color:#5e8bc8;">+773</span>
          <span class="stat-tag" style="background:#5e8bc8;">新增粉丝</span>
        </div>
        <div class="stat-sub">
          <span>环比增长</span>
          <span class="stat-pct" style="color:#5e8bc8;">+20%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:98%; background:#5e8bc8;"></div></div>
      </div>

      <div class="stat-item">
        <div class="stat-row">
          <span class="stat-num" style="color:#a8bfd1; font-weight:800;">-19</span>
          <span class="stat-tag" style="background:#8cb1d1;">流失粉丝</span>
        </div>
        <div class="stat-sub">
          <span>环比增长</span>
          <span class="stat-pct" style="color:#8cb1d1;">-10%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:98%; background:#8cb1d1;"></div></div>
      </div>

      <div class="stat-item">
        <div class="stat-row">
          <span class="stat-num">336单</span>
          <span class="stat-tag" style="background:#11438d;">店铺销售</span>
        </div>
        <div class="stat-sub">
          <span>环比增长</span>
          <span class="stat-pct" style="color:#11438d;">+20%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:98%; background:#11438d;"></div></div>
      </div>
    </div>

    <div class="chart-box">
      <div class="chart-title">产品周销售总额</div>
      <svg width="100%" height="100%" viewBox="0 0 1160 316" preserveAspectRatio="xMidYMid meet">
        <g fill="#7f7f7f" font-size="12" text-anchor="end">
          <text x="40" y="64">600</text>
          <text x="40" y="102">500</text>
          <text x="40" y="140">400</text>
          <text x="40" y="178">300</text>
          <text x="40" y="216">200</text>
          <text x="40" y="254">100</text>
        </g>

        <g stroke="#e7edf4" stroke-width="1">
          <line x1="54" y1="258" x2="1138" y2="258" />
          <line x1="54" y1="220" x2="1138" y2="220" />
          <line x1="54" y1="182" x2="1138" y2="182" />
          <line x1="54" y1="144" x2="1138" y2="144" />
          <line x1="54" y1="106" x2="1138" y2="106" />
          <line x1="54" y1="68" x2="1138" y2="68" />
        </g>

        <polyline points="129,170 289,144 449,150 609,178 769,136 929,160 1089,156"
                  fill="none" stroke="#b7c3cf" stroke-width="1.4" stroke-dasharray="2,5" />

        <rect x="78" y="144" width="34" height="114" fill="#123f8d" />
        <rect x="112" y="216" width="34" height="42" fill="#5f8ac8" />
        <rect x="146" y="182" width="34" height="76" fill="#8cb0cf" />

        <rect x="238" y="106" width="34" height="152" fill="#123f8d" />
        <rect x="272" y="76" width="34" height="182" fill="#5f8ac8" />
        <rect x="306" y="114" width="34" height="144" fill="#8cb0cf" />

        <rect x="398" y="68" width="34" height="190" fill="#123f8d" />
        <rect x="432" y="114" width="34" height="144" fill="#5f8ac8" />
        <rect x="466" y="216" width="34" height="42" fill="#8cb0cf" />

        <rect x="558" y="106" width="34" height="152" fill="#123f8d" />
        <rect x="592" y="216" width="34" height="42" fill="#5f8ac8" />
        <rect x="626" y="156" width="34" height="102" fill="#8cb0cf" />

        <rect x="716" y="150" width="38" height="108" fill="#123f8d" />
        <rect x="754" y="190" width="38" height="68" fill="#5f8ac8" />
        <rect x="792" y="104" width="38" height="154" fill="#8cb0cf" />

        <rect x="876" y="186" width="38" height="72" fill="#123f8d" />
        <rect x="914" y="72" width="38" height="186" fill="#5f8ac8" />
        <rect x="952" y="218" width="38" height="40" fill="#8cb0cf" />

        <rect x="1036" y="68" width="38" height="190" fill="#123f8d" />
        <rect x="1074" y="190" width="38" height="68" fill="#5f8ac8" />
        <rect x="1112" y="116" width="38" height="142" fill="#8cb0cf" />

        <g fill="#575757" font-size="12" text-anchor="middle">
          <text x="129" y="286">周一</text>
          <text x="289" y="286">周二</text>
          <text x="449" y="286">周三</text>
          <text x="609" y="286">周四</text>
          <text x="769" y="286">周五</text>
          <text x="929" y="286">周六</text>
          <text x="1089" y="286">周日</text>
        </g>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
