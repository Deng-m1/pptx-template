<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
    overflow: hidden;
  }
  .photo {
    position: absolute;
    left: 81px;
    top: 0;
    width: 516px;
    height: 720px;
    background-image: url('../assets/slide_157_building.jpg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    filter: contrast(1.02) saturate(0.9) brightness(0.98);
  }
  .logo {
    position: absolute;
    right: 76px;
    top: 58px;
    font-size: 28px;
    line-height: 1;
    font-weight: 500;
    color: #0f47a1;
    letter-spacing: 0.5px;
  }
  .blue-card {
    position: absolute;
    left: 445px;
    top: 150px;
    width: 650px;
    height: 388px;
    background: #0f47a1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .title {
    margin-top: 104px;
    font-size: 84px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: 1px;
    color: #ffffff;
  }
  .desc {
    width: 590px;
    margin-top: 34px;
    font-size: 14px;
    line-height: 1.8;
    color: rgba(255,255,255,0.92);
    text-align: center;
  }
  .date {
    position: absolute;
    right: 74px;
    bottom: 64px;
    font-size: 18px;
    line-height: 1;
    color: #1e4587;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="photo"></div>
    <div class="logo">LOGO</div>
    <div class="blue-card">
      <div class="title">THANK YOU</div>
      <div class="desc">
        Here you can describe the main work report content. Here you can describe the main work report content. Here you can describe the main work report content. Here you can describe the main work report content.
      </div>
    </div>
    <div class="date">汇报时间：8888年88月88日</div>
  </div>
</body>
</html>
