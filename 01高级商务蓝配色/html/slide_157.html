<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; position: relative; }
  /* Left photo area */
  .left-photo { width: 600px; height: 720px; background: linear-gradient(135deg, #1a2a4a 0%, #2a4a7a 40%, #4a6a9a 70%, #6a8aba 100%); position: relative; overflow: hidden; flex-shrink: 0; }
  .building-svg { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; }
  /* Right area */
  .right-area { flex: 1; display: flex; flex-direction: column; }
  .logo-bar { height: 80px; display: flex; align-items: center; justify-content: flex-end; padding: 0 40px; }
  .logo-text { font-size: 28px; font-weight: 900; color: #1a3a6b; }
  .blue-box { flex: 1; background: #1a3a6b; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; gap: 20px; }
  .thank-you { font-size: 80px; font-weight: 900; color: white; letter-spacing: 4px; }
  .desc { font-size: 15px; color: rgba(255,255,255,0.85); text-align: center; line-height: 1.8; }
  .info-bar { height: 70px; display: flex; align-items: center; justify-content: flex-end; padding: 0 40px; }
  .info { font-size: 18px; color: #1a3a6b; }
</style>
</head>
<body>
<div class="slide">
  <div class="left-photo">
    <svg class="building-svg" viewBox="0 0 600 720" xmlns="http://www.w3.org/2000/svg">
      <!-- Sky gradient -->
      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8ab0d0"/>
          <stop offset="100%" stop-color="#c0d4e8"/>
        </linearGradient>
        <linearGradient id="bldGrad1" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#1a2a4a"/>
          <stop offset="100%" stop-color="#2a3a5a"/>
        </linearGradient>
      </defs>
      <rect width="600" height="720" fill="url(#skyGrad)"/>
      <!-- Buildings -->
      <rect x="50" y="200" width="120" height="520" fill="#1a2a4a"/>
      <rect x="180" y="100" width="100" height="620" fill="#2a3a5a"/>
      <rect x="290" y="250" width="80" height="470" fill="#1a2a4a"/>
      <rect x="380" y="150" width="130" height="570" fill="#2a3a5a"/>
      <rect x="520" y="300" width="80" height="420" fill="#1a2a4a"/>
      <!-- Windows -->
      <rect x="60" y="220" width="15" height="20" fill="#f0c040" opacity="0.7"/>
      <rect x="85" y="220" width="15" height="20" fill="#f0c040" opacity="0.5"/>
      <rect x="110" y="220" width="15" height="20" fill="#f0c040" opacity="0.8"/>
      <rect x="60" y="260" width="15" height="20" fill="#f0c040" opacity="0.6"/>
      <rect x="85" y="260" width="15" height="20" fill="#f0c040" opacity="0.4"/>
      <rect x="190" y="120" width="15" height="20" fill="#f0c040" opacity="0.7"/>
      <rect x="215" y="120" width="15" height="20" fill="#f0c040" opacity="0.5"/>
      <rect x="240" y="120" width="15" height="20" fill="#f0c040" opacity="0.8"/>
      <rect x="390" y="170" width="15" height="20" fill="#f0c040" opacity="0.6"/>
      <rect x="415" y="170" width="15" height="20" fill="#f0c040" opacity="0.7"/>
      <rect x="440" y="170" width="15" height="20" fill="#f0c040" opacity="0.5"/>
    </svg>
  </div>
  <div class="right-area">
    <div class="logo-bar">
      <div class="logo-text">LOGO</div>
    </div>
    <div class="blue-box">
      <div class="thank-you">THANK YOU</div>
      <div class="desc">Here you can describe the main work report content. Here you can describe the main work report content. Here you can describe the main work report content. Here you can describe the main work report content.</div>
    </div>
    <div class="info-bar">
      <div class="info">汇报时间：8888年88月88日</div>
    </div>
  </div>
</div>
</body>
</html>
