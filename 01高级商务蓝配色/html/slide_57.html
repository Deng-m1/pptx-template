<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1280px;height:720px;overflow:hidden;font-family:'Microsoft YaHei',Arial,sans-serif;background:#fff;}
.slide{width:1280px;height:720px;display:flex;flex-direction:column;}
.header{padding:18px 30px 8px 30px;flex-shrink:0;}
.main-title{font-size:32px;font-weight:900;color:#1a2e5a;}
.sub-title{font-size:15px;color:#2563c0;font-weight:600;text-align:right;margin-top:-28px;}
.divider{height:2px;background:#1a3a7a;margin:6px 30px 0 30px;}
.body{flex:1;display:flex;flex-direction:column;padding:10px 30px 10px 30px;overflow:hidden;}
/* 顶部4列气泡标题 */
.top-bubbles{display:flex;flex-direction:row;gap:12px;flex-shrink:0;margin-bottom:0;}
.bubble{flex:1;padding:10px 14px;font-size:14px;font-weight:700;color:#fff;text-align:center;position:relative;clip-path:polygon(0 0,100% 0,100% 70%,55% 70%,50% 100%,45% 70%,0 70%);}
/* 中间时间轴 */
.timeline-row{display:flex;flex-direction:row;align-items:center;flex-shrink:0;height:70px;gap:12px;}
.tl-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tl-arrow-down{width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:14px solid;margin-bottom:2px;}
.tl-node{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.tl-line{flex:1;height:3px;background:#ddd;align-self:center;}
/* 内容区 */
.content-row{flex:1;display:flex;flex-direction:row;gap:12px;overflow:hidden;}
.content-col{flex:1;display:flex;flex-direction:column;gap:6px;}
.tag{display:inline-block;padding:3px 10px;font-size:11px;font-weight:700;color:#fff;border-radius:2px;}
.list-item{font-size:11px;color:#333;padding:3px 0;display:flex;align-items:center;gap:6px;}
.list-item::before{content:'•';color:#1a3a7a;font-size:14px;}
/* 底部时间轴 */
.bottom-tl{height:32px;display:flex;align-items:center;flex-shrink:0;margin:4px 0 0 0;}
.btl-label{font-size:12px;color:#333;font-weight:600;}
.btl-line{flex:1;height:3px;background:#1a3a7a;margin:0 10px;}
.btl-arrow{width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:14px solid #1a3a7a;}
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="main-title">工作成果展示 Powerpoint Template</div>
    <div class="sub-title">Work Arrangement</div>
    <div class="divider"></div>
  </div>
  <div class="body">
    <!-- 顶部气泡标题 -->
    <div class="top-bubbles">
      <div class="bubble" style="background:#1a3a7a;">完成领导安排的工作</div>
      <div class="bubble" style="background:#2d5fa8;">活动方案的策划内容</div>
      <div class="bubble" style="background:#5b8dd9;">图文美化的设计工作</div>
      <div class="bubble" style="background:#7baee0;">落地安装的现场监督</div>
    </div>
    <!-- 时间轴节点行 -->
    <div class="timeline-row">
      <div class="tl-col">
        <div class="tl-arrow-down" style="border-top-color:#1a3a7a;"></div>
        <div class="tl-node" style="background:#1a3a7a;">01</div>
      </div>
      <div class="tl-line"></div>
      <div class="tl-col">
        <div class="tl-arrow-down" style="border-top-color:#2d5fa8;"></div>
        <div class="tl-node" style="background:#2d5fa8;">02</div>
      </div>
      <div class="tl-line"></div>
      <div class="tl-col">
        <div class="tl-arrow-down" style="border-top-color:#5b8dd9;"></div>
        <div class="tl-node" style="background:#5b8dd9;">03</div>
      </div>
      <div class="tl-line"></div>
      <div class="tl-col">
        <div class="tl-arrow-down" style="border-top-color:#7baee0;"></div>
        <div class="tl-node" style="background:#7baee0;">04</div>
      </div>
    </div>
    <!-- 内容列 -->
    <div class="content-row">
      <div class="content-col">
        <div class="tag" style="background:#1a3a7a;">工作成果</div>
        <div class="list-item">完成领导安排的工作</div>
        <div class="list-item">完成领导安排的工作</div>
        <div class="list-item">完成领导安排的工作</div>
        <div class="list-item">完成领导安排的工作</div>
      </div>
      <div class="content-col">
        <div class="tag" style="background:#2d5fa8;">工作成果</div>
        <div class="list-item">活动方案的策划内容</div>
        <div class="list-item">活动方案的策划内容</div>
        <div class="list-item">活动方案的策划内容</div>
        <div class="list-item">活动方案的策划内容</div>
      </div>
      <div class="content-col">
        <div class="tag" style="background:#5b8dd9;">工作成果</div>
        <div class="list-item">图文美化的设计工作</div>
        <div class="list-item">图文美化的设计工作</div>
        <div class="list-item">图文美化的设计工作</div>
        <div class="list-item">图文美化的设计工作</div>
      </div>
      <div class="content-col">
        <div class="tag" style="background:#7baee0;">工作成果</div>
        <div class="list-item">落地安装的现场监督</div>
        <div class="list-item">落地安装的现场监督</div>
        <div class="list-item">落地安装的现场监督</div>
        <div class="list-item">落地安装的现场监督</div>
      </div>
    </div>
    <!-- 底部时间轴 -->
    <div class="bottom-tl">
      <div class="btl-label">2024.3</div>
      <div class="btl-line"></div>
      <div class="btl-arrow"></div>
      <div class="btl-label" style="margin-left:8px;">2024.6</div>
    </div>
  </div>
</div>
</body>
</html>
