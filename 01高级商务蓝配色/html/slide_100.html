<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 60px; padding: 10px 20px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 28px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 18px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; align-items: stretch; padding: 12px 20px 12px 10px; gap: 20px; }

  /* 左侧漏斗 */
  .left-panel { width: 420px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* 右侧列表 */
  .right-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; border: 1.5px dashed #ccc; border-radius: 6px; padding: 14px 16px; }
  .row { display: flex; align-items: stretch; height: 80px; }
  .label-box {
    width: 120px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #fff; flex-shrink: 0;
  }
  .label-box.dark { background: #1a3a6b; }
  .label-box.mid { background: #7aa0d4; }
  .label-box.light { background: #b0c4d8; color: #1a3a6b; }
  .label-box.pale { background: #d8e4ef; color: #1a3a6b; }

  /* 箭头形状 */
  .arrow-box {
    flex: 1; display: flex; align-items: center; padding: 0 16px 0 24px;
    position: relative; clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 50%, calc(100% - 20px) 100%, 0 100%);
  }
  .arrow-box.dark { background: #1a3a6b; }
  .arrow-box.mid { background: #7aa0d4; }
  .arrow-box.light { background: #b0c4d8; }
  .arrow-box.pale { background: #d8e4ef; }
  .arrow-text { font-size: 12px; color: #fff; line-height: 1.7; }
  .arrow-box.pale .arrow-text { color: #333; }
  .arrow-box.light .arrow-text { color: #1a3a6b; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">项目规划 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <!-- 左侧：3层椭圆漏斗（从下大到上小，顶部箭头向上） -->
    <div class="left-panel">
      <svg width="400" height="580" viewBox="0 0 400 580">
        <!-- 向上箭头（顶部） -->
        <polygon points="200,10 175,55 192,55 192,90 208,90 208,55 225,55" fill="#1a3a6b"/>

        <!-- 顶部标签：金主用户（最小椭圆，深蓝色） -->
        <ellipse cx="200" cy="115" rx="75" ry="28" fill="#1a3a6b"/>
        <text x="200" y="122" text-anchor="middle" font-size="17" font-weight="bold" fill="white">金主用户</text>

        <!-- 连接梯形（从小到大，灰色背景） -->
        <polygon points="125,115 275,115 350,250 50,250" fill="#e8ecf0" opacity="0.8"/>

        <!-- 中层标签：热爱社交型用户（中等椭圆，深炭色） -->
        <ellipse cx="200" cy="250" rx="140" ry="40" fill="#4a5568"/>
        <text x="200" y="258" text-anchor="middle" font-size="18" font-weight="bold" fill="white">热爱社交型用户</text>

        <!-- 连接梯形（从中到大，灰色背景） -->
        <polygon points="60,250 340,250 400,430 0,430" fill="#e8ecf0" opacity="0.6"/>

        <!-- 底层标签：热爱社交型用户（最大椭圆，浅蓝色） -->
        <ellipse cx="200" cy="430" rx="195" ry="55" fill="#7aa0d4"/>
        <text x="200" y="438" text-anchor="middle" font-size="20" font-weight="bold" fill="white">热爱社交型用户</text>

        <!-- 底部椭圆下半部分（3D效果） -->
        <ellipse cx="200" cy="480" rx="195" ry="55" fill="#5a80b4" opacity="0.5"/>
      </svg>
    </div>

    <!-- 右侧：5行箭头列表 -->
    <div class="right-panel">
      <div class="row">
        <div class="label-box dark">实现自我</div>
        <div class="arrow-box dark" style="margin-left:8px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
      <div class="row">
        <div class="label-box mid">尊重需求</div>
        <div class="arrow-box mid" style="margin-left:8px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
      <div class="row">
        <div class="label-box dark">社交需求</div>
        <div class="arrow-box dark" style="margin-left:8px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
      <div class="row">
        <div class="label-box pale">安全需求</div>
        <div class="arrow-box pale" style="margin-left:8px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
      <div class="row">
        <div class="label-box dark">自我需求</div>
        <div class="arrow-box dark" style="margin-left:8px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
