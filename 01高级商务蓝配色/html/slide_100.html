<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 80px; padding: 14px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; align-items: stretch; padding: 16px 30px; gap: 30px; }

  /* 左侧漏斗 */
  .left-panel { width: 440px; display: flex; align-items: center; justify-content: center; }

  /* 右侧列表 */
  .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; justify-content: center; border: 1.5px dashed #ccc; border-radius: 6px; padding: 16px; }
  .row { display: flex; align-items: center; gap: 0; height: 86px; }
  .label-box { width: 130px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: #fff; flex-shrink: 0; }
  .label-box.dark { background: #1a3a6b; }
  .label-box.mid { background: #7aa0d4; }
  .label-box.light { background: #b0c4d8; }
  .label-box.pale { background: #d8e4ef; color: #1a3a6b; }
  /* 箭头形状 */
  .arrow-box { position: relative; height: 100%; flex: 1; display: flex; align-items: center; padding-left: 20px; }
  .arrow-box::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0; height: 0; border-top: 43px solid transparent; border-bottom: 43px solid transparent; }
  .arrow-box::after { content: ''; position: absolute; right: -20px; top: 0; bottom: 0; width: 0; height: 0; border-top: 43px solid transparent; border-bottom: 43px solid transparent; z-index: 1; }
  .arrow-box.dark { background: #1a3a6b; }
  .arrow-box.dark::before { border-left: 20px solid #fff; }
  .arrow-box.dark::after { border-left: 20px solid #1a3a6b; }
  .arrow-box.mid { background: #7aa0d4; }
  .arrow-box.mid::before { border-left: 20px solid #fff; }
  .arrow-box.mid::after { border-left: 20px solid #7aa0d4; }
  .arrow-box.light { background: #b0c4d8; }
  .arrow-box.light::before { border-left: 20px solid #fff; }
  .arrow-box.light::after { border-left: 20px solid #b0c4d8; }
  .arrow-box.pale { background: #d8e4ef; }
  .arrow-box.pale::before { border-left: 20px solid #fff; }
  .arrow-box.pale::after { border-left: 20px solid #d8e4ef; }
  .arrow-text { font-size: 12px; color: #fff; line-height: 1.7; }
  .arrow-box.pale .arrow-text { color: #333; }
  .arrow-box.light .arrow-text { color: #1a3a6b; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">项目规划 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <!-- 左侧：3层椭圆漏斗（从大到小，顶部箭头向上） -->
    <div class="left-panel">
      <svg width="400" height="560" viewBox="0 0 400 560">
        <!-- 向上箭头 -->
        <polygon points="200,30 170,80 190,80 190,120 210,120 210,80 230,80" fill="#1a3a6b"/>

        <!-- 第一层（最大，浅蓝） -->
        <ellipse cx="200" cy="200" rx="190" ry="60" fill="#7aa0d4"/>
        <rect x="10" y="200" width="380" height="100" fill="#7aa0d4"/>
        <ellipse cx="200" cy="300" rx="190" ry="60" fill="#5a80b4"/>
        <text x="200" y="258" text-anchor="middle" font-size="22" font-weight="bold" fill="white">热爱社交型用户</text>

        <!-- 第二层（中，深灰） -->
        <ellipse cx="200" cy="320" rx="130" ry="42" fill="#4a5568"/>
        <rect x="70" y="320" width="260" height="80" fill="#4a5568"/>
        <ellipse cx="200" cy="400" rx="130" ry="42" fill="#3a4558"/>
        <text x="200" y="368" text-anchor="middle" font-size="20" font-weight="bold" fill="white">热爱社交型用户</text>

        <!-- 第三层（最小，深蓝） -->
        <ellipse cx="200" cy="415" rx="80" ry="28" fill="#1a3a6b"/>
        <rect x="120" y="415" width="160" height="60" fill="#1a3a6b"/>
        <ellipse cx="200" cy="475" rx="80" ry="28" fill="#0f2a5b"/>
        <text x="200" y="452" text-anchor="middle" font-size="18" font-weight="bold" fill="white">金主用户</text>
      </svg>
    </div>

    <!-- 右侧：5行箭头列表 -->
    <div class="right-panel">
      <div class="row">
        <div class="label-box dark">实现自我</div>
        <div class="arrow-box dark" style="margin-left:20px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
      <div class="row">
        <div class="label-box mid">尊重需求</div>
        <div class="arrow-box mid" style="margin-left:20px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
      <div class="row">
        <div class="label-box dark">社交需求</div>
        <div class="arrow-box dark" style="margin-left:20px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
      <div class="row">
        <div class="label-box pale">安全需求</div>
        <div class="arrow-box pale" style="margin-left:20px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
      <div class="row">
        <div class="label-box dark">自我需求</div>
        <div class="arrow-box dark" style="margin-left:20px;">
          <div class="arrow-text">帮助更多人获取收益<br>获得荣誉感和尊重，取得被认同感</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
