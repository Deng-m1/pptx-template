<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 40px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 0; width: 1100px; height: 560px; position: relative; }
  .cell { padding: 30px 36px; display: flex; flex-direction: column; gap: 12px; position: relative; }
  .cell-num { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.6); color: white; font-size: 18px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
  .cell-title { font-size: 28px; font-weight: 900; color: white; }
  .cell-desc { font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.7; }
  .cell-header { display: flex; align-items: center; gap: 14px; }
  /* Arrow SVG overlay */
  .arrow-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">工作汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="grid">
      <!-- Top-left: 01 启动 -->
      <div class="cell" style="background:#1a3a6b;">
        <div class="cell-header">
          <div class="cell-num">01</div>
          <div class="cell-title">第一阶段：启动</div>
        </div>
        <div class="cell-desc">工作完成情况工作完成情况工作完<br>成情况作完成情况工作完成情况</div>
      </div>
      <!-- Top-right: 02 规划 -->
      <div class="cell" style="background:#6a9ac4;">
        <div class="cell-header">
          <div class="cell-title" style="flex:1;">第二阶段：规划</div>
          <div class="cell-num">02</div>
        </div>
        <div class="cell-desc">工作完成情况工作完成情况工作完<br>成情况作完成情况工作完成情况</div>
      </div>
      <!-- Bottom-left: 04 优化 -->
      <div class="cell" style="background:#3a6abf;">
        <div class="cell-header">
          <div class="cell-num">04</div>
          <div class="cell-title">第四阶段：优化</div>
        </div>
        <div class="cell-desc">工作完成情况工作完成情况工作完<br>成情况作完成情况工作完成情况</div>
      </div>
      <!-- Bottom-right: 03 执行 -->
      <div class="cell" style="background:#8ab0d0;">
        <div class="cell-header">
          <div class="cell-title" style="flex:1;">第三阶段：执行</div>
          <div class="cell-num">03</div>
        </div>
        <div class="cell-desc">工作完成情况工作完成情况工作完<br>成情况作完成情况工作完成情况</div>
      </div>
      <!-- Arrow overlay -->
      <svg class="arrow-overlay" viewBox="0 0 1100 560">
        <!-- Right arrow: 01→02 (top center) -->
        <polygon points="510,240 590,240 590,220 630,280 590,340 590,320 510,320" fill="white" opacity="0.9"/>
        <!-- Down arrow: 02→03 (right center) -->
        <polygon points="760,240 760,320 780,320 720,360 660,320 680,320 680,240" fill="white" opacity="0.9"/>
        <!-- Left arrow: 03→04 (bottom center) -->
        <polygon points="590,240 510,240 510,220 470,280 510,340 510,320 590,320" fill="white" opacity="0.9" transform="translate(0,0)"/>
        <!-- Up arrow: 04→01 (left center) -->
        <polygon points="340,320 340,240 360,240 300,200 240,240 260,240 260,320" fill="white" opacity="0.9"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
