<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
  }
  .header-title {
    position: absolute;
    left: 48px;
    top: 30px;
    font-size: 31px;
    line-height: 1;
    font-weight: 900;
    color: #0f458e;
  }
  .header-sub {
    position: absolute;
    right: 48px;
    top: 49px;
    font-size: 19px;
    line-height: 1;
    font-style: italic;
    color: #123f82;
  }
  .top-line {
    position: absolute;
    left: 48px;
    top: 83px;
    width: 1184px;
    height: 2px;
    background: #1b5996;
  }

  .stage {
    position: absolute;
    width: 462px;
    height: 226px;
    color: #ffffff;
    overflow: hidden;
  }
  .s1 { left: 133px; top: 138px; background: #5f8fd0; }
  .s2 { left: 688px; top: 138px; background: #c7d8ee; }
  .s3 { left: 688px; top: 436px; background: #5f8fd0; }
  .s4 { left: 133px; top: 436px; background: #84acd1; }

  .num {
    position: absolute;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #ffffff;
    color: #5c8ccf;
    font-size: 34px;
    line-height: 64px;
    text-align: center;
    font-weight: 900;
  }
  .num.dark { color: #4f81c8; }
  .s1 .num, .s4 .num { left: 34px; }
  .s2 .num, .s3 .num { right: 24px; }
  .s1 .num, .s2 .num { top: 30px; }
  .s3 .num, .s4 .num { top: 144px; }

  .title {
    position: absolute;
    font-size: 38px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: 0.5px;
    color: #ffffff;
    white-space: nowrap;
  }
  .desc {
    position: absolute;
    width: 290px;
    font-size: 12px;
    line-height: 1.8;
    color: rgba(255,255,255,0.97);
    text-align: left;
  }

  .s1 .title { left: 118px; top: 43px; }
  .s1 .desc { left: 120px; top: 112px; width: 250px; }

  .s2 .title { left: 92px; top: 43px; }
  .s2 .desc { left: 102px; top: 112px; width: 280px; }

  .s3 .title { left: 90px; top: 160px; }
  .s3 .desc { left: 102px; top: 62px; width: 280px; }

  .s4 .title { left: 118px; top: 160px; }
  .s4 .desc { left: 120px; top: 62px; width: 250px; }

  svg text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
</style>
</head>
<body>
<div class="slide">
  <div class="header-title">工作汇报 Powerpoint Template</div>
  <div class="header-sub">Work Arrangement</div>
  <div class="top-line"></div>

  <div class="stage s1">
    <div class="num dark">01</div>
    <div class="title">第一阶段：启动</div>
    <div class="desc">工作完成情况工作完成情况工作完<br>成情况作完成情况工作完成情况</div>
  </div>

  <div class="stage s2">
    <div class="num">02</div>
    <div class="title">第二阶段：规划</div>
    <div class="desc">工作完成情况工作完成情况工作完<br>成情况作完成情况工作完成情况</div>
  </div>

  <div class="stage s3">
    <div class="num">03</div>
    <div class="title">第三阶段：执行</div>
    <div class="desc">工作完成情况工作完成情况工作完<br>成情况作完成情况工作完成情况</div>
  </div>

  <div class="stage s4">
    <div class="num">04</div>
    <div class="title">第四阶段：优化</div>
    <div class="desc">工作完成情况工作完成情况工作完<br>成情况作完成情况工作完成情况</div>
  </div>

  <svg width="1280" height="720" viewBox="0 0 1280 720" aria-hidden="true" style="position:absolute;left:0;top:0;pointer-events:none;">
    <defs>
      <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#d7e1ef" flood-opacity="0.75"/>
      </filter>
    </defs>

    <polygon points="595,173 686,173 686,147 734,194 686,241 686,215 595,215" fill="#b8cbe4" filter="url(#soft)"/>
    <polygon points="1066,364 1066,436 1039,436 1108,477 1177,436 1150,436 1150,364" fill="#b8cbe4" filter="url(#soft)"/>
    <polygon points="688,571 597,571 597,545 551,592 597,639 597,613 688,613" fill="#6a96d0" filter="url(#soft)"/>
    <polygon points="184,436 184,363 158,363 204,318 250,363 224,363 224,436" fill="#b9cbe3" filter="url(#soft)"/>
  </svg>
</div>
</body>
</html>
