<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; padding: 14px 30px; gap: 14px; }
  .left-col { width: 320px; display: flex; flex-direction: column; gap: 10px; }
  .chart-box { border: 1.5px solid #dde4f0; border-radius: 4px; padding: 10px; }
  .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .center-col { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  .right-col { width: 300px; display: flex; flex-direction: column; gap: 10px; }
  .stat-card { background: #1a3a6b; border-radius: 4px; padding: 14px 18px; }
  .stat-row { display: flex; justify-content: space-between; }
  .stat-label { font-size: 13px; color: rgba(255,255,255,0.8); }
  .stat-num { font-size: 28px; font-weight: 900; color: white; }
  .stat-divider { border: none; border-top: 1px solid rgba(255,255,255,0.3); margin: 8px 0; }
  .stat-desc { font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1.6; }
  .hbar-box { border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; }
  .bullet-box { border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; }
  .bullet-item { display: flex; gap: 8px; margin-bottom: 10px; }
  .bullet-dot { width: 10px; height: 10px; border-radius: 50%; background: #1a3a6b; flex-shrink: 0; margin-top: 3px; }
  .bullet-title { font-size: 12px; font-weight: 700; color: #1a3a6b; margin-bottom: 3px; }
  .bullet-text { font-size: 10px; color: #666; line-height: 1.6; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">平台数据分析 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <!-- Left column: 2 charts -->
    <div class="left-col">
      <div class="chart-box" style="flex:1;">
        <svg width="100%" height="100%" viewBox="0 0 280 160" preserveAspectRatio="xMidYMid meet">
          <text x="20" y="15" font-size="10" fill="#888">6</text>
          <text x="20" y="55" font-size="10" fill="#888">4</text>
          <text x="20" y="95" font-size="10" fill="#888">2</text>
          <text x="20" y="130" font-size="10" fill="#888">0</text>
          <line x1="35" y1="10" x2="270" y2="10" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="50" x2="270" y2="50" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="90" x2="270" y2="90" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="125" x2="270" y2="125" stroke="#eee" stroke-width="1"/>
          <!-- 4 groups of 4 bars -->
          <rect x="40" y="60" width="12" height="65" fill="#1a3a6b"/>
          <rect x="55" y="80" width="12" height="45" fill="#3a6abf"/>
          <rect x="70" y="90" width="12" height="35" fill="#8ab0d0"/>
          <rect x="85" y="100" width="12" height="25" fill="#c0d4e8"/>
          <rect x="105" y="50" width="12" height="75" fill="#1a3a6b"/>
          <rect x="120" y="70" width="12" height="55" fill="#3a6abf"/>
          <rect x="135" y="80" width="12" height="45" fill="#8ab0d0"/>
          <rect x="150" y="90" width="12" height="35" fill="#c0d4e8"/>
          <rect x="170" y="55" width="12" height="70" fill="#1a3a6b"/>
          <rect x="185" y="75" width="12" height="50" fill="#3a6abf"/>
          <rect x="200" y="85" width="12" height="40" fill="#8ab0d0"/>
          <rect x="215" y="95" width="12" height="30" fill="#c0d4e8"/>
          <rect x="235" y="45" width="12" height="80" fill="#1a3a6b"/>
          <rect x="250" y="65" width="12" height="60" fill="#3a6abf"/>
          <text x="72" y="145" font-size="9" fill="#555" text-anchor="middle">第一季度</text>
          <text x="137" y="145" font-size="9" fill="#555" text-anchor="middle">第二季度</text>
          <text x="202" y="145" font-size="9" fill="#555" text-anchor="middle">第三季度</text>
          <text x="252" y="145" font-size="9" fill="#555" text-anchor="middle">第四季度</text>
        </svg>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>公司产品A</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>公司产品B</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>公司产品C</div>
          <div class="legend-item"><div class="legend-dot" style="background:#c0d4e8;"></div>公司产品D</div>
        </div>
      </div>
      <div class="chart-box" style="flex:1;">
        <svg width="100%" height="100%" viewBox="0 0 280 180" preserveAspectRatio="xMidYMid meet">
          <text x="20" y="15" font-size="10" fill="#888">14</text>
          <text x="20" y="55" font-size="10" fill="#888">10</text>
          <text x="20" y="95" font-size="10" fill="#888">6</text>
          <text x="20" y="130" font-size="10" fill="#888">2</text>
          <text x="20" y="165" font-size="10" fill="#888">0</text>
          <line x1="35" y1="160" x2="270" y2="160" stroke="#eee" stroke-width="1"/>
          <!-- Area chart -->
          <path d="M 40,130 L 80,100 L 120,80 L 160,50 L 200,30 L 240,20 L 240,160 L 40,160 Z" fill="#1a3a6b" opacity="0.7"/>
          <path d="M 40,140 L 80,120 L 120,100 L 160,80 L 200,60 L 240,50 L 240,160 L 40,160 Z" fill="#3a6abf" opacity="0.7"/>
          <path d="M 40,150 L 80,140 L 120,130 L 160,110 L 200,90 L 240,80 L 240,160 L 40,160 Z" fill="#8ab0d0" opacity="0.7"/>
          <text x="40" y="175" font-size="9" fill="#555" text-anchor="middle">第一季度</text>
          <text x="120" y="175" font-size="9" fill="#555" text-anchor="middle">第二季度</text>
          <text x="200" y="175" font-size="9" fill="#555" text-anchor="middle">第三季度</text>
          <text x="240" y="175" font-size="9" fill="#555" text-anchor="middle">第四季度</text>
        </svg>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>系列 1</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>系列 2</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>系列 3</div>
        </div>
      </div>
    </div>
    
    <!-- Center: bubble circles -->
    <div class="center-col">
      <svg width="380" height="580" viewBox="0 0 380 580">
        <!-- Large dark blue circle: 线上营销 70% -->
        <circle cx="190" cy="240" r="140" fill="#1a3a6b"/>
        <text x="190" y="225" text-anchor="middle" font-size="18" fill="white">线上营销</text>
        <text x="190" y="265" text-anchor="middle" font-size="48" font-weight="900" fill="white">70%</text>
        <text x="190" y="300" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">我们对原始数据进行了清洗和</text>
        <text x="190" y="318" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">整理，去除了缺失值和异常值，</text>
        <text x="190" y="336" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">确保数据的准确性。</text>
        <!-- Top right: 公司产品A 68600 -->
        <circle cx="300" cy="120" r="90" fill="#6a9ac4"/>
        <text x="300" y="110" text-anchor="middle" font-size="13" fill="white">公司产品A</text>
        <text x="300" y="140" text-anchor="middle" font-size="24" font-weight="900" fill="white">68600</text>
        <!-- Arrow -->
        <path d="M 240,200 L 260,180 L 270,185 L 255,200 Z" fill="#1a3a6b"/>
        <!-- Bottom: 线下营销 30% -->
        <circle cx="190" cy="460" r="100" fill="#c0d4e8"/>
        <text x="190" y="445" text-anchor="middle" font-size="18" fill="#1a3a6b">线下营销</text>
        <text x="190" y="480" text-anchor="middle" font-size="40" font-weight="900" fill="#1a3a6b">30%</text>
        <!-- Bottom right: 公司产品B 33500 -->
        <circle cx="300" cy="480" r="80" fill="#8ab0d0"/>
        <text x="300" y="470" text-anchor="middle" font-size="13" fill="white">公司产品B</text>
        <text x="300" y="498" text-anchor="middle" font-size="22" font-weight="900" fill="white">33500</text>
      </svg>
    </div>
    
    <!-- Right column -->
    <div class="right-col">
      <div class="stat-card">
        <div class="stat-row">
          <span class="stat-label">目标业绩</span>
          <span class="stat-label">实际完成</span>
        </div>
        <div class="stat-row">
          <span class="stat-num">79010</span>
          <span class="stat-num">40929</span>
        </div>
        <hr class="stat-divider"/>
        <div class="stat-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</div>
      </div>
      <div class="hbar-box" style="flex:1;">
        <svg width="100%" height="100%" viewBox="0 0 260 160" preserveAspectRatio="xMidYMid meet">
          <text x="70" y="30" font-size="11" fill="#555" text-anchor="end">项目产品C</text>
          <text x="70" y="70" font-size="11" fill="#555" text-anchor="end">项目产品B</text>
          <text x="70" y="110" font-size="11" fill="#555" text-anchor="end">项目产品A</text>
          <text x="80" y="145" font-size="10" fill="#888" text-anchor="middle">0</text>
          <text x="130" y="145" font-size="10" fill="#888" text-anchor="middle">2</text>
          <text x="180" y="145" font-size="10" fill="#888" text-anchor="middle">4</text>
          <text x="230" y="145" font-size="10" fill="#888" text-anchor="middle">6</text>
          <line x1="80" y1="15" x2="80" y2="130" stroke="#eee" stroke-width="1"/>
          <line x1="130" y1="15" x2="130" y2="130" stroke="#eee" stroke-width="1"/>
          <line x1="180" y1="15" x2="180" y2="130" stroke="#eee" stroke-width="1"/>
          <line x1="230" y1="15" x2="230" y2="130" stroke="#eee" stroke-width="1"/>
          <rect x="80" y="18" width="75" height="14" fill="#8ab0d0"/>
          <rect x="80" y="36" width="100" height="14" fill="#1a3a6b"/>
          <rect x="80" y="58" width="50" height="14" fill="#8ab0d0"/>
          <rect x="80" y="76" width="100" height="14" fill="#1a3a6b"/>
          <rect x="80" y="98" width="100" height="14" fill="#8ab0d0"/>
          <rect x="80" y="116" width="125" height="14" fill="#1a3a6b"/>
        </svg>
      </div>
      <div class="bullet-box" style="flex:1;">
        <div class="bullet-item">
          <div class="bullet-dot"></div>
          <div>
            <div class="bullet-title">统一品牌策略</div>
            <div class="bullet-text">统一品牌策略是指企业经营的所有系列产品使用同一品牌的策略，使用同一策略，有利于建立"企业识别系统"</div>
          </div>
        </div>
        <div class="bullet-item">
          <div class="bullet-dot"></div>
          <div>
            <div class="bullet-title">统一品牌策略</div>
            <div class="bullet-text">统一品牌策略是指企业经营的所有系列产品使用同一品牌的策略，使用同一策略，有利于建立"企业识别系统"</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
