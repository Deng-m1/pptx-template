<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 14px 40px; gap: 10px; }
  .title-area { text-align: center; }
  .main-title { font-size: 26px; font-weight: 900; color: #1a3a6b; margin-bottom: 6px; }
  .sub-desc { font-size: 12px; color: #888; line-height: 1.6; }
  .content-area { flex: 1; display: flex; align-items: center; gap: 20px; }
  .left-col { width: 320px; display: flex; flex-direction: column; gap: 10px; }
  .right-col { width: 320px; display: flex; flex-direction: column; gap: 10px; }
  .item-card { border-radius: 4px; padding: 14px 16px; }
  .item-card.dashed { border: 2px dashed #1a3a6b; }
  .item-card.solid { background: #1a3a6b; }
  .item-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .item-title.dark { color: #1a3a6b; }
  .item-title.white { color: white; }
  .item-desc { font-size: 12px; line-height: 1.6; }
  .item-desc.dark { color: #555; }
  .item-desc.white { color: rgba(255,255,255,0.85); }
  .center-circle { width: 280px; height: 280px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">工作汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="title-area">
      <div class="main-title">商务部2024上半年总结</div>
      <div class="sub-desc">工作成果是指工作一段时间后最终的产出。可定量的工作成果有搬运工的搬运量、销售员的销售额及交易价格水平等，除<br>此外更重要的是定性的工作成果的衡量。</div>
    </div>
    <div class="content-area">
      <div class="left-col">
        <div class="item-card dashed">
          <div class="item-title dark">项目主要成绩</div>
          <div class="item-desc dark">产品优势详细说明产品优势详细说明</div>
        </div>
        <div class="item-card dashed">
          <div class="item-title dark">项目重要任务</div>
          <div class="item-desc dark">产品优势详细说明产品优势详细说明</div>
        </div>
        <div class="item-card solid">
          <div class="item-title white">项目进度成果</div>
          <div class="item-desc white">产品优势详细说明产品优势详细说明</div>
        </div>
      </div>
      <div class="center-circle">
        <svg width="280" height="280" viewBox="0 0 280 280">
          <!-- Outer circle -->
          <circle cx="140" cy="140" r="130" fill="#f0f3f8"/>
          <!-- Inner circle -->
          <circle cx="140" cy="140" r="100" fill="white" stroke="#e0e8f0" stroke-width="2"/>
          <!-- Dark blue center -->
          <circle cx="140" cy="140" r="75" fill="#1a3a6b"/>
          <!-- Building icon -->
          <text x="140" y="125" text-anchor="middle" font-size="32" fill="white">🏢</text>
          <!-- Labels -->
          <text x="140" y="160" text-anchor="middle" font-size="18" font-weight="900" fill="white">半年度总结</text>
          <text x="140" y="180" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">Semi-annual summary</text>
        </svg>
      </div>
      <div class="right-col">
        <div class="item-card solid">
          <div class="item-title white">部门主要成绩</div>
          <div class="item-desc white">产品优势详细说明产品优势详细说明</div>
        </div>
        <div class="item-card solid">
          <div class="item-title white">部门主要优势</div>
          <div class="item-desc white">产品优势详细说明产品优势详细说明</div>
        </div>
        <div class="item-card solid">
          <div class="item-title white">目标达成进度</div>
          <div class="item-desc white">产品优势详细说明产品优势详细说明</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
