<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>slide_11</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:720px; overflow:hidden;
    font-family:'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif;
    background:#1535a0; }
  .slide { width:1280px; height:720px; position:relative; background:#1535a0; overflow:hidden; }

  /* 超大数字装饰 — 左侧约130px，顶部60px，底部被裁切 */
  .big-num {
    position:absolute;
    left:130px; top:60px;
    font-size:580px; font-weight:900;
    color:#ffffff; line-height:1;
    letter-spacing:-20px;
    user-select:none;
    z-index:1;
  }
  /* 右侧内容区 */
  .content {
    position:absolute;
    left:580px; top:120px; right:60px;
    z-index:2;
    display:flex; flex-direction:column; justify-content:flex-start;
  }
  .title-zh {
    font-size:76px; font-weight:900;
    color:#ffffff; letter-spacing:3px; line-height:1.1;
    margin-bottom:16px;
  }
  .title-en {
    font-size:28px; font-weight:400;
    color:rgba(255,255,255,0.75);
    letter-spacing:3px; margin-bottom:36px;
  }
  /* 胶囊按钮行 */
  .btn-row {
    display:flex; gap:24px; margin-bottom:36px;
  }
  .btn {
    display:flex; align-items:center;
    padding:14px 32px;
    background:rgba(255,255,255,0.18);
    border:1.5px solid rgba(255,255,255,0.35);
    border-radius:30px;
    font-size:18px; font-weight:700;
    color:#1a3a9e;
    background:rgba(210,220,255,0.95);
    letter-spacing:1px;
    cursor:default;
  }
  .btn .arrow {
    margin-right:10px; font-size:16px;
    color:#1a3a9e;
  }
  /* 描述文字 */
  .desc {
    font-size:15px; color:rgba(255,255,255,0.8);
    line-height:1.85; max-width:560px;
    margin-bottom:40px;
  }
  /* 底部横线 */
  .bottom-line {
    position:absolute;
    left:580px; bottom:80px; right:60px;
    height:1px;
    background:rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="big-num">1</div>
  <div class="content">
    <div class="title-zh">工作汇报总结</div>
    <div class="title-en">summary of work report</div>
    <div class="btn-row">
      <div class="btn"><span class="arrow">▶</span>项目1工作进度</div>
      <div class="btn"><span class="arrow">▶</span>项目2工作进度</div>
    </div>
    <div class="desc">Here you can describe the main work report content. Here you can describe the main work report content. Here you can describe the main work report content.</div>
  </div>
  <div class="bottom-line"></div>
</div>
</body>
</html>
