<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  
  .body { flex: 1; display: flex; flex-direction: column; padding: 14px 30px 14px; gap: 12px; }
  
  /* Top row */
  .top-row { display: flex; gap: 12px; height: 260px; }
  
  /* Left: 2 donut charts */
  .donuts-panel { width: 380px; border: 1.5px solid #dde4f0; border-radius: 4px; display: flex; align-items: center; justify-content: space-around; padding: 16px; }
  .donut-item { display: flex; flex-direction: column; align-items: center; }
  .donut-label { font-size: 14px; font-weight: 700; color: #1a3a6b; margin-top: 8px; }
  .donut-sub { font-size: 11px; color: #888; }
  
  /* Right: icons + title */
  .info-panel { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 16px; display: flex; flex-direction: column; }
  .icons-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .icon-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .info-title { font-size: 24px; font-weight: 900; color: #1a3a6b; margin-bottom: 10px; }
  .info-desc { font-size: 12px; color: #555; line-height: 1.7; }
  
  /* Bottom row: 3 charts */
  .bottom-row { flex: 1; display: flex; gap: 12px; }
  .chart-box { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; }
  .chart-box-title { font-size: 13px; color: #888; text-align: center; margin-bottom: 8px; }
  .chart-content { flex: 1; display: flex; align-items: center; justify-content: center; }
  
  /* Legend */
  .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">产品销售业绩汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  
  <div class="body">
    <!-- Top row -->
    <div class="top-row">
      <!-- 2 donut charts -->
      <div class="donuts-panel">
        <div class="donut-item">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="55" fill="none" stroke="#e8edf5" stroke-width="18"/>
            <circle cx="70" cy="70" r="55" fill="none" stroke="#1a3a6b" stroke-width="18"
              stroke-dasharray="124 222" stroke-dashoffset="-87" stroke-linecap="butt"/>
            <circle cx="70" cy="70" r="55" fill="none" stroke="#3a6abf" stroke-width="18"
              stroke-dasharray="87 259" stroke-dashoffset="-211" stroke-linecap="butt"/>
            <text x="70" y="66" text-anchor="middle" font-size="24" font-weight="900" fill="#1a3a6b">35%</text>
            <text x="70" y="84" text-anchor="middle" font-size="11" fill="#888">占比</text>
          </svg>
          <div class="donut-label">项目业绩</div>
          <div class="donut-sub">公司产品A：占比35%</div>
        </div>
        <div class="donut-item">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="55" fill="none" stroke="#e8edf5" stroke-width="18"/>
            <circle cx="70" cy="70" r="55" fill="none" stroke="#6a9ac4" stroke-width="18"
              stroke-dasharray="205 141" stroke-dashoffset="-87" stroke-linecap="butt"/>
            <circle cx="70" cy="70" r="55" fill="none" stroke="#9ab8d4" stroke-width="18"
              stroke-dasharray="141 205" stroke-dashoffset="-292" stroke-linecap="butt"/>
            <text x="70" y="66" text-anchor="middle" font-size="24" font-weight="900" fill="#1a3a6b">65%</text>
            <text x="70" y="84" text-anchor="middle" font-size="11" fill="#888">占比</text>
          </svg>
          <div class="donut-label">项目业绩</div>
          <div class="donut-sub">公司产品B：占比65%</div>
        </div>
      </div>
      
      <!-- Info panel -->
      <div class="info-panel">
        <div class="icons-row">
          <div class="icon-circle" style="background:#1a3a6b;">📋</div>
          <div class="icon-circle" style="background:#8a9aaa;">📊</div>
          <div class="icon-circle" style="background:#8a9aaa;">📈</div>
          <div class="icon-circle" style="background:#8a9aaa;">📄</div>
          <div class="icon-circle" style="background:#1a3a6b;">📉</div>
        </div>
        <div class="info-title">总体业绩概览</div>
        <div class="info-desc">分析当前市场状况，包括竞争对手、市场趋势等，使用图表或图像展示市场份额、销售增长情况等数据</div>
      </div>
    </div>
    
    <!-- Bottom row: 3 charts -->
    <div class="bottom-row">
      <!-- Pie chart -->
      <div class="chart-box">
        <div class="chart-box-title">季度销售额占比</div>
        <div class="chart-content">
          <svg width="180" height="160" viewBox="0 0 180 160">
            <!-- Pie: Q1=15%, Q2=20%, Q3=10%, Q4=60% (approx) -->
            <path d="M 90,80 L 90,10 A 70,70 0 0,1 143.6,45 Z" fill="#1a3a6b"/>
            <path d="M 90,80 L 143.6,45 A 70,70 0 0,1 160,80 Z" fill="#3a6abf"/>
            <path d="M 90,80 L 160,80 A 70,70 0 0,1 143.6,115 Z" fill="#8ab0d0"/>
            <path d="M 90,80 L 143.6,115 A 70,70 0 1,1 90,10 Z" fill="#c0d4e8"/>
            <!-- Labels -->
            <text x="120" y="50" font-size="10" fill="white">第一季度</text>
            <text x="125" y="65" font-size="10" fill="white">占比15%</text>
            <text x="148" y="80" font-size="10" fill="white">第三季度</text>
            <text x="148" y="93" font-size="10" fill="white">占比10%</text>
            <text x="30" y="135" font-size="10" fill="#555">第二季度</text>
            <text x="30" y="148" font-size="10" fill="#555">占比20%</text>
            <text x="5" y="80" font-size="10" fill="#555">第四季度</text>
            <text x="5" y="93" font-size="10" fill="#555">占比60%</text>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>第一季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>第二季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>第三季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#c0d4e8;"></div>第四季度</div>
        </div>
      </div>
      
      <!-- Bar chart -->
      <div class="chart-box">
        <div class="chart-box-title">季度销售额明细</div>
        <div class="chart-content">
          <svg width="260" height="160" viewBox="0 0 260 160">
            <!-- Y axis -->
            <text x="15" y="20" font-size="10" fill="#888" text-anchor="middle">6</text>
            <text x="15" y="65" font-size="10" fill="#888" text-anchor="middle">4</text>
            <text x="15" y="110" font-size="10" fill="#888" text-anchor="middle">2</text>
            <text x="15" y="145" font-size="10" fill="#888" text-anchor="middle">0</text>
            <!-- Bars grouped by category -->
            <!-- Cat1 -->
            <rect x="30" y="15" width="18" height="130" fill="#1a3a6b"/>
            <rect x="52" y="60" width="18" height="85" fill="#3a6abf"/>
            <rect x="74" y="80" width="18" height="65" fill="#8ab0d0"/>
            <!-- Cat2 -->
            <rect x="110" y="60" width="18" height="85" fill="#1a3a6b"/>
            <rect x="132" y="15" width="18" height="130" fill="#3a6abf"/>
            <rect x="154" y="80" width="18" height="65" fill="#8ab0d0"/>
            <!-- Cat3 -->
            <rect x="190" y="40" width="18" height="105" fill="#1a3a6b"/>
            <rect x="212" y="80" width="18" height="65" fill="#3a6abf"/>
            <rect x="234" y="60" width="18" height="85" fill="#8ab0d0"/>
            <!-- X labels -->
            <text x="62" y="158" font-size="10" fill="#555" text-anchor="middle">类别 1</text>
            <text x="142" y="158" font-size="10" fill="#555" text-anchor="middle">类别 2</text>
            <text x="222" y="158" font-size="10" fill="#555" text-anchor="middle">类别 3</text>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>系列 1</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>系列 2</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>系列 3</div>
        </div>
      </div>
      
      <!-- Area chart -->
      <div class="chart-box">
        <div class="chart-box-title">业绩销售折线图</div>
        <div class="chart-content">
          <svg width="260" height="160" viewBox="0 0 260 160">
            <!-- Y axis -->
            <text x="15" y="20" font-size="10" fill="#888" text-anchor="middle">15</text>
            <text x="15" y="65" font-size="10" fill="#888" text-anchor="middle">10</text>
            <text x="15" y="110" font-size="10" fill="#888" text-anchor="middle">5</text>
            <text x="15" y="145" font-size="10" fill="#888" text-anchor="middle">0</text>
            <!-- Area 1 (dark blue) -->
            <path d="M 30,100 L 90,80 L 150,90 L 210,70 L 250,60 L 250,145 L 30,145 Z" fill="#1a3a6b" opacity="0.7"/>
            <!-- Area 2 (medium blue) -->
            <path d="M 30,110 L 90,100 L 150,105 L 210,90 L 250,85 L 250,145 L 30,145 Z" fill="#3a6abf" opacity="0.7"/>
            <!-- Area 3 (light blue) -->
            <path d="M 30,120 L 90,115 L 150,118 L 210,110 L 250,108 L 250,145 L 30,145 Z" fill="#8ab0d0" opacity="0.7"/>
            <!-- X labels -->
            <text x="30" y="158" font-size="10" fill="#555" text-anchor="middle">类别 1</text>
            <text x="90" y="158" font-size="10" fill="#555" text-anchor="middle">类别 2</text>
            <text x="150" y="158" font-size="10" fill="#555" text-anchor="middle">类别 3</text>
            <text x="210" y="158" font-size="10" fill="#555" text-anchor="middle">类别 4</text>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>系列 1</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>系列 2</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>系列 3</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
