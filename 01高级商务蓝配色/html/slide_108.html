<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 62px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 30px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 18px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 12px 28px 12px; gap: 10px; }
  /* Top row */
  .top-row { display: flex; gap: 10px; height: 248px; }
  /* Left: 2 donut charts */
  .donuts-panel { width: 370px; border: 1.5px solid #dde4f0; display: flex; align-items: center; justify-content: space-around; padding: 14px; flex-shrink: 0; }
  .donut-item { display: flex; flex-direction: column; align-items: center; }
  .donut-label { font-size: 14px; font-weight: 700; color: #1a3a6b; margin-top: 6px; }
  .donut-sub { font-size: 11px; color: #888; }
  /* Right: icons + title */
  .info-panel { flex: 1; border: 1.5px solid #dde4f0; padding: 16px 20px; display: flex; flex-direction: column; }
  /* Icons row with gradient background strip */
  .icons-strip { position: relative; height: 68px; display: flex; align-items: center; margin-bottom: 14px; }
  .icons-bg { position: absolute; left: -5px; right: -5px; top: 8px; bottom: 8px; background: linear-gradient(to right, #c8d8ec 0%, #e8eef5 60%, #f0f4f8 100%); border-radius: 4px; }
  .icons-row { position: relative; display: flex; gap: 10px; align-items: center; z-index: 1; }
  .icon-circle { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .info-title { font-size: 26px; font-weight: 900; color: #1a3a6b; margin-bottom: 10px; }
  .info-desc { font-size: 12px; color: #555; line-height: 1.7; }
  /* Bottom row: 3 charts */
  .bottom-row { flex: 1; display: flex; gap: 10px; }
  .chart-box { flex: 1; border: 1.5px solid #dde4f0; padding: 10px 12px; display: flex; flex-direction: column; }
  .chart-box-title { font-size: 13px; color: #888; text-align: center; margin-bottom: 6px; }
  .chart-content { flex: 1; display: flex; align-items: center; justify-content: center; }
  .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
  .legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">产品销售业绩汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>

  <div class="body">
    <!-- Top row -->
    <div class="top-row">
      <!-- 2 donut charts -->
      <div class="donuts-panel">
        <div class="donut-item">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="52" fill="none" stroke="#e8edf5" stroke-width="20"/>
            <circle cx="70" cy="70" r="52" fill="none" stroke="#1a3a6b" stroke-width="20"
              stroke-dasharray="117 210" stroke-dashoffset="-82" stroke-linecap="butt"/>
            <circle cx="70" cy="70" r="52" fill="none" stroke="#3a6abf" stroke-width="20"
              stroke-dasharray="82 245" stroke-dashoffset="-199" stroke-linecap="butt"/>
            <text x="70" y="64" text-anchor="middle" font-size="26" font-weight="900" fill="#1a3a6b">35%</text>
            <text x="70" y="82" text-anchor="middle" font-size="11" fill="#888">占比</text>
          </svg>
          <div class="donut-label">项目业绩</div>
          <div class="donut-sub">公司产品A：占比35%</div>
        </div>
        <div class="donut-item">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="52" fill="none" stroke="#e8edf5" stroke-width="20"/>
            <circle cx="70" cy="70" r="52" fill="none" stroke="#6a9ac4" stroke-width="20"
              stroke-dasharray="205 122" stroke-dashoffset="-82" stroke-linecap="butt"/>
            <circle cx="70" cy="70" r="52" fill="none" stroke="#9ab8d4" stroke-width="20"
              stroke-dasharray="122 205" stroke-dashoffset="-287" stroke-linecap="butt"/>
            <text x="70" y="64" text-anchor="middle" font-size="26" font-weight="900" fill="#1a3a6b">65%</text>
            <text x="70" y="82" text-anchor="middle" font-size="11" fill="#888">占比</text>
          </svg>
          <div class="donut-label">项目业绩</div>
          <div class="donut-sub">公司产品B：占比65%</div>
        </div>
      </div>

      <!-- Info panel -->
      <div class="info-panel">
        <div class="icons-strip">
          <div class="icons-bg"></div>
          <div class="icons-row">
            <div class="icon-circle" style="background:#1a3a6b;">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="white" stroke-width="2"/><line x1="8" y1="8" x2="16" y2="8" stroke="white" stroke-width="1.5"/><line x1="8" y1="12" x2="16" y2="12" stroke="white" stroke-width="1.5"/><line x1="8" y1="16" x2="12" y2="16" stroke="white" stroke-width="1.5"/></svg>
            </div>
            <div class="icon-circle" style="background:#8a9aaa;">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="white" stroke-width="2"/><rect x="7" y="12" width="3" height="6" fill="white"/><rect x="11" y="9" width="3" height="9" fill="white"/><rect x="15" y="6" width="3" height="12" fill="white"/></svg>
            </div>
            <div class="icon-circle" style="background:#8a9aaa;">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="white" stroke-width="2"/><polyline points="6,16 10,11 14,14 18,8" stroke="white" stroke-width="1.8" fill="none"/></svg>
            </div>
            <div class="icon-circle" style="background:#8a9aaa;">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="white" stroke-width="2"/><line x1="8" y1="8" x2="16" y2="8" stroke="white" stroke-width="1.5"/><line x1="8" y1="12" x2="16" y2="12" stroke="white" stroke-width="1.5"/><line x1="8" y1="16" x2="12" y2="16" stroke="white" stroke-width="1.5"/></svg>
            </div>
            <div class="icon-circle" style="background:#1a3a6b;">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="white" stroke-width="2"/><polyline points="6,14 10,18 18,7" stroke="white" stroke-width="1.8" fill="none"/></svg>
            </div>
          </div>
        </div>
        <div class="info-title">总体业绩概览</div>
        <div class="info-desc">分析当前市场状况，包括竞争对手、市场趋势等，使用图表或图像展示市场份额、销售增长情况等数据</div>
      </div>
    </div>

    <!-- Bottom row: 3 charts -->
    <div class="bottom-row">
      <!-- Pie chart -->
      <div class="chart-box">
        <div class="chart-box-title">季度销售额占比</div>
        <div class="chart-content">
          <svg width="200" height="160" viewBox="0 0 200 160">
            <!-- Pie: Q1=15%, Q2=20%, Q3=10%, Q4=60% -->
            <path d="M 90,80 L 90,12 A 68,68 0 0,1 140,46 Z" fill="#1a3a6b"/>
            <path d="M 90,80 L 140,46 A 68,68 0 0,1 155,80 Z" fill="#3a6abf"/>
            <path d="M 90,80 L 155,80 A 68,68 0 0,1 140,114 Z" fill="#8ab0d0"/>
            <path d="M 90,80 L 140,114 A 68,68 0 1,1 90,12 Z" fill="#c0d4e8"/>
            <!-- Labels inside/outside -->
            <text x="118" y="48" font-size="9" fill="white" text-anchor="middle">第一季度</text>
            <text x="118" y="59" font-size="9" fill="white" text-anchor="middle">占比15%</text>
            <text x="158" y="82" font-size="9" fill="#555" text-anchor="start">第三季度</text>
            <text x="158" y="93" font-size="9" fill="#555" text-anchor="start">占比10%</text>
            <text x="20" y="130" font-size="9" fill="#555" text-anchor="start">第二季度</text>
            <text x="20" y="141" font-size="9" fill="#555" text-anchor="start">占比20%</text>
            <text x="5" y="78" font-size="9" fill="#555" text-anchor="start">第四季度</text>
            <text x="5" y="89" font-size="9" fill="#555" text-anchor="start">占比60%</text>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>第一季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>第二季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>第三季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#c0d4e8;"></div>第四季度</div>
        </div>
      </div>

      <!-- Bar chart -->
      <div class="chart-box">
        <div class="chart-box-title">季度销售额明细</div>
        <div class="chart-content">
          <svg width="280" height="155" viewBox="0 0 280 155">
            <text x="18" y="18" font-size="10" fill="#888" text-anchor="middle">6</text>
            <text x="18" y="62" font-size="10" fill="#888" text-anchor="middle">4</text>
            <text x="18" y="107" font-size="10" fill="#888" text-anchor="middle">2</text>
            <text x="18" y="140" font-size="10" fill="#888" text-anchor="middle">0</text>
            <line x1="28" y1="140" x2="275" y2="140" stroke="#ddd" stroke-width="1"/>
            <!-- Cat1 -->
            <rect x="35" y="10" width="16" height="130" fill="#1a3a6b"/>
            <rect x="54" y="55" width="16" height="85" fill="#3a6abf"/>
            <rect x="73" y="75" width="16" height="65" fill="#8ab0d0"/>
            <!-- Cat2 -->
            <rect x="110" y="55" width="16" height="85" fill="#1a3a6b"/>
            <rect x="129" y="10" width="16" height="130" fill="#3a6abf"/>
            <rect x="148" y="75" width="16" height="65" fill="#8ab0d0"/>
            <!-- Cat3 -->
            <rect x="185" y="35" width="16" height="105" fill="#1a3a6b"/>
            <rect x="204" y="75" width="16" height="65" fill="#3a6abf"/>
            <rect x="223" y="55" width="16" height="85" fill="#8ab0d0"/>
            <!-- Cat4 -->
            <rect x="248" y="10" width="16" height="130" fill="#1a3a6b"/>
            <text x="64" y="153" font-size="10" fill="#555" text-anchor="middle">类别 1</text>
            <text x="139" y="153" font-size="10" fill="#555" text-anchor="middle">类别 2</text>
            <text x="214" y="153" font-size="10" fill="#555" text-anchor="middle">类别 3</text>
            <text x="256" y="153" font-size="10" fill="#555" text-anchor="middle">类别 4</text>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>系列 1</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>系列 2</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>系列 3</div>
        </div>
      </div>

      <!-- Area chart -->
      <div class="chart-box">
        <div class="chart-box-title">业绩销售折线图</div>
        <div class="chart-content">
          <svg width="280" height="155" viewBox="0 0 280 155">
            <text x="18" y="18" font-size="10" fill="#888" text-anchor="middle">15</text>
            <text x="18" y="62" font-size="10" fill="#888" text-anchor="middle">10</text>
            <text x="18" y="107" font-size="10" fill="#888" text-anchor="middle">5</text>
            <text x="18" y="140" font-size="10" fill="#888" text-anchor="middle">0</text>
            <line x1="28" y1="140" x2="275" y2="140" stroke="#ddd" stroke-width="1"/>
            <!-- Area 3 (lightest, bottom) -->
            <path d="M 35,115 L 100,110 L 165,112 L 230,105 L 265,103 L 265,140 L 35,140 Z" fill="#8ab0d0" opacity="0.85"/>
            <!-- Area 2 (medium) -->
            <path d="M 35,100 L 100,92 L 165,97 L 230,82 L 265,78 L 265,115 L 35,115 Z" fill="#3a6abf" opacity="0.85"/>
            <!-- Area 1 (dark, top) -->
            <path d="M 35,88 L 100,72 L 165,82 L 230,62 L 265,55 L 265,100 L 35,100 Z" fill="#1a3a6b" opacity="0.85"/>
            <text x="35" y="153" font-size="10" fill="#555" text-anchor="middle">类别 1</text>
            <text x="100" y="153" font-size="10" fill="#555" text-anchor="middle">类别 2</text>
            <text x="165" y="153" font-size="10" fill="#555" text-anchor="middle">类别 3</text>
            <text x="230" y="153" font-size="10" fill="#555" text-anchor="middle">类别 4</text>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>系列 1</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>系列 2</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>系列 3</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
