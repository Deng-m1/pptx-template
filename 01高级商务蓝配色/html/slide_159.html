<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .top-area { height: 380px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: white; }
  .thank-you { font-size: 110px; font-weight: 900; color: #1a3a6b; letter-spacing: 6px; }
  .desc { font-size: 16px; color: #1a3a6b; text-align: center; line-height: 1.8; max-width: 900px; }
  .bottom-area { flex: 1; position: relative; overflow: hidden; }
  .building-bg { width: 100%; height: 100%; background: linear-gradient(180deg, #2a4a7a 0%, #1a2a4a 100%); position: relative; }
  .building-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .info-pill { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a3a6b; color: white; font-size: 18px; font-weight: 700; padding: 12px 40px; border-radius: 30px; white-space: nowrap; }
</style>
</head>
<body>
<div class="slide">
  <div class="top-area">
    <div class="thank-you">THANK YOU</div>
    <div class="desc">Here you can describe the main work report content. Here you can describe the main work report content. Here you can describe the main work report content. Here you can describe the main work report content.</div>
  </div>
  <div class="bottom-area">
    <div class="building-bg">
      <svg class="building-svg" viewBox="0 0 1280 340" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#2a4a7a"/>
            <stop offset="100%" stop-color="#1a2a4a"/>
          </linearGradient>
        </defs>
        <rect width="1280" height="340" fill="url(#skyG)"/>
        <!-- Buildings silhouette -->
        <rect x="0" y="80" width="180" height="260" fill="#1a2a3a"/>
        <rect x="190" y="40" width="150" height="300" fill="#2a3a5a"/>
        <rect x="350" y="100" width="120" height="240" fill="#1a2a3a"/>
        <rect x="480" y="60" width="200" height="280" fill="#2a3a5a"/>
        <rect x="690" y="90" width="130" height="250" fill="#1a2a3a"/>
        <rect x="830" y="50" width="160" height="290" fill="#2a3a5a"/>
        <rect x="1000" y="110" width="110" height="230" fill="#1a2a3a"/>
        <rect x="1120" y="70" width="160" height="270" fill="#2a3a5a"/>
        <!-- Windows -->
        <rect x="20" y="100" width="12" height="16" fill="#f0c040" opacity="0.6"/>
        <rect x="40" y="100" width="12" height="16" fill="#f0c040" opacity="0.4"/>
        <rect x="60" y="100" width="12" height="16" fill="#f0c040" opacity="0.7"/>
        <rect x="200" y="60" width="12" height="16" fill="#f0c040" opacity="0.6"/>
        <rect x="220" y="60" width="12" height="16" fill="#f0c040" opacity="0.8"/>
        <rect x="490" y="80" width="12" height="16" fill="#f0c040" opacity="0.5"/>
        <rect x="510" y="80" width="12" height="16" fill="#f0c040" opacity="0.7"/>
        <rect x="840" y="70" width="12" height="16" fill="#f0c040" opacity="0.6"/>
        <rect x="860" y="70" width="12" height="16" fill="#f0c040" opacity="0.4"/>
      </svg>
    </div>
    <div class="info-pill">汇报人：小序&nbsp;&nbsp;&nbsp;&nbsp;汇报时间：8888年88月88日</div>
  </div>
</div>
</body>
</html>
