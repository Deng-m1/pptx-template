<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
    overflow: hidden;
  }
  .title {
    position: absolute;
    top: 132px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 130px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: 2px;
    color: #0a46a9;
    white-space: nowrap;
  }
  .desc {
    position: absolute;
    top: 341px;
    left: 50%;
    transform: translateX(-50%);
    width: 980px;
    font-size: 15px;
    line-height: 1.7;
    color: #143a6c;
    text-align: center;
  }
  .photo-band {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 1280px;
    height: 265px;
    background-image: linear-gradient(rgba(9,49,107,0.03), rgba(9,49,107,0.03)), url('../assets/slide_157_building.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center 68%;
    filter: contrast(1.01) saturate(0.92) brightness(1.02);
  }
  .info-pill {
    position: absolute;
    left: 50%;
    bottom: 54px;
    transform: translateX(-50%);
    min-width: 468px;
    padding: 10px 32px 12px;
    border-radius: 23px;
    background: #0f47a1;
    color: #ffffff;
    font-size: 20px;
    line-height: 1;
    white-space: nowrap;
    text-align: center;
    box-shadow: 0 8px 16px rgba(15, 71, 161, 0.14);
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="title">THANK YOU</div>
    <div class="desc">
      Here you can describe the main work report content. Here you can describe the main work report content. Here you can describe the main work report content. Here you can describe the main work report content.
    </div>
    <div class="photo-band"></div>
    <div class="info-pill">汇报人：小序　汇报时间：8888年88月88日</div>
  </div>
</body>
</html>
