<!DOCTYPE html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #fff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
  }
  .title {
    position: absolute;
    left: 48px;
    top: 31px;
    font-size: 31px;
    line-height: 1;
    font-weight: 900;
    color: #0f458e;
  }
  .subtitle {
    position: absolute;
    right: 48px;
    top: 49px;
    font-size: 19px;
    line-height: 1;
    font-style: italic;
    color: #123f82;
  }
  .top-line {
    position: absolute;
    left: 48px;
    top: 83px;
    width: 1184px;
    height: 2px;
    background: #1b5996;
  }
  .left-header, .right-header {
    position: absolute;
    top: 120px;
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 27px;
    font-weight: 700;
  }
  .left-header {
    left: 48px;
    width: 467px;
    background: #13469a;
  }
  .right-header {
    left: 531px;
    width: 701px;
    background: #608ccc;
  }
  .left-card {
    position: absolute;
    left: 48px;
    top: 196px;
    width: 467px;
    height: 359px;
    border: 1px solid #ececec;
    background: #fff;
  }
  .left-title {
    position: absolute;
    left: 55px;
    top: 22px;
    right: 55px;
    text-align: center;
    font-size: 22px;
    color: #767676;
  }
  .pie-legend {
    position: absolute;
    left: 50px;
    bottom: 18px;
    display: flex;
    gap: 18px;
    font-size: 14px;
    color: #6e6e6e;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 7px;
    height: 7px;
    background: #ccc;
  }
  .right-card {
    position: absolute;
    left: 531px;
    top: 196px;
    width: 701px;
    height: 359px;
    border: 1px solid #ececec;
    background: #fff;
  }
  .right-title {
    position: absolute;
    left: 0;
    right: 0;
    top: 23px;
    text-align: center;
    font-size: 22px;
    color: #767676;
  }
  .bottom-left {
    position: absolute;
    left: 48px;
    top: 571px;
    width: 467px;
    height: 114px;
    background: #13469a;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 26px;
  }
  .up-tri {
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 18px solid #fff;
    margin-right: 18px;
    margin-top: -8px;
  }
  .goal-copy {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.45;
    margin-right: 24px;
  }
  .goal-copy .small {
    font-size: 18px;
    font-weight: 700;
  }
  .goal-amount {
    font-size: 58px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.5px;
  }
  .bottom-right {
    position: absolute;
    left: 531px;
    top: 571px;
    width: 701px;
    height: 114px;
    background: #608ccc;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 28px 0 26px;
  }
  .explain {
    font-size: 18px;
    line-height: 1.7;
    margin-left: 22px;
  }
  svg text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
</style>
</head>
