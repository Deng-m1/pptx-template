<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; position: relative; }
  .top-bar { height: 76px; display: flex; align-items: center; justify-content: space-between; padding: 0 50px 0 82px; }
  .top-left { font-size: 15px; color: #2f2f2f; letter-spacing: 1.9px; }
  .top-left strong { font-weight: 900; letter-spacing: 3px; margin-right: 10px; }
  .logo-box { background: #0f47a1; color: white; font-size: 18px; font-weight: 700; letter-spacing: 2px; padding: 10px 30px 11px; min-width: 114px; text-align: center; }
  .content-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  .circle-bg { position: absolute; left: 81px; top: 50.5%; transform: translateY(-50%); width: 278px; height: 278px; border-radius: 50%; background: #c5d4e7; opacity: 0.95; }
  .text-area { position: relative; z-index: 1; text-align: center; margin-top: -12px; }
  .thank-you { font-size: 121px; font-weight: 900; color: #2e2c2d; letter-spacing: 2px; }
  .desc { font-size: 19px; color: #454545; margin-top: 16px; }
  .bottom-bar { height: 96px; display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 48px 0 99px; border-top: 1px solid #444; }
  .reporter { }
  .reporter-name { font-size: 24px; font-weight: 500; color: #333; line-height: 1.15; }
  .reporter-en { font-size: 13px; color: #9a9a9a; margin-top: 6px; }
  .time { font-size: 19px; color: #333; padding-top: 10px; }
  .time strong { color: #1a2d56; font-size: 21px; font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar">
    <div class="top-left"><strong>WORK REPORT</strong> GENERIC SUMMARY TEMPLATE</div>
    <div class="logo-box">LOGO</div>
  </div>
  <div class="content-area">
    <div class="circle-bg"></div>
    <div class="text-area">
      <div class="thank-you">THANK YOU</div>
      <div class="desc">Here you can describe the main work report content.</div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="reporter">
      <div class="reporter-name">汇报人：小序</div>
      <div class="reporter-en">Reporting person: XIAOXU</div>
    </div>
    <div class="time">汇报时间：<strong>8888年88月88日</strong></div>
  </div>
</div>
</body>
</html>
