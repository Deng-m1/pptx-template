<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 62px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 30px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 18px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 12px 28px 12px; gap: 10px; }
  /* Top row */
  .top-row { display: flex; gap: 10px; height: 110px; }
  .store-panel { width: 780px; background: #1a3a6b; padding: 12px 20px; display: flex; align-items: center; gap: 24px; flex-shrink: 0; }
  .store-item { display: flex; align-items: center; gap: 14px; }
  .store-divider { width: 1px; height: 56px; background: rgba(255,255,255,0.3); margin: 0 6px; }
  .store-name { font-size: 13px; color: rgba(255,255,255,0.85); margin-bottom: 3px; }
  .store-num { font-size: 30px; font-weight: 900; color: white; }
  .store-circle { width: 58px; height: 58px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 900; color: #1a3a6b; flex-shrink: 0; }
  .info-panel { flex: 1; border: 1.5px solid #dde4f0; padding: 12px 16px; display: flex; align-items: center; }
  .info-panel p { font-size: 12px; color: #555; line-height: 1.7; }
  /* Bottom area: left 2 bar charts + bottom area chart + right pie */
  .bottom-area { flex: 1; display: flex; gap: 10px; }
  /* Left column: 2 horizontal bar charts stacked */
  .left-col { width: 310px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
  .chart-box { border: 1.5px solid #dde4f0; padding: 10px 12px; display: flex; flex-direction: column; }
  /* Middle column: area chart */
  .mid-col { flex: 1; display: flex; flex-direction: column; }
  .area-box { flex: 1; border: 1.5px solid #dde4f0; padding: 10px 12px; display: flex; flex-direction: column; }
  /* Right column: pie chart */
  .right-col { width: 270px; flex-shrink: 0; }
  .pie-box { height: 100%; border: 1.5px solid #dde4f0; padding: 10px 12px; display: flex; flex-direction: column; }
  .chart-title { font-size: 13px; color: #888; text-align: center; margin-bottom: 6px; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
  .legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">门店业绩汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="top-row">
      <div class="store-panel">
        <div class="store-item">
          <div>
            <div class="store-name">上海路店</div>
            <div class="store-num">¥22380</div>
          </div>
          <div class="store-circle">42%</div>
        </div>
        <div class="store-divider"></div>
        <div class="store-item">
          <div>
            <div class="store-name">北京路店</div>
            <div class="store-num">¥33600</div>
          </div>
          <div class="store-circle">58%</div>
        </div>
      </div>
      <div class="info-panel">
        <p>我们对原始数据进行了清洗和整理，去除了缺失值和异常值，确保数据的准确性和可靠性。</p>
      </div>
    </div>

    <div class="bottom-area">
      <!-- Left: 2 horizontal bar charts -->
      <div class="left-col">
        <div class="chart-box" style="flex:1;">
          <svg width="100%" height="100%" viewBox="0 0 280 190" preserveAspectRatio="xMidYMid meet">
            <text x="62" y="32" font-size="11" fill="#555" text-anchor="end">项目产品C</text>
            <text x="62" y="82" font-size="11" fill="#555" text-anchor="end">项目产品B</text>
            <text x="62" y="132" font-size="11" fill="#555" text-anchor="end">项目产品A</text>
            <text x="68" y="165" font-size="10" fill="#888" text-anchor="middle">0</text>
            <text x="128" y="165" font-size="10" fill="#888" text-anchor="middle">2</text>
            <text x="188" y="165" font-size="10" fill="#888" text-anchor="middle">4</text>
            <text x="248" y="165" font-size="10" fill="#888" text-anchor="middle">6</text>
            <line x1="68" y1="15" x2="68" y2="150" stroke="#eee" stroke-width="1"/>
            <line x1="128" y1="15" x2="128" y2="150" stroke="#eee" stroke-width="1"/>
            <line x1="188" y1="15" x2="188" y2="150" stroke="#eee" stroke-width="1"/>
            <line x1="248" y1="15" x2="248" y2="150" stroke="#eee" stroke-width="1"/>
            <!-- C: beijing=3, shanghai=3.5 -->
            <rect x="68" y="18" width="90" height="13" fill="#8ab0d0"/>
            <rect x="68" y="34" width="105" height="13" fill="#1a3a6b"/>
            <!-- B: beijing=2, shanghai=3.5 -->
            <rect x="68" y="68" width="60" height="13" fill="#8ab0d0"/>
            <rect x="68" y="84" width="105" height="13" fill="#1a3a6b"/>
            <!-- A: beijing=3.5, shanghai=4 -->
            <rect x="68" y="118" width="105" height="13" fill="#8ab0d0"/>
            <rect x="68" y="134" width="120" height="13" fill="#1a3a6b"/>
          </svg>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>北京路店</div>
            <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>上海路店</div>
          </div>
        </div>
        <div class="chart-box" style="flex:1;">
          <svg width="100%" height="100%" viewBox="0 0 280 190" preserveAspectRatio="xMidYMid meet">
            <text x="62" y="32" font-size="11" fill="#555" text-anchor="end">项目产品C</text>
            <text x="62" y="82" font-size="11" fill="#555" text-anchor="end">项目产品B</text>
            <text x="62" y="132" font-size="11" fill="#555" text-anchor="end">项目产品A</text>
            <text x="68" y="165" font-size="10" fill="#888" text-anchor="middle">0</text>
            <text x="128" y="165" font-size="10" fill="#888" text-anchor="middle">2</text>
            <text x="188" y="165" font-size="10" fill="#888" text-anchor="middle">4</text>
            <text x="248" y="165" font-size="10" fill="#888" text-anchor="middle">6</text>
            <line x1="68" y1="15" x2="68" y2="150" stroke="#eee" stroke-width="1"/>
            <line x1="128" y1="15" x2="128" y2="150" stroke="#eee" stroke-width="1"/>
            <line x1="188" y1="15" x2="188" y2="150" stroke="#eee" stroke-width="1"/>
            <line x1="248" y1="15" x2="248" y2="150" stroke="#eee" stroke-width="1"/>
            <!-- C: beijing=2, shanghai=3 -->
            <rect x="68" y="18" width="60" height="13" fill="#8ab0d0"/>
            <rect x="68" y="34" width="90" height="13" fill="#1a3a6b"/>
            <!-- B: beijing=1.5, shanghai=3 -->
            <rect x="68" y="68" width="45" height="13" fill="#8ab0d0"/>
            <rect x="68" y="84" width="90" height="13" fill="#1a3a6b"/>
            <!-- A: beijing=3, shanghai=4 -->
            <rect x="68" y="118" width="90" height="13" fill="#8ab0d0"/>
            <rect x="68" y="134" width="120" height="13" fill="#1a3a6b"/>
          </svg>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>北京路店</div>
            <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>上海路店</div>
          </div>
        </div>
      </div>

      <!-- Middle: area chart -->
      <div class="mid-col">
        <div class="area-box">
          <svg width="100%" height="100%" viewBox="0 0 420 290" preserveAspectRatio="xMidYMid meet">
            <!-- Area 3 (lightest, widest) -->
            <path d="M 20,240 L 140,200 L 260,160 L 380,175 L 410,155 L 410,265 L 20,265 Z" fill="#b0c8e0" opacity="0.9"/>
            <!-- Area 2 (medium) -->
            <path d="M 20,245 L 140,215 L 260,185 L 380,195 L 410,178 L 410,265 L 20,265 Z" fill="#3a6abf" opacity="0.85"/>
            <!-- Area 1 (darkest, bottom) -->
            <path d="M 20,250 L 140,230 L 260,210 L 380,218 L 410,205 L 410,265 L 20,265 Z" fill="#1a3a6b" opacity="0.9"/>
            <text x="20" y="282" font-size="11" fill="#555" text-anchor="middle">第一季度</text>
            <text x="140" y="282" font-size="11" fill="#555" text-anchor="middle">第二季度</text>
            <text x="260" y="282" font-size="11" fill="#555" text-anchor="middle">第三季度</text>
            <text x="380" y="282" font-size="11" fill="#555" text-anchor="middle">第四季度</text>
          </svg>
        </div>
      </div>

      <!-- Right: pie chart -->
      <div class="right-col">
        <div class="pie-box">
          <div class="chart-title">店铺销售额月度占比</div>
          <div style="flex:1; display:flex; align-items:center; justify-content:center;">
            <svg width="220" height="200" viewBox="0 0 220 200">
              <!-- Pie: 20%, 20%, 30%, 30% -->
              <path d="M 110,100 L 110,20 A 80,80 0 0,1 163,50 Z" fill="#1a3a6b"/>
              <path d="M 110,100 L 163,50 A 80,80 0 0,1 190,100 Z" fill="#3a6abf"/>
              <path d="M 110,100 L 190,100 A 80,80 0 0,1 110,180 Z" fill="#8ab0d0"/>
              <path d="M 110,100 L 110,180 A 80,80 0 0,1 110,20 Z" fill="#c0d4e8"/>
              <!-- Labels -->
              <text x="148" y="62" font-size="14" font-weight="700" fill="white">20%</text>
              <text x="162" y="105" font-size="14" font-weight="700" fill="white">20%</text>
              <text x="118" y="158" font-size="14" font-weight="700" fill="#555">30%</text>
              <text x="42" y="100" font-size="14" font-weight="700" fill="#555">30%</text>
            </svg>
          </div>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>第一季度</div>
            <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>第二季度</div>
            <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>第一季度</div>
            <div class="legend-item"><div class="legend-dot" style="background:#c0d4e8;"></div>第二季度</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
