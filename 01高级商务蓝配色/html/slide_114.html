<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 14px 30px; gap: 12px; }
  /* Top row */
  .top-row { display: flex; gap: 12px; height: 120px; }
  .store-panel { flex: 2; background: #1a3a6b; border-radius: 4px; padding: 14px 20px; display: flex; align-items: center; gap: 30px; }
  .store-item { display: flex; align-items: center; gap: 16px; }
  .store-divider { width: 1px; height: 60px; background: rgba(255,255,255,0.3); }
  .store-name { font-size: 14px; color: rgba(255,255,255,0.85); margin-bottom: 4px; }
  .store-num { font-size: 32px; font-weight: 900; color: white; }
  .store-circle { width: 60px; height: 60px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: #1a3a6b; flex-shrink: 0; }
  .info-panel { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 14px; display: flex; align-items: center; }
  .info-panel p { font-size: 12px; color: #555; line-height: 1.7; }
  /* Bottom row */
  .bottom-row { flex: 1; display: flex; gap: 12px; }
  .chart-box { border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; }
  .chart-title { font-size: 13px; color: #888; text-align: center; margin-bottom: 8px; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">门店业绩汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="top-row">
      <div class="store-panel">
        <div class="store-item">
          <div>
            <div class="store-name">上海路店</div>
            <div class="store-num">¥22380</div>
          </div>
          <div class="store-circle">42%</div>
        </div>
        <div class="store-divider"></div>
        <div class="store-item">
          <div>
            <div class="store-name">北京路店</div>
            <div class="store-num">¥33600</div>
          </div>
          <div class="store-circle">58%</div>
        </div>
      </div>
      <div class="info-panel">
        <p>我们对原始数据进行了清洗和整理，去除了缺失值和异常值，确保数据的准确性和可靠性。</p>
      </div>
    </div>
    <div class="bottom-row">
      <!-- Horizontal bar charts -->
      <div class="chart-box" style="width:320px;">
        <svg width="100%" height="100%" viewBox="0 0 300 200" preserveAspectRatio="xMidYMid meet">
          <!-- Y axis labels -->
          <text x="60" y="35" font-size="11" fill="#555" text-anchor="end">项目产品C</text>
          <text x="60" y="85" font-size="11" fill="#555" text-anchor="end">项目产品B</text>
          <text x="60" y="135" font-size="11" fill="#555" text-anchor="end">项目产品A</text>
          <!-- X axis -->
          <text x="70" y="175" font-size="10" fill="#888" text-anchor="middle">0</text>
          <text x="130" y="175" font-size="10" fill="#888" text-anchor="middle">2</text>
          <text x="190" y="175" font-size="10" fill="#888" text-anchor="middle">4</text>
          <text x="250" y="175" font-size="10" fill="#888" text-anchor="middle">6</text>
          <!-- Grid lines vertical -->
          <line x1="70" y1="15" x2="70" y2="155" stroke="#eee" stroke-width="1"/>
          <line x1="130" y1="15" x2="130" y2="155" stroke="#eee" stroke-width="1"/>
          <line x1="190" y1="15" x2="190" y2="155" stroke="#eee" stroke-width="1"/>
          <line x1="250" y1="15" x2="250" y2="155" stroke="#eee" stroke-width="1"/>
          <!-- Bars: C: beijing=3, shanghai=3.5; B: beijing=2, shanghai=3.5; A: beijing=3.5, shanghai=4 -->
          <rect x="70" y="20" width="90" height="14" fill="#8ab0d0"/>
          <rect x="70" y="38" width="105" height="14" fill="#1a3a6b"/>
          <rect x="70" y="70" width="60" height="14" fill="#8ab0d0"/>
          <rect x="70" y="88" width="105" height="14" fill="#1a3a6b"/>
          <rect x="70" y="120" width="105" height="14" fill="#8ab0d0"/>
          <rect x="70" y="138" width="120" height="14" fill="#1a3a6b"/>
        </svg>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>北京路店</div>
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>上海路店</div>
        </div>
      </div>
      <div class="chart-box" style="width:280px;">
        <svg width="100%" height="100%" viewBox="0 0 260 200" preserveAspectRatio="xMidYMid meet">
          <text x="60" y="35" font-size="11" fill="#555" text-anchor="end">项目产品C</text>
          <text x="60" y="85" font-size="11" fill="#555" text-anchor="end">项目产品B</text>
          <text x="60" y="135" font-size="11" fill="#555" text-anchor="end">项目产品A</text>
          <text x="70" y="175" font-size="10" fill="#888" text-anchor="middle">0</text>
          <text x="115" y="175" font-size="10" fill="#888" text-anchor="middle">2</text>
          <text x="160" y="175" font-size="10" fill="#888" text-anchor="middle">4</text>
          <text x="205" y="175" font-size="10" fill="#888" text-anchor="middle">6</text>
          <line x1="70" y1="15" x2="70" y2="155" stroke="#eee" stroke-width="1"/>
          <line x1="115" y1="15" x2="115" y2="155" stroke="#eee" stroke-width="1"/>
          <line x1="160" y1="15" x2="160" y2="155" stroke="#eee" stroke-width="1"/>
          <line x1="205" y1="15" x2="205" y2="155" stroke="#eee" stroke-width="1"/>
          <rect x="70" y="20" width="67" height="14" fill="#8ab0d0"/>
          <rect x="70" y="38" width="90" height="14" fill="#1a3a6b"/>
          <rect x="70" y="70" width="45" height="14" fill="#8ab0d0"/>
          <rect x="70" y="88" width="90" height="14" fill="#1a3a6b"/>
          <rect x="70" y="120" width="90" height="14" fill="#8ab0d0"/>
          <rect x="70" y="138" width="112" height="14" fill="#1a3a6b"/>
        </svg>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>北京路店</div>
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>上海路店</div>
        </div>
      </div>
      <!-- Area chart -->
      <div class="chart-box" style="flex:1;">
        <svg width="100%" height="100%" viewBox="0 0 340 200" preserveAspectRatio="xMidYMid meet">
          <!-- Area chart -->
          <path d="M 20,160 L 100,120 L 180,80 L 260,90 L 320,70 L 320,175 L 20,175 Z" fill="#1a3a6b" opacity="0.8"/>
          <path d="M 20,165 L 100,140 L 180,110 L 260,120 L 320,100 L 320,175 L 20,175 Z" fill="#3a6abf" opacity="0.8"/>
          <path d="M 20,168 L 100,155 L 180,140 L 260,148 L 320,135 L 320,175 L 20,175 Z" fill="#8ab0d0" opacity="0.8"/>
          <text x="20" y="192" font-size="10" fill="#555" text-anchor="middle">第一季度</text>
          <text x="100" y="192" font-size="10" fill="#555" text-anchor="middle">第二季度</text>
          <text x="180" y="192" font-size="10" fill="#555" text-anchor="middle">第三季度</text>
          <text x="260" y="192" font-size="10" fill="#555" text-anchor="middle">第四季度</text>
        </svg>
      </div>
      <!-- Pie chart -->
      <div class="chart-box" style="width:260px;">
        <div class="chart-title">店铺销售额月度占比</div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center;">
          <svg width="180" height="160" viewBox="0 0 180 160">
            <path d="M 90,80 L 90,10 A 70,70 0 0,1 143.6,45 Z" fill="#1a3a6b"/>
            <path d="M 90,80 L 143.6,45 A 70,70 0 0,1 143.6,115 Z" fill="#3a6abf"/>
            <path d="M 90,80 L 143.6,115 A 70,70 0 0,1 36.4,115 Z" fill="#8ab0d0"/>
            <path d="M 90,80 L 36.4,115 A 70,70 0 0,1 90,10 Z" fill="#c0d4e8"/>
            <text x="120" y="55" font-size="13" font-weight="700" fill="white">20%</text>
            <text x="130" y="90" font-size="13" font-weight="700" fill="white">20%</text>
            <text x="70" y="130" font-size="13" font-weight="700" fill="#555">30%</text>
            <text x="30" y="70" font-size="13" font-weight="700" fill="#555">30%</text>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>第一季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>第二季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>第一季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#c0d4e8;"></div>第二季度</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
