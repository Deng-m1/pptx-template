<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; background: #fff; }
  .header { height: 66px; padding: 10px 40px 0; border-bottom: 2px solid #143f8f; display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #143f8f; line-height: 1; }
  .header-sub { font-size: 20px; color: #143f8f; font-style: italic; line-height: 1; margin-top: 10px; }

  .body { flex: 1; padding: 22px 46px 32px; display: flex; flex-direction: column; gap: 18px; }
  .main-row { flex: 1; display: flex; gap: 34px; }

  .left-col { width: 600px; position: relative; }
  .circle { position: absolute; top: 6px; width: 330px; height: 330px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
  .circle.left { left: 0; background: #153f97; z-index: 2; }
  .circle.right { left: 275px; background: #5c89c7; z-index: 1; }
  .pct { font-size: 82px; font-weight: 900; line-height: 1; letter-spacing: 1px; text-shadow: 0 1px 0 rgba(0,0,0,0.05); }
  .label { margin-top: 12px; font-size: 24px; line-height: 1.1; color: rgba(255,255,255,0.98); }
  .overlap { position: absolute; top: 6px; left: 275px; width: 55px; height: 330px; background: rgba(255,255,255,0.55); border-radius: 28px; z-index: 3; }

  .right-col { flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .chart-box { flex: 1; border: 1px solid #e7eaef; padding: 14px 18px; background: #fff; }
  .chart { width: 100%; height: 100%; display: block; }
  .cat { font-size: 11px; fill: #666; }
  .axis { font-size: 10px; fill: #777; }
  .grid { stroke: #e9edf2; stroke-width: 1; }
  .base { fill: #6e98c9; }
  .front { fill: #153f97; }

  .bottom-cards { height: 198px; display: flex; gap: 16px; }
  .card { flex: 1; padding: 16px 24px 12px; color: #fff; display: flex; flex-direction: column; }
  .card h3 { font-size: 28px; font-weight: 900; line-height: 1; margin-bottom: 18px; }
  .card .num { font-size: 56px; font-weight: 900; line-height: 1; margin-bottom: 14px; letter-spacing: 0.5px; }
  .card p { font-size: 13px; line-height: 1.8; color: rgba(255,255,255,0.92); max-width: 250px; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="header-title">部门销售业绩汇报 Powerpoint Template</div>
    <div class="header-sub">Work Arrangement</div>
  </div>

  <div class="body">
    <div class="main-row">
      <div class="left-col">
        <div class="circle left">
          <div class="pct">65%</div>
          <div class="label">线上销售占比</div>
        </div>
        <div class="circle right">
          <div class="pct">35%</div>
          <div class="label">线下销售占比</div>
        </div>
        <div class="overlap"></div>
      </div>

      <div class="right-col">
        <div class="chart-box">
          <svg class="chart" viewBox="0 0 520 150" preserveAspectRatio="none">
            <line class="grid" x1="70" y1="20" x2="70" y2="120"/>
            <line class="grid" x1="154" y1="20" x2="154" y2="120"/>
            <line class="grid" x1="238" y1="20" x2="238" y2="120"/>
            <line class="grid" x1="322" y1="20" x2="322" y2="120"/>
            <line class="grid" x1="406" y1="20" x2="406" y2="120"/>
            <line class="grid" x1="490" y1="20" x2="490" y2="120"/>

            <text class="cat" x="60" y="39" text-anchor="end">项目产品C</text>
            <text class="cat" x="60" y="74" text-anchor="end">项目产品B</text>
            <text class="cat" x="60" y="109" text-anchor="end">项目产品A</text>

            <rect class="base" x="70" y="28" width="150" height="12"/>
            <rect class="front" x="70" y="35" width="282" height="12"/>

            <rect class="base" x="70" y="63" width="360" height="12"/>
            <rect class="front" x="70" y="70" width="212" height="12"/>

            <rect class="base" x="70" y="98" width="202" height="12"/>
            <rect class="front" x="70" y="105" width="352" height="12"/>

            <text class="axis" x="70" y="142" text-anchor="middle">0</text>
            <text class="axis" x="154" y="142" text-anchor="middle">1</text>
            <text class="axis" x="238" y="142" text-anchor="middle">2</text>
            <text class="axis" x="322" y="142" text-anchor="middle">3</text>
            <text class="axis" x="406" y="142" text-anchor="middle">4</text>
            <text class="axis" x="490" y="142" text-anchor="middle">5</text>
          </svg>
        </div>

        <div class="chart-box">
          <svg class="chart" viewBox="0 0 520 150" preserveAspectRatio="none">
            <line class="grid" x1="70" y1="20" x2="70" y2="120"/>
            <line class="grid" x1="154" y1="20" x2="154" y2="120"/>
            <line class="grid" x1="238" y1="20" x2="238" y2="120"/>
            <line class="grid" x1="322" y1="20" x2="322" y2="120"/>
            <line class="grid" x1="406" y1="20" x2="406" y2="120"/>
            <line class="grid" x1="490" y1="20" x2="490" y2="120"/>

            <text class="cat" x="60" y="39" text-anchor="end">项目产品C</text>
            <text class="cat" x="60" y="74" text-anchor="end">项目产品B</text>
            <text class="cat" x="60" y="109" text-anchor="end">项目产品A</text>

            <rect class="base" x="70" y="28" width="150" height="12"/>
            <rect class="front" x="70" y="35" width="282" height="12"/>

            <rect class="base" x="70" y="63" width="360" height="12"/>
            <rect class="front" x="70" y="70" width="212" height="12"/>

            <rect class="base" x="70" y="98" width="202" height="12"/>
            <rect class="front" x="70" y="105" width="352" height="12"/>

            <text class="axis" x="70" y="142" text-anchor="middle">0</text>
            <text class="axis" x="154" y="142" text-anchor="middle">1</text>
            <text class="axis" x="238" y="142" text-anchor="middle">2</text>
            <text class="axis" x="322" y="142" text-anchor="middle">3</text>
            <text class="axis" x="406" y="142" text-anchor="middle">4</text>
            <text class="axis" x="490" y="142" text-anchor="middle">5</text>
          </svg>
        </div>
      </div>
    </div>

    <div class="bottom-cards">
      <div class="card" style="background:#153f97;">
        <h3>营运一部</h3>
        <div class="num">+41390</div>
        <p>我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</p>
      </div>
      <div class="card" style="background:#5d89c8;">
        <h3>营运二部</h3>
        <div class="num">+34130</div>
        <p>我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</p>
      </div>
      <div class="card" style="background:#88add0;">
        <h3>营运三部</h3>
        <div class="num">+43120</div>
        <p>我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</p>
      </div>
      <div class="card" style="background:#b2c6e1;">
        <h3>营运四部</h3>
        <div class="num">+72410</div>
        <p>我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
