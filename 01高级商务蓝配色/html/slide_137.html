<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 14px 24px; gap: 12px; }
  .main-row { flex: 1; display: flex; gap: 14px; }
  .left-col { width: 480px; display: flex; align-items: center; justify-content: center; position: relative; }
  .circle-65 { width: 260px; height: 260px; border-radius: 50%; background: #1a3a6b; display: flex; flex-direction: column; align-items: center; justify-content: center; position: absolute; left: 0; z-index: 2; }
  .circle-35 { width: 260px; height: 260px; border-radius: 50%; background: #6a9ac4; display: flex; flex-direction: column; align-items: center; justify-content: center; position: absolute; left: 160px; z-index: 1; }
  .circle-pct { font-size: 52px; font-weight: 900; color: white; }
  .circle-label { font-size: 16px; color: rgba(255,255,255,0.9); }
  .right-col { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .chart-box { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; }
  .chart-title { font-size: 12px; color: #888; margin-bottom: 8px; }
  .bottom-cards { display: flex; gap: 10px; height: 110px; }
  .stat-card { flex: 1; border-radius: 4px; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
  .card-label { font-size: 14px; font-weight: 700; color: white; }
  .card-num { font-size: 28px; font-weight: 900; color: white; }
  .card-desc { font-size: 11px; color: rgba(255,255,255,0.8); line-height: 1.5; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">部门销售业绩汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="main-row">
      <div class="left-col">
        <div class="circle-65">
          <span class="circle-pct">65%</span>
          <span class="circle-label">线上销售占比</span>
        </div>
        <div class="circle-35">
          <span class="circle-pct">35%</span>
          <span class="circle-label">线下销售占比</span>
        </div>
      </div>
      <div class="right-col">
        <div class="chart-box">
          <svg width="100%" height="100%" viewBox="0 0 600 180" preserveAspectRatio="xMidYMid meet">
            <text x="80" y="30" font-size="11" fill="#555" text-anchor="end">项目产品C</text>
            <rect x="90" y="18" width="130" height="16" fill="#8ab0d0"/>
            <rect x="90" y="18" width="280" height="16" fill="none" stroke="#dde4f0" stroke-width="1"/>
            <rect x="90" y="18" width="280" height="16" fill="#1a3a6b" opacity="0.3"/>
            <rect x="90" y="18" width="130" height="16" fill="#8ab0d0"/>
            <line x1="370" y1="18" x2="370" y2="34" stroke="#1a3a6b" stroke-width="2"/>
            <rect x="370" y="18" width="100" height="16" fill="#1a3a6b"/>
            <text x="80" y="65" font-size="11" fill="#555" text-anchor="end">项目产品B</text>
            <rect x="90" y="53" width="100" height="16" fill="#8ab0d0"/>
            <rect x="90" y="53" width="280" height="16" fill="none" stroke="#dde4f0" stroke-width="1"/>
            <rect x="370" y="53" width="130" height="16" fill="#1a3a6b"/>
            <text x="80" y="100" font-size="11" fill="#555" text-anchor="end">项目产品A</text>
            <rect x="90" y="88" width="80" height="16" fill="#8ab0d0"/>
            <rect x="90" y="88" width="280" height="16" fill="none" stroke="#dde4f0" stroke-width="1"/>
            <rect x="370" y="88" width="150" height="16" fill="#1a3a6b"/>
            <line x1="90" y1="115" x2="590" y2="115" stroke="#eee" stroke-width="1"/>
            <text x="90" y="130" font-size="10" fill="#888">0</text>
            <text x="215" y="130" font-size="10" fill="#888">1</text>
            <text x="340" y="130" font-size="10" fill="#888">2</text>
            <text x="465" y="130" font-size="10" fill="#888">4</text>
            <text x="565" y="130" font-size="10" fill="#888">5</text>
          </svg>
        </div>
        <div class="chart-box">
          <svg width="100%" height="100%" viewBox="0 0 600 180" preserveAspectRatio="xMidYMid meet">
            <text x="80" y="30" font-size="11" fill="#555" text-anchor="end">项目产品C</text>
            <rect x="90" y="18" width="100" height="16" fill="#8ab0d0"/>
            <rect x="90" y="18" width="280" height="16" fill="none" stroke="#dde4f0" stroke-width="1"/>
            <rect x="370" y="18" width="120" height="16" fill="#1a3a6b"/>
            <text x="80" y="65" font-size="11" fill="#555" text-anchor="end">项目产品B</text>
            <rect x="90" y="53" width="120" height="16" fill="#8ab0d0"/>
            <rect x="90" y="53" width="280" height="16" fill="none" stroke="#dde4f0" stroke-width="1"/>
            <rect x="370" y="53" width="150" height="16" fill="#1a3a6b"/>
            <text x="80" y="100" font-size="11" fill="#555" text-anchor="end">项目产品A</text>
            <rect x="90" y="88" width="90" height="16" fill="#8ab0d0"/>
            <rect x="90" y="88" width="280" height="16" fill="none" stroke="#dde4f0" stroke-width="1"/>
            <rect x="370" y="88" width="140" height="16" fill="#1a3a6b"/>
            <line x1="90" y1="115" x2="590" y2="115" stroke="#eee" stroke-width="1"/>
            <text x="90" y="130" font-size="10" fill="#888">0</text>
            <text x="215" y="130" font-size="10" fill="#888">1</text>
            <text x="340" y="130" font-size="10" fill="#888">2</text>
            <text x="465" y="130" font-size="10" fill="#888">4</text>
            <text x="565" y="130" font-size="10" fill="#888">5</text>
          </svg>
        </div>
      </div>
    </div>
    <div class="bottom-cards">
      <div class="stat-card" style="background:#1a3a6b;">
        <div class="card-label">营运一部</div>
        <div class="card-num">+41390</div>
        <div class="card-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</div>
      </div>
      <div class="stat-card" style="background:#3a6abf;">
        <div class="card-label">营运二部</div>
        <div class="card-num">+34130</div>
        <div class="card-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</div>
      </div>
      <div class="stat-card" style="background:#6a9ac4;">
        <div class="card-label">营运三部</div>
        <div class="card-num">+43120</div>
        <div class="card-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</div>
      </div>
      <div class="stat-card" style="background:#9ab8d4;">
        <div class="card-label">营运四部</div>
        <div class="card-num">+72410</div>
        <div class="card-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
