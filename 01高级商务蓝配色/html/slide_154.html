<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px 30px; position: relative; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 0; width: 1180px; height: 580px; position: relative; }
  .cell { padding: 24px 28px; display: flex; flex-direction: column; }
  .cell-num { font-size: 48px; font-weight: 900; }
  .cell-icon { font-size: 24px; }
  .cell-desc { font-size: 12px; line-height: 1.7; margin-top: 8px; }
  .cell-header { display: flex; align-items: flex-start; justify-content: space-between; }
  /* Center circle overlay */
  .center-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">工作汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="grid">
      <!-- Top-left: 01 dark blue -->
      <div class="cell" style="background:#1a3a6b;">
        <div class="cell-header">
          <span class="cell-num" style="color:white;">01</span>
          <span class="cell-icon" style="color:white;">🎯</span>
        </div>
        <div class="cell-desc" style="color:rgba(255,255,255,0.85);">统一品牌策略是指企业将经营的所有系列产品使用同一品牌的策略。使用同一策略，有利于建立"企业识别系统"</div>
      </div>
      <!-- Top-right: 02 gray -->
      <div class="cell" style="background:#c0c8d4;">
        <div class="cell-header" style="flex-direction:row-reverse;">
          <span class="cell-num" style="color:white;">02</span>
          <span class="cell-icon" style="color:white;">🎯</span>
        </div>
        <div class="cell-desc" style="color:rgba(255,255,255,0.9);">统一品牌策略是指企业将经营的所有系列产品使用同一品牌的策略。使用同一策略，有利于建立"企业识别系统"</div>
      </div>
      <!-- Bottom-left: 04 dashed border -->
      <div class="cell" style="border: 2px dashed #c0c8d4;">
        <div class="cell-desc" style="color:#888; margin-bottom:8px;">统一品牌策略是指企业将经营的所有系列产品使用同一品牌的策略。使用同一策略，有利于建立"企业识别系统"</div>
        <div class="cell-header">
          <span class="cell-num" style="color:#c0c8d4;">04</span>
          <span class="cell-icon" style="color:#c0c8d4;">🎯</span>
        </div>
      </div>
      <!-- Bottom-right: 03 dark blue -->
      <div class="cell" style="background:#1a3a6b;">
        <div class="cell-desc" style="color:rgba(255,255,255,0.85); margin-bottom:8px;">统一品牌策略是指企业将经营的所有系列产品使用同一品牌的策略。使用同一策略，有利于建立"企业识别系统"</div>
        <div class="cell-header" style="flex-direction:row-reverse;">
          <span class="cell-num" style="color:white;">03</span>
          <span class="cell-icon" style="color:white;">🎯</span>
        </div>
      </div>
    </div>
    <!-- Center circle -->
    <div class="center-overlay">
      <svg width="340" height="340" viewBox="0 0 340 340">
        <!-- Outer ring (white background) -->
        <circle cx="170" cy="170" r="165" fill="white"/>
        <!-- Arc segments for 01/02/03/04 -->
        <!-- 01: top-left arc -->
        <path d="M 170,170 L 50,50 A 170,170 0 0,1 170,5 Z" fill="#1a3a6b" opacity="0.9"/>
        <!-- 02: top-right arc -->
        <path d="M 170,170 L 170,5 A 170,170 0 0,1 290,50 Z" fill="#3a6abf" opacity="0.7"/>
        <!-- 03: bottom-right arc -->
        <path d="M 170,170 L 290,290 A 170,170 0 0,1 170,335 Z" fill="#1a3a6b" opacity="0.9"/>
        <!-- 04: bottom-left arc -->
        <path d="M 170,170 L 170,335 A 170,170 0 0,1 50,290 Z" fill="#6a9ac4" opacity="0.7"/>
        <!-- White gap lines -->
        <line x1="170" y1="5" x2="170" y2="335" stroke="white" stroke-width="4"/>
        <line x1="5" y1="170" x2="335" y2="170" stroke="white" stroke-width="4"/>
        <!-- Inner white circle -->
        <circle cx="170" cy="170" r="110" fill="white"/>
        <!-- Inner dark blue circle -->
        <circle cx="170" cy="170" r="95" fill="#1a3a6b"/>
        <!-- Center text -->
        <text x="170" y="160" text-anchor="middle" font-size="22" font-weight="900" fill="white">品牌升级</text>
        <text x="170" y="185" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">Semi-annual summary</text>
        <!-- Segment labels -->
        <text x="115" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="white">01</text>
        <text x="225" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="white">02</text>
        <text x="225" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="white">03</text>
        <text x="115" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="white">04</text>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
