<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
    overflow: hidden;
  }
  .header-title {
    position: absolute;
    left: 48px;
    top: 30px;
    font-size: 31px;
    line-height: 1;
    font-weight: 900;
    color: #0f458e;
  }
  .header-sub {
    position: absolute;
    right: 48px;
    top: 49px;
    font-size: 19px;
    line-height: 1;
    font-style: italic;
    color: #123f82;
  }
  .top-line {
    position: absolute;
    left: 48px;
    top: 83px;
    width: 1184px;
    height: 2px;
    background: #1b5996;
  }

  .panel {
    position: absolute;
    overflow: hidden;
  }
  .panel .num {
    position: absolute;
    font-size: 58px;
    line-height: 1;
    font-weight: 300;
    letter-spacing: 1px;
  }
  .panel .desc {
    position: absolute;
    width: 265px;
    font-size: 12px;
    line-height: 2.0;
  }
  .target-icon {
    position: absolute;
    width: 54px;
    height: 54px;
  }
  .target-icon svg { width: 100%; height: 100%; }

  .tl {
    left: 46px;
    top: 146px;
    width: 408px;
    height: 210px;
    background: #1148a3;
  }
  .tl::after {
    content: '';
    position: absolute;
    right: -112px;
    top: -6px;
    width: 238px;
    height: 238px;
    border-radius: 50%;
    background: #ffffff;
  }
  .tl .num { left: 14px; top: 6px; color: #ffffff; }
  .tl .target-icon { right: 99px; top: 11px; }
  .tl .desc { left: 16px; top: 84px; color: rgba(255,255,255,0.95); }

  .tr {
    right: 50px;
    top: 146px;
    width: 400px;
    height: 210px;
    background: #d2d2d2;
  }
  .tr::before {
    content: '';
    position: absolute;
    left: -112px;
    top: -6px;
    width: 238px;
    height: 238px;

  .tr .desc { right: 18px; top: 84px; color: rgba(255,255,255,0.9); text-align: left; }

  .bl {

    top: 438px;
    width: 410px;
    height: 214px;
    background: #ffffff;
    border: 2px dashed #24395e;
  }
  .bl::after {
    content: '';
    position: absolute;
    right: -114px;
    bottom: -8px;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: #ffffff;
    border: 2px solid transparent;
  }
  .bl .num { left: 14px; bottom: 8px; color: #b1b1b1; }
  .bl .target-icon { right: 100px; bottom: 12px; }
  .bl .desc { left: 18px; top: 58px; color: #a1a1a1; }

  .br {

  .center-wrap {

    left: 316px;
    top: 132px;
    width: 648px;
    height: 540px;
    display: flex;
    align-items: center;
    justify-content: center;

</style>
