<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 14px 30px; gap: 12px; }
  .top-row { display: flex; gap: 12px; height: 260px; }
  .chart-panel { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; }
  .panel-title { font-size: 14px; color: #888; text-align: center; margin-bottom: 8px; }
  .center-stats { width: 200px; display: flex; flex-direction: column; gap: 8px; }
  .stat-block { border-radius: 4px; padding: 16px 18px; }
  .stat-label { font-size: 14px; color: white; font-weight: 700; margin-bottom: 4px; }
  .stat-num { font-size: 30px; font-weight: 900; color: white; }
  .bottom-row { flex: 1; display: flex; gap: 12px; }
  .pie-panel { width: 300px; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; }
  .text-panel { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .bullet-item { display: flex; gap: 8px; }
  .bullet-dot { width: 8px; height: 8px; border-radius: 50%; background: #1a3a6b; flex-shrink: 0; margin-top: 4px; }
  .bullet-title { font-size: 14px; font-weight: 700; color: #1a3a6b; margin-bottom: 4px; }
  .bullet-text { font-size: 11px; color: #666; line-height: 1.7; }
  .divider { border: none; border-top: 1px solid #dde4f0; }
  .donut-panel { width: 280px; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">平台数据分析 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="top-row">
      <!-- Left chart: 线上半年度销售数据 -->
      <div class="chart-panel">
        <div class="panel-title">线上半年度销售数据</div>
        <svg width="100%" height="100%" viewBox="0 0 380 200" preserveAspectRatio="xMidYMid meet">
          <text x="30" y="20" font-size="10" fill="#888" text-anchor="end">1000</text>
          <text x="30" y="80" font-size="10" fill="#888" text-anchor="end">500</text>
          <text x="30" y="140" font-size="10" fill="#888" text-anchor="end">0</text>
          <line x1="35" y1="15" x2="370" y2="15" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="75" x2="370" y2="75" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="135" x2="370" y2="135" stroke="#eee" stroke-width="1"/>
          <rect x="45" y="90" width="38" height="45" fill="#1a3a6b"/>
          <rect x="100" y="100" width="38" height="35" fill="#1a3a6b"/>
          <rect x="155" y="80" width="38" height="55" fill="#1a3a6b"/>
          <rect x="210" y="60" width="38" height="75" fill="#8ab0d0"/>
          <rect x="265" y="40" width="38" height="95" fill="#1a3a6b"/>
          <rect x="320" y="20" width="38" height="115" fill="#888"/>
          <text x="64" y="155" font-size="10" fill="#555" text-anchor="middle">1月</text>
          <text x="119" y="155" font-size="10" fill="#555" text-anchor="middle">2月</text>
          <text x="174" y="155" font-size="10" fill="#555" text-anchor="middle">3月</text>
          <text x="229" y="155" font-size="10" fill="#555" text-anchor="middle">4月</text>
          <text x="284" y="155" font-size="10" fill="#555" text-anchor="middle">5月</text>
          <text x="339" y="155" font-size="10" fill="#555" text-anchor="middle">6月</text>
        </svg>
      </div>
      <!-- Center stats -->
      <div class="center-stats">
        <div class="stat-block" style="background:#1a3a6b; flex:1; display:flex; flex-direction:column; justify-content:center;">
          <div class="stat-label">线上销售</div>
          <div class="stat-num">455800</div>
        </div>
        <div class="stat-block" style="background:#3a6abf; flex:1; display:flex; flex-direction:column; justify-content:center;">
          <div class="stat-label">线下销售</div>
          <div class="stat-num">366800</div>
        </div>
      </div>
      <!-- Right chart: 线下半年度销售数据 -->
      <div class="chart-panel">
        <div class="panel-title">线下半年度销售数据</div>
        <svg width="100%" height="100%" viewBox="0 0 380 200" preserveAspectRatio="xMidYMid meet">
          <text x="30" y="20" font-size="10" fill="#888" text-anchor="end">1000</text>
          <text x="30" y="80" font-size="10" fill="#888" text-anchor="end">500</text>
          <text x="30" y="140" font-size="10" fill="#888" text-anchor="end">0</text>
          <line x1="35" y1="15" x2="370" y2="15" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="75" x2="370" y2="75" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="135" x2="370" y2="135" stroke="#eee" stroke-width="1"/>
          <rect x="45" y="95" width="38" height="40" fill="#1a3a6b"/>
          <rect x="100" y="105" width="38" height="30" fill="#1a3a6b"/>
          <rect x="155" y="85" width="38" height="50" fill="#1a3a6b"/>
          <rect x="210" y="65" width="38" height="70" fill="#8ab0d0"/>
          <rect x="265" y="45" width="38" height="90" fill="#1a3a6b"/>
          <rect x="320" y="25" width="38" height="110" fill="#888"/>
          <text x="64" y="155" font-size="10" fill="#555" text-anchor="middle">1月</text>
          <text x="119" y="155" font-size="10" fill="#555" text-anchor="middle">2月</text>
          <text x="174" y="155" font-size="10" fill="#555" text-anchor="middle">3月</text>
          <text x="229" y="155" font-size="10" fill="#555" text-anchor="middle">4月</text>
          <text x="284" y="155" font-size="10" fill="#555" text-anchor="middle">5月</text>
          <text x="339" y="155" font-size="10" fill="#555" text-anchor="middle">6月</text>
        </svg>
      </div>
    </div>
    <div class="bottom-row">
      <!-- Pie chart -->
      <div class="pie-panel">
        <div class="panel-title">店铺销售额月度占比</div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center;">
          <svg width="200" height="180" viewBox="0 0 200 180">
            <path d="M 100,90 L 100,20 A 70,70 0 0,1 153.6,55 Z" fill="#1a3a6b"/>
            <path d="M 100,90 L 153.6,55 A 70,70 0 0,1 153.6,125 Z" fill="#3a6abf"/>
            <path d="M 100,90 L 153.6,125 A 70,70 0 0,1 46.4,125 Z" fill="#8ab0d0"/>
            <path d="M 100,90 L 46.4,125 A 70,70 0 0,1 100,20 Z" fill="#c0d4e8"/>
            <text x="128" y="60" font-size="13" font-weight="700" fill="white">20%</text>
            <text x="138" y="100" font-size="13" font-weight="700" fill="white">20%</text>
            <text x="70" y="140" font-size="13" font-weight="700" fill="#555">30%</text>
            <text x="30" y="80" font-size="13" font-weight="700" fill="#555">30%</text>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>第一季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>第二季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>第一季度</div>
          <div class="legend-item"><div class="legend-dot" style="background:#c0d4e8;"></div>第二季度</div>
        </div>
      </div>
      <!-- Text panel -->
      <div class="text-panel">
        <div class="bullet-item">
          <div class="bullet-dot" style="margin-top:5px;"></div>
          <div>
            <div class="bullet-title">销售业绩远超预计目标</div>
            <div class="bullet-text">我们对原始数据进行了清洗和整理，去除了缺失值和异常值，确保数据的准确性。</div>
          </div>
        </div>
        <hr class="divider"/>
        <div class="bullet-item">
          <div class="bullet-dot" style="margin-top:5px;"></div>
          <div>
            <div class="bullet-title">线上线下销售优势与不足</div>
            <div class="bullet-text">我们对原始数据进行了清洗和整理，去除了缺失值和异常值，确保数据的准确性。</div>
            <br>
            <div class="bullet-text">我们对原始数据进行了清洗和整理，去除了缺失值和异常值，确保数据的准确性。</div>
          </div>
        </div>
      </div>
      <!-- Donut with 47% -->
      <div class="donut-panel">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="80" fill="none" stroke="#e8edf5" stroke-width="24"/>
          <circle cx="100" cy="100" r="80" fill="none" stroke="#1a3a6b" stroke-width="24"
            stroke-dasharray="236 267" stroke-dashoffset="-62" stroke-linecap="butt"/>
          <circle cx="100" cy="100" r="80" fill="none" stroke="#3a6abf" stroke-width="24"
            stroke-dasharray="31 472" stroke-dashoffset="-298" stroke-linecap="butt"/>
          <text x="100" y="90" text-anchor="middle" font-size="36" font-weight="900" fill="#1a3a6b">47%</text>
          <text x="100" y="115" text-anchor="middle" font-size="13" fill="#555">相对去年同比上涨</text>
        </svg>
      </div>
    </div>
  </div>
</div>
</body>
</html>
