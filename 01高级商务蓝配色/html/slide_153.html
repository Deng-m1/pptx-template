<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 14px 50px; gap: 10px; }
  .title-area { text-align: center; }
  .main-title { font-size: 26px; font-weight: 900; color: #1a3a6b; margin-bottom: 6px; }
  .sub-desc { font-size: 13px; color: #888; }
  .content-area { flex: 1; display: flex; align-items: center; gap: 0; }
  .left-pills { width: 160px; display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
  .right-pills { width: 160px; display: flex; flex-direction: column; gap: 14px; align-items: flex-end; }
  .pill { border-radius: 30px; padding: 10px 24px; font-size: 16px; font-weight: 700; color: white; }
  .pill.dark { background: #1a3a6b; }
  .pill.medium { background: #3a6abf; }
  .pill.light { background: #8ab0d0; }
  .center-area { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .circles-row { display: flex; align-items: center; justify-content: center; position: relative; }
  .bottom-flow { display: flex; align-items: center; gap: 0; }
  .flow-pill { border-radius: 30px; padding: 10px 28px; font-size: 16px; font-weight: 700; }
  .flow-pill.dark { background: #1a3a6b; color: white; }
  .flow-pill.light { background: #c0d4e8; color: #1a3a6b; }
  .flow-arrow { font-size: 20px; color: #3a6abf; padding: 0 8px; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">工作汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="title-area">
      <div class="main-title">品牌提升逻辑分析</div>
      <div class="sub-desc">打造品牌新形象，以全新产品生态，跨界融合。提升品牌认知度，占领消费者心智，引领行业市场。</div>
    </div>
    <div class="content-area">
      <div class="left-pills">
        <div class="pill dark">文化</div>
        <div class="pill medium">形象</div>
        <div class="pill light">体验</div>
      </div>
      <div class="center-area">
        <div class="circles-row">
          <svg width="600" height="300" viewBox="0 0 600 300">
            <!-- Left funnel/cone shape -->
            <polygon points="0,150 180,80 180,220" fill="#c0d4e8" opacity="0.5"/>
            <!-- Right funnel/cone shape -->
            <polygon points="600,150 420,80 420,220" fill="#c0d4e8" opacity="0.5"/>
            <!-- Dashed outer ellipse -->
            <ellipse cx="300" cy="150" rx="160" ry="110" fill="none" stroke="#1a3a6b" stroke-width="2" stroke-dasharray="8,6"/>
            <!-- Left circle (dark blue): 形象 -->
            <circle cx="260" cy="150" r="90" fill="#1a3a6b"/>
            <text x="260" y="158" text-anchor="middle" font-size="24" font-weight="900" fill="white">形象</text>
            <!-- Right circle (gray): 价值 -->
            <circle cx="340" cy="150" r="90" fill="#c0c8d4" opacity="0.9"/>
            <text x="340" y="158" text-anchor="middle" font-size="24" font-weight="900" fill="white">价值</text>
            <!-- Down arrow -->
            <polygon points="290,240 310,240 310,270 320,270 300,295 280,270 290,270" fill="#c0d4e8"/>
          </svg>
        </div>
        <div class="bottom-flow">
          <div class="flow-pill dark">品牌资产</div>
          <div class="flow-arrow">→</div>
          <div class="flow-pill light">问题优化</div>
          <div class="flow-arrow">→</div>
          <div class="flow-pill dark">品牌激活</div>
        </div>
      </div>
      <div class="right-pills">
        <div class="pill dark">愿景</div>
        <div class="pill medium">使命</div>
        <div class="pill dark">特征</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
