<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
    overflow: hidden;
  }
  .header-title {
    position: absolute;
    left: 48px;
    top: 30px;
    font-size: 31px;
    line-height: 1;
    font-weight: 900;
    color: #0f458e;
  }
  .header-sub {
    position: absolute;
    right: 48px;
    top: 49px;
    font-size: 19px;
    line-height: 1;
    font-style: italic;
    color: #123f82;
  }
  .top-line {
    position: absolute;
    left: 48px;
    top: 83px;
    width: 1184px;
    height: 2px;
    background: #1b5996;
  }

  .title {
    position: absolute;
    top: 126px;
    width: 100%;
    text-align: center;
    font-size: 28px;
    line-height: 1;
    font-weight: 900;
    color: #2d2d2d;
  }
  .subtitle {
    position: absolute;
    top: 179px;
    left: 220px;
    width: 840px;
    text-align: center;
    font-size: 12px;
    line-height: 1.8;
    color: #9c9c9c;
  }

  .side-col {
    position: absolute;
    top: 267px;
    width: 190px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .left-col { left: 59px; }
  .right-col { right: 59px; align-items: flex-end; }
  .side-pill {
    width: 190px;
    height: 54px;
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .deep { background: #1046a0; }
  .mid { background: #5c8ac9; }

  .center-wrap {
    position: absolute;
    left: 249px;
    top: 230px;
    width: 782px;
    height: 345px;
  }
  .left-wing,
  .right-wing {
    position: absolute;
    top: 10px;
    width: 270px;
    height: 250px;
    clip-path: polygon(0 50%, 100% 0, 100% 100%);
    opacity: 0.9;
  }
  .left-wing {
    left: 25px;
    background: linear-gradient(90deg, rgba(227,237,250,0.15) 0%, rgba(212,228,247,0.92) 75%, rgba(201,221,243,0.98) 100%);
  }
  .right-wing {
    right: 25px;
    transform: scaleX(-1);
    background: linear-gradient(90deg, rgba(227,237,250,0.15) 0%, rgba(212,228,247,0.92) 75%, rgba(201,221,243,0.98) 100%);
  }

  .logic-box {
    position: absolute;
    left: 194px;
    top: 43px;
    width: 404px;
    height: 164px;
    border: 2px dashed #225a9c;
    border-radius: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(255,255,255,0.1);
    z-index: 3;
  }
  .core-circle {
    width: 184px;
    height: 184px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 400;
    color: #ffffff;
    box-shadow: 0 10px 22px rgba(70, 98, 142, 0.18);
  }
  .core-circle.left {
    background: #1247a2;
  }
  .core-circle.right {
    background: #c8c8c8;
    color: #ffffff;
  }

  .down-arrow {
    position: absolute;
    left: 352px;
    top: 220px;
    width: 78px;
    height: 58px;
    background: linear-gradient(180deg, #dce8f6 0%, #b5cbea 100%);
    clip-path: polygon(0 0, 100% 0, 74% 0, 74% 45%, 100% 45%, 50% 100%, 0 45%, 26% 45%, 26% 0);
    z-index: 2;
  }

  .flow-row {
    position: absolute;
    left: 100px;
    top: 306px;
    width: 582px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 4;
  }
  .flow-pill {
    height: 58px;
    border-radius: 29px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }
  .flow-pill.dark {
    background: #1247a2;
    width: 290px;
  }
  .flow-pill.light {
    background: #b7cae6;
    color: #ffffff;
    width: 292px;
  }
  .flow-arrow {
    width: 46px;
    text-align: center;
    font-size: 26px;
    line-height: 1;
    color: #9d9d9d;
    margin-top: -2px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="header-title">工作汇报 Powerpoint Template</div>
  <div class="header-sub">Work Arrangement</div>
  <div class="top-line"></div>

  <div class="title">品牌提升逻辑分析</div>
  <div class="subtitle">打造品牌新形象，以全新产品生态，跨界融合。提升品牌认知度，占领消费者心智，引领行业市场。</div>

  <div class="side-col left-col">
    <div class="side-pill deep">文化</div>
    <div class="side-pill deep">形象</div>
    <div class="side-pill mid">体验</div>
  </div>

  <div class="side-col right-col">
    <div class="side-pill mid">愿景</div>
    <div class="side-pill deep">使命</div>
    <div class="side-pill deep">特征</div>
  </div>

  <div class="center-wrap">
    <div class="left-wing"></div>
    <div class="right-wing"></div>

    <div class="logic-box">
      <div class="core-circle left">形象</div>
      <div class="core-circle right">价值</div>
    </div>

    <div class="down-arrow"></div>

    <div class="flow-row">
      <div class="flow-pill dark">品牌资产</div>
      <div class="flow-arrow">→</div>
      <div class="flow-pill light">问题优化</div>
      <div class="flow-arrow">→</div>
      <div class="flow-pill dark">品牌激活</div>
    </div>
  </div>
</div>
</body>
</html>
