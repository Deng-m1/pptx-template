<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
  }
  .title {
    position: absolute;
    left: 48px;
    top: 31px;
    font-size: 31px;
    line-height: 1;
    font-weight: 900;
    color: #0f458e;
  }
  .subtitle {
    position: absolute;
    right: 48px;
    top: 49px;
    font-size: 19px;
    line-height: 1;
    font-style: italic;
    color: #123f82;
  }
  .top-line {
    position: absolute;
    left: 48px;
    top: 83px;
    width: 1184px;
    height: 2px;
    background: #1b5996;
  }
  .intro-box {
    position: absolute;
    left: 48px;
    top: 121px;
    width: 524px;
    height: 143px;
    border: 1px solid #bfc3c9;
    background: #fff;
    padding: 22px 30px 0;
  }
  .intro-title {
    font-size: 22px;
    line-height: 1;
    font-weight: 700;
    color: #114a97;
    margin-bottom: 18px;
  }
  .intro-text {
    font-size: 12px;
    line-height: 1.7;
    color: #8b8b8b;
  }
  .band {
    position: absolute;
    left: 48px;
    width: 524px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    text-align: center;
    align-items: center;
  }
  .band.header1 {
    top: 291px;
    height: 54px;
    background: #13469a;
    color: #fff;
    font-size: 19px;
    font-weight: 700;
  }
  .band.value1 {
    top: 367px;
    height: 45px;
    background: #b2c7e3;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
  }
  .band.note1 {
    top: 434px;
    height: 48px;
    background: #ffffff;
    border: 1px solid #c7c7c7;
    color: #8a8a8a;
    font-size: 17px;
    font-weight: 400;
  }
  .band.header2 {
    top: 500px;
    height: 49px;
    background: #5f88c8;
    color: #fff;
    font-size: 19px;
    font-weight: 700;
  }
  .band.value2 {
    top: 568px;
    height: 48px;
    background: #ffffff;
    border: 1px solid #c7c7c7;
    color: #777;
    font-size: 18px;
    font-weight: 400;
  }
  .band.note2 {
    top: 638px;
    height: 46px;
    background: #b2c7e3;
    color: #ffffff;
    font-size: 17px;
    font-weight: 400;
  }
  .chart-panel {
    position: absolute;
    left: 601px;
    top: 121px;
    width: 631px;
    height: 563px;
    border: 1px solid #bfc3c9;
    background: #fff;
  }
  .chart-header {
    position: absolute;
    left: 26px;
    top: 25px;
    width: 351px;
    height: 38px;
    background: #13469a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .legend {
    position: absolute;
    left: 194px;
    bottom: 17px;
    display: flex;
    gap: 54px;
    align-items: center;
    color: #7f7f7f;
    font-size: 15px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .legend-box {
    width: 17px;
    height: 17px;
  }
  svg text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
</style>
</head>
<body>
<div class="slide">
  <div class="title">平台数据分析 Powerpoint Template</div>
  <div class="subtitle">Work Arrangement</div>
  <div class="top-line"></div>

  </div>

    <div>平台总粉丝数</div>

    <div>粉丝流失率</div>
    <div>潜在客户占比</div>
  </div>
  <div class="band value2">
    <div>42%</div>
    <div>20%</div>
    <div>18%</div>
  </div>
  <div class="band note2">
    <div>同比+51%</div>
    <div>环比-19%</div>
    <div>同比+10%</div>
  </div>

        <line x1="80" y1="178" x2="585" y2="178" stroke="#94aab0" stroke-width="1" stroke-dasharray="7,5"/>
        <line x1="80" y1="252" x2="585" y2="252" stroke="#94aab0" stroke-width="1" stroke-dasharray="7,5"/>

    <div class="legend">
      <div class="legend-item"><span class="legend-box" style="background:#d7e1ef;"></span><span>新增粉丝数</span></div>
      <div class="legend-item"><span class="legend-box" style="background:#13469a;"></span><span>流失粉丝数</span></div>

</div>
</body>
</html>
