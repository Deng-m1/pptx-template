<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; padding: 14px 30px; gap: 14px; }
  .left-col { width: 500px; display: flex; flex-direction: column; gap: 10px; }
  .intro-box { border: 1.5px solid #dde4f0; border-radius: 4px; padding: 14px; }
  .intro-title { font-size: 15px; font-weight: 700; color: #1a3a6b; margin-bottom: 8px; }
  .intro-text { font-size: 11px; color: #555; line-height: 1.7; }
  .table-wrap { flex: 1; display: flex; flex-direction: column; }
  .table-header-row { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #1a3a6b; border-radius: 4px 4px 0 0; }
  .th { padding: 10px 14px; font-size: 13px; font-weight: 700; color: white; text-align: center; }
  .table-data-row { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #e8f0f8; }
  .td { padding: 10px 14px; font-size: 14px; font-weight: 700; color: #1a3a6b; text-align: center; }
  .table-sub-row { display: grid; grid-template-columns: 1fr 1fr 1fr; }
  .ts { padding: 6px 14px; font-size: 11px; color: #888; text-align: center; }
  .table-header-row2 { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #3a6abf; }
  .table-data-row2 { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #e8f0f8; }
  .table-sub-row2 { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #f5f8fc; }
  .right-col { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 14px; display: flex; flex-direction: column; }
  .chart-title-box { background: #1a3a6b; padding: 10px 16px; border-radius: 4px; margin-bottom: 12px; }
  .chart-title { font-size: 16px; font-weight: 700; color: white; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">平台数据分析 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="left-col">
      <div class="intro-box">
        <div class="intro-title">平台粉丝数据分析与优化</div>
        <div class="intro-text">我们通过深入了解本地市场需求和竞争环境，成功地扩展了客户群体，并且通过精准的市场定位和产品推广活动，保持了稳定的销售增长。未来，我们将进一步优化客户体验和加强品牌影响力，以增强市场竞争力。</div>
      </div>
      <div class="table-wrap">
        <div class="table-header-row">
          <div class="th">平台总粉丝数</div>
          <div class="th">新增粉丝</div>
          <div class="th">粉丝转化率</div>
        </div>
        <div class="table-data-row">
          <div class="td">8970000</div>
          <div class="td">390000</div>
          <div class="td">9.7%</div>
        </div>
        <div class="table-sub-row">
          <div class="ts">同比+13%</div>
          <div class="ts">环比+35%</div>
          <div class="ts">好评率15%</div>
        </div>
        <div style="height:10px;"></div>
        <div class="table-header-row2">
          <div class="th">复购率</div>
          <div class="th">粉丝流失率</div>
          <div class="th">潜在客户占比</div>
        </div>
        <div class="table-data-row2">
          <div class="td">42%</div>
          <div class="td">20%</div>
          <div class="td">18%</div>
        </div>
        <div class="table-sub-row2">
          <div class="ts">同比+51%</div>
          <div class="ts">环比-19%</div>
          <div class="ts">同比+10%</div>
        </div>
      </div>
    </div>
    <div class="right-col">
      <div class="chart-title-box">
        <div class="chart-title">各个平台销售数据情况图表</div>
      </div>
      <svg width="100%" height="100%" viewBox="0 0 680 420" preserveAspectRatio="xMidYMid meet">
        <!-- Y axis -->
        <text x="30" y="20" font-size="11" fill="#888" text-anchor="end">4000</text>
        <text x="30" y="100" font-size="11" fill="#888" text-anchor="end">3200</text>
        <text x="30" y="180" font-size="11" fill="#888" text-anchor="end">2400</text>
        <text x="30" y="260" font-size="11" fill="#888" text-anchor="end">1600</text>
        <text x="30" y="340" font-size="11" fill="#888" text-anchor="end">800</text>
        <text x="30" y="390" font-size="11" fill="#888" text-anchor="end">0</text>
        <!-- Grid lines -->
        <line x1="40" y1="15" x2="670" y2="15" stroke="#eee" stroke-width="1"/>
        <line x1="40" y1="95" x2="670" y2="95" stroke="#3a6abf" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="40" y1="175" x2="670" y2="175" stroke="#eee" stroke-width="1"/>
        <line x1="40" y1="255" x2="670" y2="255" stroke="#3a6abf" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="40" y1="335" x2="670" y2="335" stroke="#eee" stroke-width="1"/>
        <line x1="40" y1="385" x2="670" y2="385" stroke="#eee" stroke-width="1"/>
        <!-- Bars: 其他, 小红书, 抖音, ins, 微博, 淘宝 -->
        <!-- 其他 -->
        <rect x="55" y="155" width="40" height="230" fill="#8ab0d0"/>
        <rect x="100" y="195" width="40" height="190" fill="#1a3a6b"/>
        <!-- 小红书 -->
        <rect x="160" y="135" width="40" height="250" fill="#8ab0d0"/>
        <rect x="205" y="175" width="40" height="210" fill="#1a3a6b"/>
        <!-- 抖音 -->
        <rect x="265" y="55" width="40" height="330" fill="#8ab0d0"/>
        <rect x="310" y="385" width="40" height="0" fill="#1a3a6b"/>
        <rect x="310" y="355" width="40" height="30" fill="#1a3a6b"/>
        <!-- ins -->
        <rect x="370" y="175" width="40" height="210" fill="#8ab0d0"/>
        <rect x="415" y="105" width="40" height="280" fill="#1a3a6b"/>
        <!-- 微博 -->
        <rect x="475" y="115" width="40" height="270" fill="#8ab0d0"/>
        <rect x="520" y="155" width="40" height="230" fill="#1a3a6b"/>
        <!-- 淘宝 -->
        <rect x="580" y="75" width="40" height="310" fill="#8ab0d0"/>
        <rect x="625" y="195" width="40" height="190" fill="#1a3a6b"/>
        <!-- X labels -->
        <text x="97" y="405" font-size="11" fill="#555" text-anchor="middle">某他</text>
        <text x="202" y="405" font-size="11" fill="#555" text-anchor="middle">小红书</text>
        <text x="307" y="405" font-size="11" fill="#555" text-anchor="middle">抖音</text>
        <text x="412" y="405" font-size="11" fill="#555" text-anchor="middle">ins</text>
        <text x="517" y="405" font-size="11" fill="#555" text-anchor="middle">微博</text>
        <text x="622" y="405" font-size="11" fill="#555" text-anchor="middle">淘宝</text>
      </svg>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>新增粉丝数</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>流失粉丝数</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
