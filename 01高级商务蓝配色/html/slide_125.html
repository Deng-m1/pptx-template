<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    width: 1280px;
    height: 720px;
    padding: 24px 48px 34px;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .header {
    height: 60px;
    border-bottom: 2px solid #125093;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 10px;
  }
  .header-title {
    font-size: 34px;
    line-height: 1;
    font-weight: 900;
    color: #114c97;
    letter-spacing: .2px;
  }
  .header-sub {
    margin-top: 4px;
    font-size: 21px;
    line-height: 1;
    color: #114c97;
    font-style: italic;
  }
  .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding-top: 38px;
    gap: 22px;
  }
  .chart-card {
    position: relative;
    height: 410px;
    border: 2px solid #edf0f4;
    border-radius: 18px;
    background: #fff;
    padding: 18px 26px 10px;
  }
  .chart-title {
    font-size: 20px;
    color: #4d4d4d;
    line-height: 1;
    margin: 8px 0 8px 8px;
  }
  .callout {
    position: absolute;
    width: 148px;
    height: 56px;
    border-radius: 12px;
    background: #5d8fd0;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.12;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 0 rgba(0, 0, 0, 0.03);
  }
  .callout::after {
    content: '';
    position: absolute;
    left: 26px;
    bottom: -16px;
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 16px solid #5d8fd0;
  }
  .bottom-cards {
    display: flex;
    gap: 22px;
    height: 124px;
  }
  .channel-card {
    flex: 1;
    border-radius: 12px;
    padding: 14px 20px 12px;
    color: #fff;
    display: flex;
    flex-direction: column;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .icon-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-circle svg {
    width: 16px;
    height: 16px;
    fill: #fff;
  }
  .card-name {
    font-size: 20px;
    line-height: 1;
    font-weight: 900;
    color: #fff;
  }
  .card-pct {
    margin-left: auto;
    font-size: 20px;
    line-height: 1;
    font-weight: 900;
    color: #fff;
  }
  .progress-track {
    position: relative;
    height: 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.34);
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-main {
    height: 100%;
    border-radius: 6px;
    background: rgba(255,255,255,0.92);
  }
  .progress-accent {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    border-radius: 6px;
    background: #0f4ea1;
  }
  .card-desc {
    font-size: 12px;
    line-height: 1.35;
    color: rgba(255,255,255,0.92);
  }
</style>
</head>
<body>
<div class="slide">

      <div class="channel-card" style="background:#0f4699;">

            <svg viewBox="0 0 24 24"><path d="M4 20V6h2v14H4zm4 0v-9h2v9H8zm4 0V3h2v17h-2zm4 0v-12h2v12h-2zm4 0v-6h2v6h-2z"/></svg>

  </div>
</div>
</body>
</html>
