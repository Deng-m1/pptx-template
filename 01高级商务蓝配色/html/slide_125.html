<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 14px 30px; gap: 12px; }
  .chart-box { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 14px; position: relative; display: flex; flex-direction: column; }
  .chart-title { font-size: 14px; color: #888; margin-bottom: 8px; }
  .callout { position: absolute; background: #1a3a6b; color: white; padding: 8px 12px; border-radius: 4px; font-size: 11px; line-height: 1.5; font-weight: 700; }
  .callout::after { content: ''; position: absolute; bottom: -7px; left: 16px; border: 7px solid transparent; border-top-color: #1a3a6b; border-bottom: 0; }
  .bottom-cards { display: flex; gap: 10px; height: 100px; }
  .channel-card { flex: 1; border-radius: 4px; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
  .card-header { display: flex; align-items: center; gap: 8px; }
  .card-icon { font-size: 14px; }
  .card-name { font-size: 14px; font-weight: 700; color: white; }
  .card-pct { font-size: 18px; font-weight: 900; color: white; margin-left: auto; }
  .progress-bar { height: 5px; background: rgba(255,255,255,0.3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: rgba(255,255,255,0.9); }
  .card-desc { font-size: 11px; color: rgba(255,255,255,0.8); }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">平台数据分析 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="chart-box">
      <div class="chart-title">全年销售额数据看板</div>
      <!-- Callouts -->
      <div class="callout" style="top:30px; left:28%;">6月份业绩销售<br>达到峰值</div>
      <div class="callout" style="top:30px; right:12%;">11月份业绩销售<br>达到峰值</div>
      <svg width="100%" height="100%" viewBox="0 0 1160 380" preserveAspectRatio="xMidYMid meet">
        <!-- Y axis labels -->
        <text x="30" y="20" font-size="11" fill="#888" text-anchor="end">1600</text>
        <text x="30" y="80" font-size="11" fill="#888" text-anchor="end">1400</text>
        <text x="30" y="140" font-size="11" fill="#888" text-anchor="end">1200</text>
        <text x="30" y="200" font-size="11" fill="#888" text-anchor="end">1000</text>
        <text x="30" y="260" font-size="11" fill="#888" text-anchor="end">800</text>
        <text x="30" y="320" font-size="11" fill="#888" text-anchor="end">600</text>
        <text x="30" y="370" font-size="11" fill="#888" text-anchor="end">0</text>
        <!-- Grid lines -->
        <line x1="40" y1="365" x2="1150" y2="365" stroke="#eee" stroke-width="1"/>
        <line x1="40" y1="315" x2="1150" y2="315" stroke="#eee" stroke-width="1"/>
        <line x1="40" y1="255" x2="1150" y2="255" stroke="#eee" stroke-width="1"/>
        <line x1="40" y1="195" x2="1150" y2="195" stroke="#eee" stroke-width="1"/>
        <line x1="40" y1="135" x2="1150" y2="135" stroke="#eee" stroke-width="1"/>
        <line x1="40" y1="75" x2="1150" y2="75" stroke="#eee" stroke-width="1"/>
        <!-- Line chart: 134, 314, 431, 232, 534, 1435, 645, 546, 435, 867, 1435, 765 -->
        <!-- Scale: max=1600, range=365px, 1unit=365/1600=0.228px -->
        <!-- y = 365 - val*0.228 -->
        <!-- 134->335, 314->294, 431->267, 232->312, 534->243, 1435->38, 645->218, 546->241, 435->266, 867->168, 1435->38, 765->191 -->
        <polyline points="50,335 145,294 240,267 335,312 430,243 525,38 620,218 715,241 810,266 905,168 1000,38 1095,191" fill="none" stroke="#1a3a6b" stroke-width="3"/>
        <!-- Data points -->
        <circle cx="50" cy="335" r="5" fill="#1a3a6b"/>
        <circle cx="145" cy="294" r="5" fill="#1a3a6b"/>
        <circle cx="240" cy="267" r="5" fill="#1a3a6b"/>
        <circle cx="335" cy="312" r="5" fill="#1a3a6b"/>
        <circle cx="430" cy="243" r="5" fill="#1a3a6b"/>
        <circle cx="525" cy="38" r="5" fill="#1a3a6b"/>
        <circle cx="620" cy="218" r="5" fill="#1a3a6b"/>
        <circle cx="715" cy="241" r="5" fill="#1a3a6b"/>
        <circle cx="810" cy="266" r="5" fill="#1a3a6b"/>
        <circle cx="905" cy="168" r="5" fill="#1a3a6b"/>
        <circle cx="1000" cy="38" r="5" fill="#1a3a6b"/>
        <circle cx="1095" cy="191" r="5" fill="#1a3a6b"/>
        <!-- Data labels -->
        <text x="50" y="325" font-size="11" fill="#1a3a6b" text-anchor="middle">134</text>
        <text x="145" y="284" font-size="11" fill="#1a3a6b" text-anchor="middle">314</text>
        <text x="240" y="257" font-size="11" fill="#1a3a6b" text-anchor="middle">431</text>
        <text x="335" y="302" font-size="11" fill="#1a3a6b" text-anchor="middle">232</text>
        <text x="430" y="233" font-size="11" fill="#1a3a6b" text-anchor="middle">534</text>
        <text x="525" y="28" font-size="11" fill="#1a3a6b" text-anchor="middle">1435</text>
        <text x="620" y="208" font-size="11" fill="#1a3a6b" text-anchor="middle">645</text>
        <text x="715" y="231" font-size="11" fill="#1a3a6b" text-anchor="middle">546</text>
        <text x="810" y="256" font-size="11" fill="#1a3a6b" text-anchor="middle">435</text>
        <text x="905" y="158" font-size="11" fill="#1a3a6b" text-anchor="middle">867</text>
        <text x="1000" y="28" font-size="11" fill="#1a3a6b" text-anchor="middle">1435</text>
        <text x="1095" y="181" font-size="11" fill="#1a3a6b" text-anchor="middle">765</text>
        <!-- X labels -->
        <text x="50" y="380" font-size="11" fill="#555" text-anchor="middle">1月</text>
        <text x="145" y="380" font-size="11" fill="#555" text-anchor="middle">2月</text>
        <text x="240" y="380" font-size="11" fill="#555" text-anchor="middle">3月</text>
        <text x="335" y="380" font-size="11" fill="#555" text-anchor="middle">4月</text>
        <text x="430" y="380" font-size="11" fill="#555" text-anchor="middle">5月</text>
        <text x="525" y="380" font-size="11" fill="#555" text-anchor="middle">6月</text>
        <text x="620" y="380" font-size="11" fill="#555" text-anchor="middle">7月</text>
        <text x="715" y="380" font-size="11" fill="#555" text-anchor="middle">8月</text>
        <text x="810" y="380" font-size="11" fill="#555" text-anchor="middle">9月</text>
        <text x="905" y="380" font-size="11" fill="#555" text-anchor="middle">10月</text>
        <text x="1000" y="380" font-size="11" fill="#555" text-anchor="middle">11月</text>
        <text x="1095" y="380" font-size="11" fill="#555" text-anchor="middle">12月</text>
      </svg>
    </div>
    <div class="bottom-cards">
      <div class="channel-card" style="background:#1a3a6b;">
        <div class="card-header">
          <span class="card-icon">📊</span>
          <span class="card-name">电商平台</span>
          <span class="card-pct">40%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:40%;"></div></div>
        <div class="card-desc">全网GMV达到154万元，同比增长40%</div>
      </div>
      <div class="channel-card" style="background:#3a6abf;">
        <div class="card-header">
          <span class="card-icon">📊</span>
          <span class="card-name">社交平台</span>
          <span class="card-pct">20%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:20%;"></div></div>
        <div class="card-desc">全网GMV达到154万元，同比增长20%</div>
      </div>
      <div class="channel-card" style="background:#6a9ac4;">
        <div class="card-header">
          <span class="card-icon">📊</span>
          <span class="card-name">线下渠道</span>
          <span class="card-pct">10%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:10%;"></div></div>
        <div class="card-desc">全网GMV达到154万元，同比增长10%</div>
      </div>
      <div class="channel-card" style="background:#9ab8d4;">
        <div class="card-header">
          <span class="card-icon">📊</span>
          <span class="card-name">其他渠道</span>
          <span class="card-pct">30%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:30%;"></div></div>
        <div class="card-desc">全网GMV达到154万元，同比增长30%</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
