<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 70px; padding: 12px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 28px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 18px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 10px 30px 10px; }
  .top-titles { display: flex; margin-bottom: 10px; flex-shrink: 0; }
  .top-title { flex: 1; text-align: center; padding: 0 8px; }
  .top-title h3 { font-size: 17px; font-weight: 900; color: #1a3a6b; margin-bottom: 4px; }
  .top-title p { font-size: 11px; color: #555; line-height: 1.5; }
  .top-title.spacer { flex: 0.6; }
  .mid-area { flex: 1; position: relative; display: flex; align-items: center; min-height: 200px; }
  .gray-bar { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 80px; background: #e8eef8; border-radius: 40px; }
  .blocks { display: flex; gap: 14px; width: 100%; position: relative; z-index: 1; justify-content: space-between; }
  .block { flex: 1; height: 180px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; position: relative; }
  .block-icon { font-size: 30px; }
  .block-text { font-size: 14px; font-weight: 900; color: #fff; text-align: center; line-height: 1.4; }
  .node-line-top { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); width: 2px; height: 28px; background: #1a3a6b; }
  .node-line-top:before { content: ""; position: absolute; top: -6px; left: -5px; width: 12px; height: 12px; border-radius: 50%; background: #1a3a6b; }
  .node-line-bottom { position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); width: 2px; height: 28px; background: #1a3a6b; }
  .node-line-bottom:after { content: ""; position: absolute; bottom: -6px; left: -5px; width: 12px; height: 12px; border-radius: 50%; background: #1a3a6b; }
  .bottom-titles { display: flex; margin-top: 10px; flex-shrink: 0; }
  .bottom-title { flex: 1; text-align: center; padding: 0 8px; }
  .bottom-title h3 { font-size: 17px; font-weight: 900; color: #1a3a6b; margin-bottom: 4px; }
  .bottom-title p { font-size: 11px; color: #555; line-height: 1.5; }
  .bottom-title.spacer { flex: 0.3; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">项目规划 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="top-titles">
      <div class="top-title">
        <h3>项目启动</h3>
        <p>按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</p>
      </div>
      <div class="top-title spacer"></div>
      <div class="top-title">
        <h3>设计制作</h3>
        <p>按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</p>
      </div>
      <div class="top-title spacer"></div>
      <div class="top-title">
        <h3>活动执行</h3>
        <p>按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</p>
      </div>
    </div>
    <div class="mid-area">
      <div class="gray-bar"></div>
      <div class="blocks">
        <div class="block" style="background:#1a3a6b;">
          <div class="node-line-top"></div>
          <div class="block-icon">📋</div>
          <div class="block-text">市场调研<br>确认时间</div>
        </div>
        <div class="block" style="background:#3a6abf;">
          <div class="node-line-bottom"></div>
          <div class="block-icon">📊</div>
          <div class="block-text">组织人员<br>深化讨论</div>
        </div>
        <div class="block" style="background:#1a3a6b;">
          <div class="node-line-top"></div>
          <div class="block-icon">🎨</div>
          <div class="block-text">设计风格<br>文案校对</div>
        </div>
        <div class="block" style="background:#1a3a6b;">
          <div class="node-line-bottom"></div>
          <div class="block-icon">📦</div>
          <div class="block-text">核对物料<br>仔细检查</div>
        </div>
        <div class="block" style="background:#1a3a6b;">
          <div class="node-line-top"></div>
          <div class="block-icon">🏁</div>
          <div class="block-text">现场秩序<br>确保细节</div>
        </div>
      </div>
    </div>
    <div class="bottom-titles">
      <div class="bottom-title spacer"></div>
      <div class="bottom-title">
        <h3>定制方案</h3>
        <p>按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</p>
      </div>
      <div class="bottom-title spacer"></div>
      <div class="bottom-title">
        <h3>现场安装</h3>
        <p>按照时间顺序进行工作任务的安排，确保每个环节的任务顺利进行。</p>
      </div>
      <div class="bottom-title spacer"></div>
    </div>
  </div>
</div>
</body>
</html>
