<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .header {
    height: 86px;
    padding: 18px 48px 0;
    border-bottom: 2px solid #11489c;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 33px;
    line-height: 1;
    font-weight: 900;
    color: #11489c;
  }
  .header-sub {
    margin-top: 5px;
    font-size: 22px;
    line-height: 1;
    color: #11489c;
    font-style: italic;
  }
  .body {
    flex: 1;
    display: flex;
    gap: 26px;
    padding: 30px 48px 26px;
  }
  .left-col {
    width: 386px;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }
  .activity-card {
    flex: 1;
    padding: 16px 28px 18px;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 18px;
    line-height: 1.25;
    font-weight: 800;
    letter-spacing: 0.2px;
  }
  .card-icon {
    width: 50px;
    height: 60px;
    border-radius: 12px;
    background: rgba(255,255,255,0.96);
    color: #11489c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 300;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .card-amount {
    font-size: 45px;
    line-height: 1;
    font-weight: 900;
    margin-bottom: 24px;
    letter-spacing: 0.2px;
  }
  .card-bullet {
    font-size: 18px;
    line-height: 1.35;
    font-weight: 800;
    margin-bottom: 16px;
  }
  .card-desc {
    width: 95%;
    font-size: 12px;
    line-height: 1.65;
    color: rgba(255,255,255,0.92);
  }
  .right-col {
    flex: 1;
    border: 1px solid #e9e9e9;
    padding: 16px 24px 20px;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .section-title {
    font-size: 23px;
    line-height: 1;
    font-weight: 900;
    color: #11489c;
    margin: 8px 0 14px 26px;
  }
  .charts-row {
    flex: 1;
    display: flex;
    gap: 18px;
    padding: 0 18px 8px;
  }
  .chart-card {
    flex: 1;
    background: #fff;
    border: 2px solid #eef0f5;
    border-radius: 16px;
    padding: 26px 24px 18px;
    display: flex;
    flex-direction: column;
  }
  .chart-grid {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 2px 0 10px;
  }
  .grid-lines {
    position: absolute;
    left: 116px;
    right: 18px;
    top: 0;
    bottom: 34px;
    pointer-events: none;
  }
  .grid-lines span {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #d9e1ee;
  }
  .g0 { left: 0; }
  .g1 { left: 25%; }
  .g2 { left: 50%; }
  .g3 { left: 75%; }
  .g4 { left: 100%; }
  .bar-row {
    position: relative;
    display: flex;
    align-items: center;
    min-height: 50px;
    z-index: 1;
  }
  .label {
    width: 106px;
    padding-right: 10px;
    text-align: right;
    font-size: 11px;
    line-height: 1.35;
    color: #7a7a7a;
    flex-shrink: 0;
  }
  .track {
    flex: 1;
    height: 20px;
    position: relative;
    display: flex;
    align-items: center;
  }
  .bar {
    height: 20px;
  }
  .dark { background: #11489c; }
  .light { background: #5f8fc9; }
  .x-axis {
    margin-left: 116px;
    margin-right: 18px;
    margin-top: 14px;
    border-top: 1px solid #edf0f5;
    display: flex;
    justify-content: space-between;
    padding-top: 10px;
    font-size: 12px;
    color: #8c8c8c;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="header-title">活动支出数据 Powerpoint Template</div>
    <div class="header-sub">Work Arrangement</div>
  </div>

  <div class="body">
    <div class="left-col">
      <div class="activity-card" style="background:#11449a;">
        <div class="card-top">
          <div class="card-title">公司活动一：总支出</div>
          <div class="card-icon">￥</div>
        </div>
        <div class="card-amount">¥17000+</div>
        <div class="card-bullet">● 公司年度庆典活动支出概述</div>
        <div class="card-desc">本报告旨在总结公司最近举办的年度庆典活动的支出情况，详细列出各项费用及其分布。</div>
      </div>

      <div class="activity-card" style="background:#6693c6;">
        <div class="card-top">
          <div class="card-title">公司活动二：总支出</div>
          <div class="card-icon">￥</div>
        </div>
        <div class="card-amount">¥5000+</div>
        <div class="card-bullet">● 公司员工培训活动支出概述</div>
        <div class="card-desc">本报告旨在总结公司最近进行的员工培训活动的支出情况，详细列出各项费用及其分布。</div>
      </div>
    </div>

    <div class="right-col">
      <div class="section-title">活动支出报表明细</div>
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-grid">
            <div class="grid-lines">
              <span class="g0"></span>
              <span class="g1"></span>
              <span class="g2"></span>
              <span class="g3"></span>
              <span class="g4"></span>
            </div>

            <div class="bar-row">
              <div class="label">场地租赁<br>与装饰</div>
              <div class="track"><div class="bar dark" style="width:78%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">宣传与市场</div>
              <div class="track"><div class="bar dark" style="width:84%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">礼品和奖品</div>
              <div class="track"><div class="bar dark" style="width:72%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">娱乐和节目</div>
              <div class="track"><div class="bar dark" style="width:54%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">食品与饮料</div>
              <div class="track"><div class="bar dark" style="width:38%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">其他支出</div>
              <div class="track"><div class="bar dark" style="width:68%;"></div></div>
            </div>
          </div>
          <div class="x-axis"><span>0</span><span>2</span><span>4</span><span>6</span></div>
        </div>

        <div class="chart-card">
          <div class="chart-grid">
            <div class="grid-lines">
              <span class="g0"></span>
              <span class="g1"></span>
              <span class="g2"></span>
              <span class="g3"></span>
              <span class="g4"></span>
            </div>

            <div class="bar-row">
              <div class="label">会议场地<br>与设施</div>
              <div class="track"><div class="bar light" style="width:74%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">培训内容<br>与资料</div>
              <div class="track"><div class="bar light" style="width:82%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">餐饮服务</div>
              <div class="track"><div class="bar light" style="width:68%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">媒体宣传</div>
              <div class="track"><div class="bar light" style="width:50%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">人员住宿</div>
              <div class="track"><div class="bar light" style="width:34%;"></div></div>
            </div>
            <div class="bar-row">
              <div class="label">其他支出</div>
              <div class="track"><div class="bar light" style="width:64%;"></div></div>
            </div>
          </div>
          <div class="x-axis"><span>0</span><span>2</span><span>4</span><span>6</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
