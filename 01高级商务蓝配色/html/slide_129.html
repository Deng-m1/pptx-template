<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; padding: 14px 30px; gap: 14px; }
  .left-col { width: 360px; display: flex; flex-direction: column; gap: 12px; }
  .activity-card { flex: 1; border-radius: 4px; padding: 18px 20px; display: flex; flex-direction: column; gap: 8px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; }
  .card-title { font-size: 16px; font-weight: 700; color: white; }
  .card-icon { width: 36px; height: 36px; border-radius: 6px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; font-weight: 900; }
  .card-amount { font-size: 36px; font-weight: 900; color: white; }
  .card-bullet { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: white; }
  .card-desc { font-size: 11px; color: rgba(255,255,255,0.8); line-height: 1.6; }
  .right-col { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 16px 20px; display: flex; flex-direction: column; }
  .section-title { font-size: 20px; font-weight: 700; color: #1a3a6b; margin-bottom: 14px; }
  .charts-row { flex: 1; display: flex; gap: 16px; }
  .hbar-chart { flex: 1; display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">活动支出数据 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="left-col">
      <div class="activity-card" style="background:#1a3a6b;">
        <div class="card-header">
          <span class="card-title">公司活动一：总支出</span>
          <div class="card-icon">¥</div>
        </div>
        <div class="card-amount">¥17000+</div>
        <div class="card-bullet">● 公司年度庆典活动支出概述</div>
        <div class="card-desc">本报告旨在总结公司最近举办的年度庆典活动的支出情况，详细列出各项费用及其分布。</div>
      </div>
      <div class="activity-card" style="background:#6a9ac4;">
        <div class="card-header">
          <span class="card-title">公司活动二：总支出</span>
          <div class="card-icon">¥</div>
        </div>
        <div class="card-amount">¥5000+</div>
        <div class="card-bullet">● 公司员工培训活动支出概述</div>
        <div class="card-desc">本报告旨在总结公司最近进行的员工培训活动的支出情况，详细列出各项费用及其分布。</div>
      </div>
    </div>
    <div class="right-col">
      <div class="section-title">活动支出报表明细</div>
      <div class="charts-row">
        <!-- Left horizontal bar chart -->
        <div class="hbar-chart">
          <svg width="100%" height="100%" viewBox="0 0 340 320" preserveAspectRatio="xMidYMid meet">
            <!-- Bars -->
            <text x="95" y="28" font-size="10" fill="#555" text-anchor="end">场地租赁<br/>与装饰</text>
            <text x="95" y="20" font-size="10" fill="#555" text-anchor="end">场地租赁</text>
            <text x="95" y="32" font-size="10" fill="#555" text-anchor="end">与装饰</text>
            <rect x="100" y="16" width="130" height="18" fill="#1a3a6b"/>
            <text x="235" y="29" font-size="10" fill="#555">4</text>
            <text x="95" y="70" font-size="10" fill="#555" text-anchor="end">宣传与市场</text>
            <rect x="100" y="58" width="160" height="18" fill="#1a3a6b"/>
            <text x="265" y="71" font-size="10" fill="#555">5</text>
            <text x="95" y="112" font-size="10" fill="#555" text-anchor="end">礼品和奖品</text>
            <rect x="100" y="100" width="130" height="18" fill="#1a3a6b"/>
            <text x="235" y="113" font-size="10" fill="#555">4</text>
            <text x="95" y="154" font-size="10" fill="#555" text-anchor="end">娱乐和节目</text>
            <rect x="100" y="142" width="130" height="18" fill="#1a3a6b"/>
            <text x="235" y="155" font-size="10" fill="#555">4</text>
            <text x="95" y="196" font-size="10" fill="#555" text-anchor="end">食品与饮料</text>
            <rect x="100" y="184" width="80" height="18" fill="#1a3a6b"/>
            <text x="185" y="197" font-size="10" fill="#555">2.5</text>
            <text x="95" y="238" font-size="10" fill="#555" text-anchor="end">其他支出</text>
            <rect x="100" y="226" width="130" height="18" fill="#1a3a6b"/>
            <text x="235" y="239" font-size="10" fill="#555">4</text>
            <!-- X axis -->
            <line x1="100" y1="260" x2="330" y2="260" stroke="#eee" stroke-width="1"/>
            <text x="100" y="275" font-size="10" fill="#888" text-anchor="middle">0</text>
            <text x="165" y="275" font-size="10" fill="#888" text-anchor="middle">2</text>
            <text x="230" y="275" font-size="10" fill="#888" text-anchor="middle">4</text>
            <text x="295" y="275" font-size="10" fill="#888" text-anchor="middle">6</text>
          </svg>
        </div>
        <!-- Right horizontal bar chart -->
        <div class="hbar-chart">
          <svg width="100%" height="100%" viewBox="0 0 340 320" preserveAspectRatio="xMidYMid meet">
            <text x="95" y="20" font-size="10" fill="#555" text-anchor="end">会议场地</text>
            <text x="95" y="32" font-size="10" fill="#555" text-anchor="end">与设施</text>
            <rect x="100" y="16" width="130" height="18" fill="#8ab0d0"/>
            <text x="235" y="29" font-size="10" fill="#555">4</text>
            <text x="95" y="70" font-size="10" fill="#555" text-anchor="end">培训内容</text>
            <text x="95" y="82" font-size="10" fill="#555" text-anchor="end">与资料</text>
            <rect x="100" y="58" width="160" height="18" fill="#8ab0d0"/>
            <text x="265" y="71" font-size="10" fill="#555">5</text>
            <text x="95" y="112" font-size="10" fill="#555" text-anchor="end">餐饮服务</text>
            <rect x="100" y="100" width="130" height="18" fill="#8ab0d0"/>
            <text x="235" y="113" font-size="10" fill="#555">4</text>
            <text x="95" y="154" font-size="10" fill="#555" text-anchor="end">媒体宣传</text>
            <rect x="100" y="142" width="100" height="18" fill="#8ab0d0"/>
            <text x="205" y="155" font-size="10" fill="#555">3</text>
            <text x="95" y="196" font-size="10" fill="#555" text-anchor="end">人员住宿</text>
            <rect x="100" y="184" width="65" height="18" fill="#8ab0d0"/>
            <text x="170" y="197" font-size="10" fill="#555">2</text>
            <text x="95" y="238" font-size="10" fill="#555" text-anchor="end">其他支出</text>
            <rect x="100" y="226" width="130" height="18" fill="#8ab0d0"/>
            <text x="235" y="239" font-size="10" fill="#555">4</text>
            <!-- X axis -->
            <line x1="100" y1="260" x2="330" y2="260" stroke="#eee" stroke-width="1"/>
            <text x="100" y="275" font-size="10" fill="#888" text-anchor="middle">0</text>
            <text x="165" y="275" font-size="10" fill="#888" text-anchor="middle">2</text>
            <text x="230" y="275" font-size="10" fill="#888" text-anchor="middle">4</text>
            <text x="295" y="275" font-size="10" fill="#888" text-anchor="middle">6</text>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
