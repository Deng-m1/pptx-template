<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; padding: 14px 30px; gap: 14px; }
  .left-panel { width: 440px; display: flex; flex-direction: column; gap: 12px; }
  .stat-box { background: #1a3a6b; padding: 14px 20px; border-radius: 4px; }
  .stat-box-title { font-size: 16px; font-weight: 700; color: white; text-align: center; margin-bottom: 14px; }
  .stat-row { display: flex; gap: 20px; }
  .stat-item { flex: 1; }
  .stat-num { font-size: 42px; font-weight: 900; color: white; line-height: 1; }
  .stat-unit { font-size: 16px; }
  .stat-divider { width: 1px; background: rgba(255,255,255,0.3); }
  .stat-label-box { background: #3a6abf; padding: 4px 10px; display: inline-block; margin-top: 6px; border-radius: 2px; }
  .stat-label { font-size: 13px; color: white; }
  .chart-box { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; }
  .chart-title { font-size: 14px; color: #888; text-align: center; margin-bottom: 8px; }
  .right-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .pie-box { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 14px; display: flex; flex-direction: column; }
  .pie-title { font-size: 14px; color: #888; margin-bottom: 10px; }
  .pie-content { flex: 1; display: flex; align-items: center; justify-content: center; }
  .info-box { background: #e8f0f8; padding: 12px 16px; border-radius: 4px; display: flex; align-items: center; gap: 10px; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">数据分析 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="left-panel">
      <div class="stat-box">
        <div class="stat-box-title">活动支出和营收</div>
        <div class="stat-row">
          <div class="stat-item">
            <div class="stat-num">226<span class="stat-unit">万元</span></div>
            <div class="stat-label-box"><span class="stat-label">活动支出</span></div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-num">833<span class="stat-unit">万元</span></div>
            <div class="stat-label-box"><span class="stat-label">活动收入</span></div>
          </div>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-title">活动支出</div>
        <svg width="100%" height="100%" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet">
          <text x="20" y="20" font-size="12" fill="#888" text-anchor="middle">40</text>
          <text x="20" y="75" font-size="12" fill="#888" text-anchor="middle">30</text>
          <text x="20" y="110" font-size="12" fill="#888" text-anchor="middle">20</text>
          <text x="20" y="145" font-size="12" fill="#888" text-anchor="middle">10</text>
          <text x="20" y="175" font-size="12" fill="#888" text-anchor="middle">0</text>
          <line x1="35" y1="170" x2="390" y2="170" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="140" x2="390" y2="140" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="110" x2="390" y2="110" stroke="#eee" stroke-width="1"/>
          <line x1="35" y1="80" x2="390" y2="80" stroke="#eee" stroke-width="1"/>
          <!-- Bars: 人力成本=30, 制作成本=15, 设计费用=25, 运输陈本=30 -->
          <rect x="60" y="80" width="55" height="90" fill="#b0c8e0"/>
          <rect x="150" y="125" width="55" height="45" fill="#1a3a6b"/>
          <rect x="240" y="95" width="55" height="75" fill="#8a9aaa"/>
          <rect x="330" y="80" width="55" height="90" fill="#1a3a6b"/>
          <text x="87" y="188" font-size="11" fill="#555" text-anchor="middle">人力成本</text>
          <text x="177" y="188" font-size="11" fill="#555" text-anchor="middle">制作成本</text>
          <text x="267" y="188" font-size="11" fill="#555" text-anchor="middle">设计费用</text>
          <text x="357" y="188" font-size="11" fill="#555" text-anchor="middle">运输陈本</text>
        </svg>
      </div>
    </div>
    <div class="right-panel">
      <div class="pie-box">
        <div class="pie-title">市场营销活动成本比例</div>
        <div class="pie-content">
          <!-- 3D-style pie chart using SVG ellipses -->
          <svg width="500" height="300" viewBox="0 0 500 300">
            <!-- 3D effect: draw bottom ellipses first -->
            <!-- Segment 1 bottom: dark blue 30% -->
            <path d="M 250,200 L 250,215 A 180,50 0 0,0 406,170 L 406,155 Z" fill="#0d2040"/>
            <!-- Segment 2 bottom: medium blue 30% -->
            <path d="M 250,200 L 406,155 A 180,50 0 0,0 250,150 L 250,165 Z" fill="#1e3a6e"/>
            <!-- Segment 3 bottom: light blue 25% -->
            <path d="M 250,200 L 250,165 A 180,50 0 0,0 160,165 L 160,180 Z" fill="#4a7ab0"/>
            <!-- Segment 4 bottom: lighter 15% -->
            <path d="M 250,200 L 160,180 A 180,50 0 0,0 250,215 L 250,200 Z" fill="#8ab0d0"/>
            <!-- Top ellipse segments -->
            <!-- Segment 1: 30% dark blue (0 to 108deg) -->
            <path d="M 250,160 L 250,80 A 180,50 0 0,1 406,155 Z" fill="#1a3a6b"/>
            <!-- Segment 2: 30% medium blue (108 to 216deg) -->
            <path d="M 250,160 L 406,155 A 180,50 0 0,1 250,210 Z" fill="#3a6abf"/>
            <!-- Segment 3: 25% light blue (216 to 306deg) -->
            <path d="M 250,160 L 250,210 A 180,50 0 0,1 94,155 Z" fill="#6a9ac4"/>
            <!-- Segment 4: 15% lighter (306 to 360deg) -->
            <path d="M 250,160 L 94,155 A 180,50 0 0,1 250,80 Z" fill="#b0c8e0"/>
            <!-- Labels -->
            <text x="340" y="130" font-size="16" font-weight="700" fill="white">30%</text>
            <text x="360" y="175" font-size="16" font-weight="700" fill="white">30%</text>
            <text x="130" y="190" font-size="16" font-weight="700" fill="#555">25%</text>
            <text x="200" y="100" font-size="16" font-weight="700" fill="#555">15%</text>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>人力成本</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>制作成本</div>
          <div class="legend-item"><div class="legend-dot" style="background:#6a9ac4;"></div>设计费用</div>
          <div class="legend-item"><div class="legend-dot" style="background:#b0c8e0;"></div>其他物料</div>
        </div>
      </div>
      <div class="info-box">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="16" fill="#1a3a6b" opacity="0.15"/>
          <path d="M 18,4 A 14,14 0 0,1 32,18 L 18,18 Z" fill="#1a3a6b"/>
          <path d="M 18,4 A 14,14 0 0,0 4,18 L 18,18 Z" fill="#3a6abf"/>
        </svg>
        <span style="font-size:12px; color:#555;">我们对原始数据进行了清洗和整理，去除了缺失值和异常值，确保数据的准确性和可靠性。</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
