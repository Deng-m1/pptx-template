<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>slide_24</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:720px; overflow:hidden;
    font-family:'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif;
    background:#fff; }
  .slide { width:1280px; height:720px; background:#fff; padding:22px 50px 20px 50px; display:flex; flex-direction:column; }

  .header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:5px; }
  .header-title { font-size:34px; font-weight:900; color:#1a3a9e; }
  .header-sub { font-size:17px; font-weight:700; color:#3a6aaa; }
  .header-line { height:2px; background:#1a3a9e; margin-bottom:12px; }

  .gantt { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:18px; table-layout:fixed; }
  .gantt th {
    text-align:center; padding:10px 4px;
    font-size:14px; font-weight:700;
    border:1px solid #dde3ef;
  }
  .gantt th.label-col { width:130px; background:#1a3a9e; color:#fff; }
  .gantt th.day { background:#4a7ac8; color:#fff; }
  .gantt td {
    border:1px solid #e8ecf4;
    padding:6px 6px; height:60px;
    vertical-align:middle; text-align:center;
  }
  .gantt td.label {
    text-align:center; font-size:13px; color:#333;
    background:#eef2fa;
  }
  .gantt tr:nth-child(odd) td { background:#f5f7fc; }
  .gantt tr:nth-child(even) td { background:#fff; }
  .gantt tr:nth-child(odd) td.label { background:#eef2fa; }

  .bar {
    height:30px; border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:#fff;
    white-space:nowrap;
  }
  .bar-dark { background:#1a3a9e; }
  .bar-mid { background:#4a7ac8; }
  .bar-light { background:#a8c4e8; color:#1a3a9e; }
  .bar-gray { background:#8899aa; color:#fff; }

  .bottom-row { display:flex; gap:16px; flex:1; }
  .ring-card {
    flex:1; background:#fff; border-radius:10px;
    border:1px solid #e0e8f4;
    padding:16px 10px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .ring { position:relative; width:100px; height:100px; }
  .ring svg { transform:rotate(-90deg); }
  .ring-label {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:900; color:#1a3a9e;
  }
  .ring-name { font-size:12px; color:#555; text-align:center; }
</style>
</head>
