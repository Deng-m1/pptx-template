<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; padding: 14px 30px; gap: 14px; }
  .left-col { width: 400px; display: flex; flex-direction: column; gap: 12px; }
  .platform-card { border-radius: 4px; padding: 16px 20px; position: relative; }
  .platform-num { font-size: 36px; font-weight: 900; color: white; }
  .platform-name { font-size: 14px; color: white; margin: 4px 0; }
  .platform-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .platform-label { font-size: 12px; color: rgba(255,255,255,0.8); }
  .platform-pct { font-size: 14px; font-weight: 700; color: white; }
  .progress-bar { height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: rgba(255,255,255,0.9); }
  .badge { position: absolute; top: 14px; right: 16px; width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: white; }
  .right-col { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .desc-box { border: 1.5px solid #dde4f0; border-radius: 4px; padding: 16px 20px; }
  .desc-title { font-size: 18px; font-weight: 700; color: #1a3a6b; margin-bottom: 10px; }
  .desc-text { font-size: 12px; color: #555; line-height: 1.8; }
  .chart-box { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; }
  .chart-title { font-size: 14px; font-weight: 700; color: #1a3a6b; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">平台数据分析 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="left-col">
      <div class="platform-card" style="background:#1a3a6b;">
        <div class="badge">A</div>
        <div class="platform-num">5,630,000</div>
        <div class="platform-name">电商平台A</div>
        <div class="platform-row">
          <span class="platform-label">占总销售额</span>
          <span class="platform-pct">25%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:25%;"></div></div>
      </div>
      <div class="platform-card" style="background:#3a6abf;">
        <div class="badge">B</div>
        <div class="platform-num">5,630,000</div>
        <div class="platform-name">电商平台B</div>
        <div class="platform-row">
          <span class="platform-label">占总销售额</span>
          <span class="platform-pct">25%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:25%;"></div></div>
      </div>
      <div class="platform-card" style="background:#6a9ac4;">
        <div class="badge">C</div>
        <div class="platform-num">11,260,000</div>
        <div class="platform-name">电商平台C</div>
        <div class="platform-row">
          <span class="platform-label">占总销售额</span>
          <span class="platform-pct">50%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:50%;"></div></div>
      </div>
    </div>
    <div class="right-col">
      <div class="desc-box">
        <div class="desc-title">电商平台销售概述</div>
        <div class="desc-text">我们在主要电商平台（如京东、淘宝、天猫）的销售表现持续增长。截至目前，电商平台仍然是我们最主要的销售渠道之一，占据了总销售额的约70%。</div>
        <div class="desc-text" style="margin-top:8px;">在2023年上半年，我们通过电商平台实现了XX万元的销售额，同比增长了XX%。这一增长主要归因于我们在平台上的持续广告投放和促销活动，以及产品品质的保证。</div>
      </div>
      <div class="chart-box">
        <div class="chart-title">各季度销售额</div>
        <svg width="100%" height="100%" viewBox="0 0 720 260" preserveAspectRatio="xMidYMid meet">
          <!-- Y axis -->
          <line x1="40" y1="10" x2="40" y2="220" stroke="#eee" stroke-width="1"/>
          <line x1="40" y1="220" x2="710" y2="220" stroke="#eee" stroke-width="1"/>
          <!-- Dotted reference line -->
          <line x1="40" y1="100" x2="710" y2="100" stroke="#3a6abf" stroke-width="1" stroke-dasharray="4,4"/>
          <!-- Q1 bars -->
          <rect x="60" y="60" width="55" height="160" fill="#1a3a6b"/>
          <rect x="120" y="120" width="55" height="100" fill="#8ab0d0"/>
          <!-- Q2 bars -->
          <rect x="230" y="50" width="55" height="170" fill="#1a3a6b"/>
          <rect x="290" y="110" width="55" height="110" fill="#8ab0d0"/>
          <!-- Q3 bars -->
          <rect x="400" y="80" width="55" height="140" fill="#1a3a6b"/>
          <rect x="460" y="130" width="55" height="90" fill="#8ab0d0"/>
          <!-- Q4 bars -->
          <rect x="570" y="100" width="55" height="120" fill="#1a3a6b"/>
          <rect x="630" y="60" width="55" height="160" fill="#8ab0d0"/>
          <text x="107" y="238" font-size="11" fill="#555" text-anchor="middle">第一季度</text>
          <text x="277" y="238" font-size="11" fill="#555" text-anchor="middle">第二季度</text>
          <text x="447" y="238" font-size="11" fill="#555" text-anchor="middle">第三季度</text>
          <text x="617" y="238" font-size="11" fill="#555" text-anchor="middle">第四季度</text>
        </svg>
      </div>
    </div>
  </div>
</div>
</body>
</html>
