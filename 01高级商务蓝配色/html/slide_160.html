<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #edf1f7; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; position: relative; }
  .bubble-container { position: absolute; left: 152px; top: 145px; width: 978px; }
  .bubble {
    position: relative;
    background: #0c45a3;
    border-radius: 13px;
    min-height: 414px;
    padding: 56px 74px 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .bubble::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -37px;
    width: 40px;
    height: 37px;
    background: #0c45a3;
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }
  .thank-you { font-size: 114px; font-weight: 900; color: #ffffff; letter-spacing: 2px; line-height: 1; margin-top: 6px; }
  .desc { font-size: 15px; color: rgba(255,255,255,0.92); text-align: center; line-height: 1.9; width: 852px; margin-top: 30px; }
  .info { font-size: 20px; color: rgba(255,255,255,0.95); margin-top: 66px; }
</style>
</head>
<body>
<div class="slide">
  <div class="bubble-container">
    <div class="bubble">
      <div class="thank-you">THANK YOU</div>
      <div class="desc">Here you can describe the main work report content. Here you can describe the main work report content. Here you can<br>describe the main work report content. Here you can describe the main work report content.</div>
      <div class="info">汇报人：小序&nbsp;&nbsp;&nbsp;&nbsp;汇报时间：8888年88月88日</div>
    </div>
  </div>
</div>
</body>
</html>
