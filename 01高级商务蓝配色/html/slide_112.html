<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 14px 30px; gap: 12px; }
  .top-cards { display: flex; gap: 10px; height: 200px; }
  .card { flex: 1; padding: 20px; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-between; }
  .card-num { font-size: 44px; font-weight: 900; color: white; }
  .card-label { font-size: 16px; font-weight: 700; color: white; margin-bottom: 6px; }
  .card-desc { font-size: 11px; color: rgba(255,255,255,0.85); line-height: 1.6; }
  .bottom-row { flex: 1; display: flex; gap: 12px; }
  .donut-panel { width: 320px; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 14px; display: flex; flex-direction: column; }
  .chart-panel { flex: 1; border: 1.5px solid #dde4f0; border-radius: 4px; padding: 14px; display: flex; flex-direction: column; }
  .panel-title { font-size: 14px; color: #888; text-align: center; margin-bottom: 8px; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">数据分析 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="top-cards">
      <div class="card" style="background:#1a3a6b;">
        <div class="card-num">+55670</div>
        <div>
          <div class="card-label">项目成果A</div>
          <div class="card-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</div>
        </div>
      </div>
      <div class="card" style="background:#3a6abf;">
        <div class="card-num">+77670</div>
        <div>
          <div class="card-label">项目成果B</div>
          <div class="card-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</div>
        </div>
      </div>
      <div class="card" style="background:#6a9ac4;">
        <div class="card-num">+23670</div>
        <div>
          <div class="card-label">项目成果C</div>
          <div class="card-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</div>
        </div>
      </div>
      <div class="card" style="background:#9ab8d4;">

          <div class="card-label">项目成果D</div>
          <div class="card-desc">我们对原始数据进行了清洗和整理，去除了缺失值和异常值。</div>
        </div>
      </div>
    </div>
    <div class="bottom-row">
      <div class="donut-panel">
        <div class="panel-title">销售占比</div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center;">
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="75" fill="none" stroke="#e8edf5" stroke-width="28"/>
            <circle cx="100" cy="100" r="75" fill="none" stroke="#1a3a6b" stroke-width="28"
              stroke-dasharray="212 259" stroke-dashoffset="-118" stroke-linecap="butt"/>
            <circle cx="100" cy="100" r="75" fill="none" stroke="#3a6abf" stroke-width="28"
              stroke-dasharray="118 353" stroke-dashoffset="-330" stroke-linecap="butt"/>
            <circle cx="100" cy="100" r="75" fill="none" stroke="#8ab0d0" stroke-width="28"
              stroke-dasharray="71 400" stroke-dashoffset="-448" stroke-linecap="butt"/>
            <circle cx="100" cy="100" r="75" fill="none" stroke="#c0d4e8" stroke-width="28"
              stroke-dasharray="70 401" stroke-dashoffset="-519" stroke-linecap="butt"/>
            <text x="100" y="95" text-anchor="middle" font-size="16" font-weight="900" fill="#1a3a6b">销售</text>
            <text x="100" y="115" text-anchor="middle" font-size="16" font-weight="900" fill="#1a3a6b">占比</text>
          </svg>
        </div>
        <div class="legend">

          <div class="legend-item"><div class="legend-dot" style="background:#3a6abf;"></div>成果B</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8ab0d0;"></div>成果C</div>
          <div class="legend-item"><div class="legend-dot" style="background:#c0d4e8;"></div>成果D</div>
        </div>
      </div>

          <text x="798" y="245" font-size="10" fill="#555" text-anchor="middle">12月</text>
        </svg>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6b;"></div>项目成果A</div>

</div>
</body>
</html>
