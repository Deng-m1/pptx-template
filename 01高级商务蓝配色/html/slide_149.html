<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
  }
  .title {
    position: absolute;
    left: 48px;
    top: 28px;
    font-size: 27px;
    line-height: 1;
    font-weight: 900;
    color: #0f458f;
    letter-spacing: 0;
  }
  .subtitle {
    position: absolute;
    right: 48px;
    top: 46px;
    font-size: 18px;
    line-height: 1;
    font-style: italic;
    color: #113f83;
  }
  .top-line {
    position: absolute;
    left: 48px;
    top: 83px;
    width: 1184px;
    height: 2px;
    background: #1f5a96;
  }
  .side-box {
    position: absolute;
    left: 45px;
    top: 132px;
    width: 190px;
    height: 556px;
    border: 2px solid #1e5a97;
    background: #fff;
  }
  .side-box .big-text {
    position: absolute;
    left: 0;
    top: 226px;
    width: 100%;
    text-align: center;
    font-size: 33px;
    line-height: 1.55;
    color: #2b2b2b;
    font-weight: 500;
  }
  .left-panel {
    position: absolute;
    left: 250px;
    width: 188px;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .left-panel.top {
    top: 133px;
    height: 302px;
    background: #0f4697;
  }
  .left-panel.bottom {
    top: 453px;
    height: 235px;
    background: #3c3838;
  }
  .target-icon {
    width: 74px;
    height: 74px;
    margin-top: 64px;
    margin-bottom: 18px;
  }
  .left-panel.bottom .target-icon {
    margin-top: 58px;
  }
  .left-panel .label {
    font-size: 24px;
    line-height: 1;
    font-weight: 500;
    letter-spacing: 0;
  }
  .top-headers {
    position: absolute;
    left: 455px;
    top: 133px;
    display: flex;
    gap: 16px;
  }
  .header-cell {
    width: 182px;
    height: 53px;
    border: 1.8px solid #a9a9a9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #323232;
    background: #fff;
    font-weight: 500;
  }
  .header-cell.blue-dark {
    background: #13459b;
    color: #fff;
    border-color: #13459b;
  }
  .header-cell.blue-light {
    background: #5f8fd1;
    color: #fff;
    border-color: #5f8fd1;
  }
  .top-cards {
    position: absolute;
    left: 455px;
    top: 201px;
    display: flex;
    gap: 15px;
  }
  .top-card {
    position: relative;
    width: 183px;
    height: 233px;
    background: #fff;
    border: 1.8px solid #b8b8b8;
  }
  .top-card.emphasis {
    border-color: #6294d6;
  }
  .card-title {
    width: 100%;
    text-align: center;
    margin-top: 13px;
    font-size: 22px;
    color: #333;
    font-weight: 500;
  }
  .tri {
    width: 0;
    height: 0;
    margin: 14px auto 22px;
    border-left: 66px solid transparent;
    border-right: 66px solid transparent;
    border-top: 26px solid #6a9adb;
  }
  .card-list {
    width: 100%;
    text-align: center;
    font-size: 16px;
    line-height: 1.8;
    color: #333;
    font-weight: 400;
  }
  .mid-bars {
    position: absolute;
    left: 455px;
    top: 452px;
    display: flex;
    gap: 15px;
  }
  .mid-bar {
    width: 381px;
    height: 63px;
    background: #3d3838;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 25px;
    font-weight: 500;
  }
  .bottom-cards {
    position: absolute;
    left: 455px;
    top: 534px;
    display: flex;
    gap: 15px;
  }
  .bottom-card {
    width: 183px;
    height: 154px;
    background: #fff;
    border: 1.8px solid #c7c7c7;
    text-align: center;
  }
  .bottom-card.emphasis {
    border-color: #6e9ad4;
  }
  .bottom-title {
    margin-top: 26px;
    font-size: 22px;
    color: #333;
    font-weight: 500;
  }
  .bottom-list {
    margin-top: 12px;
    font-size: 16px;
    line-height: 1.85;
    color: #333;
  }
</style>
</head>

    <div class="top-card">

    </div>
    <div class="top-card">

      <div class="tri"></div>
      <div class="card-list">·品牌效益<br>·品牌效益<br>·品牌效益</div>

  <div class="mid-bars">

  <div class="bottom-cards">

    </div>
    <div class="bottom-card emphasis">
      <div class="bottom-title">满意度</div>
      <div class="bottom-list">·品牌效益<br>·品牌效益</div>
    </div>
    <div class="bottom-card">
      <div class="bottom-title">满意度</div>
      <div class="bottom-list">·品牌效益<br>·品牌效益</div>
    </div>
  </div>
</div>
</body>
</html>
