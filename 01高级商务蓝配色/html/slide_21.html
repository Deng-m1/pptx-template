<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>slide_21</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:720px; overflow:hidden;
    font-family:'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif;
    background:#fff; }
  .slide {
    width:1280px; height:720px; background:#fff;
    padding:22px 50px 20px 50px;
    display:flex; flex-direction:column;
  }
  .header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:6px; }
  .header-title { font-size:32px; font-weight:900; color:#1a3a9e; }
  .header-sub { font-size:16px; font-weight:700; color:#3a6aaa; font-style:italic; }
  .header-line { height:2px; background:#1a3a9e; margin-bottom:12px; }

  .gantt-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; }

  /* 表头 */
  .gantt-head { display:flex; height:36px; }
  .gantt-head .col-group { width:52px; flex-shrink:0; }
  .gantt-head .col-task { width:130px; flex-shrink:0; }
  .gantt-head .col-q {
    flex:1; display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; border:1px solid #c8d4e8;
  }
  .gantt-head .col-q1 { background:#c8d8f0; color:#1a3a9e; }
  .gantt-head .col-q2 { background:#a0bce0; color:#1a3a9e; }
  .gantt-head .col-q3 { background:#7a9fd0; color:#fff; }
  .gantt-head .col-q4 { background:#8a9ab0; color:#fff; }

  /* 分组容器 */
  .group-wrap { flex:1; display:flex; flex-direction:column; }
  .group-row { flex:1; display:flex; }
  .group-spacer { height:8px; }

  /* 分组标签 */
  .cell-group {
    width:52px; flex-shrink:0;
    background:#1a3a9e; color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700;
    writing-mode:vertical-rl; text-orientation:mixed;
    letter-spacing:4px; border:1px solid #fff;
  }

  /* 任务行 */
  .task-rows { flex:1; display:flex; flex-direction:column; }
  .task-row { flex:1; display:flex; border-bottom:1px solid #d4dcee; }
  .task-row:last-child { border-bottom:none; }

  .cell-task {
    width:130px; flex-shrink:0;
    font-size:13px; font-weight:700; color:#1a3a9e;
    background:#eef2fa; padding-left:12px;
    display:flex; align-items:center;
    border-right:2px solid #1a3a9e;
    border-left:1px solid #d4dcee;
  }
  .task-row:nth-child(even) .cell-task { background:#e6ecf7; }

  .cell-bar {
    flex:1; position:relative;
    border-right:1px solid #d4dcee;
    background:#f5f8fc;
  }
  .task-row:nth-child(even) .cell-bar { background:#fff; }

  /* 进度条 */
  .bar {
    position:absolute; top:50%; transform:translateY(-50%);
    height:22px; border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#fff;
    white-space:nowrap; overflow:hidden; padding:0 8px;
  }
  .bar-dark { background:#1a3a9e; }
  .bar-mid { background:#4a7ac8; }
  .bar-light { background:#b8cde8; color:#1a3a9e; }
  .dot {
    position:absolute; top:50%; transform:translateY(-50%);
    width:10px; height:22px; border-radius:5px; background:#1a3a9e;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="header-title">工作汇报-甘特图 Powerpoint Template</div>
    <div class="header-sub">Work Arrangement</div>
  </div>
  <div class="header-line"></div>

  <div class="gantt-wrap">
    <!-- 表头 -->

    <!-- 分组内容 -->
    <div class="group-wrap">

      <!-- 公司项目A -->
      <div class="group-row">

        <div class="task-rows">

            </div>
            <div class="cell-bar"></div>

              <div class="bar bar-dark" style="left:4%;width:55%;">重点工作任务</div>
            </div>
            <div class="cell-bar">
              <div class="bar bar-dark" style="left:8%;width:28%;"></div>
            </div>
          </div>
          <div class="task-row">
            <div class="cell-task">工作任务 02</div>
            <div class="cell-bar">
              <div class="dot" style="left:52%;"></div>
              <div class="dot" style="left:65%;"></div>
              <div class="bar bar-dark" style="left:72%;width:22%;"></div>
            </div>
            <div class="cell-bar">
              <div class="bar bar-mid" style="left:8%;width:58%;">重点工作任务</div>
              <div class="dot" style="left:70%;"></div>
            </div>
            <div class="cell-bar"></div>
            <div class="cell-bar"></div>
          </div>
          <div class="task-row">
            <div class="cell-task">工作任务 03</div>
            <div class="cell-bar"></div>
            <div class="cell-bar">
              <div class="dot" style="left:38%;"></div>
              <div class="bar bar-dark" style="left:52%;width:22%;"></div>
            </div>
            <div class="cell-bar"></div>
            <div class="cell-bar">
              <div class="bar bar-dark" style="left:4%;width:82%;">重点工作任务</div>
            </div>
          </div>
        </div>
      </div>

      <div class="group-spacer"></div>

      <!-- 公司项目B -->
      <div class="group-row">
        <div class="cell-group">公司项目B</div>
        <div class="task-rows">
          <div class="task-row">
            <div class="cell-task">工作任务 01</div>
            <div class="cell-bar">
              <div class="bar bar-dark" style="left:2%;width:86%;">重点工作任务以及阶段目标</div>
            </div>
            <div class="cell-bar"></div>
            <div class="cell-bar">
              <div class="bar bar-dark" style="left:4%;width:55%;">重点工作任务</div>
            </div>
            <div class="cell-bar">
              <div class="bar bar-light" style="left:8%;width:28%;"></div>
            </div>
          </div>
          <div class="task-row">
            <div class="cell-task">工作任务 02</div>
            <div class="cell-bar">
              <div class="bar bar-light" style="left:52%;width:30%;"></div>
            </div>
            <div class="cell-bar">
              <div class="bar bar-mid" style="left:4%;width:65%;">重点工作任务以及阶段目标</div>
              <div class="dot" style="left:72%;"></div>
            </div>
            <div class="cell-bar"></div>
            <div class="cell-bar"></div>
          </div>
          <div class="task-row">
            <div class="cell-task">工作任务 03</div>
            <div class="cell-bar">
              <div class="dot" style="left:48%;"></div>
            </div>
            <div class="cell-bar">
              <div class="bar bar-light" style="left:32%;width:22%;"></div>
            </div>
            <div class="cell-bar"></div>
            <div class="cell-bar">
              <div class="bar bar-dark" style="left:4%;width:82%;">重点工作任务</div>
            </div>
          </div>
        </div>
      </div>

      <div class="group-spacer"></div>

      <!-- 公司项目C -->
      <div class="group-row">
        <div class="cell-group">公司项目C</div>
        <div class="task-rows">
          <div class="task-row">
            <div class="cell-task">工作任务 01</div>
            <div class="cell-bar">
              <div class="bar bar-dark" style="left:2%;width:86%;">重点工作任务以及阶段目标</div>
            </div>
            <div class="cell-bar"></div>
            <div class="cell-bar">
              <div class="bar bar-dark" style="left:4%;width:55%;">重点工作任务</div>
            </div>
            <div class="cell-bar">
              <div class="bar bar-light" style="left:8%;width:26%;"></div>
            </div>
          </div>
          <div class="task-row">
            <div class="cell-task">工作任务 02</div>
            <div class="cell-bar">
              <div class="bar bar-light" style="left:52%;width:28%;"></div>
            </div>
            <div class="cell-bar">
              <div class="bar bar-mid" style="left:4%;width:68%;"></div>
              <div class="dot" style="left:75%;"></div>
            </div>
            <div class="cell-bar"></div>
            <div class="cell-bar"></div>
          </div>
          <div class="task-row">
            <div class="cell-task">工作任务 03</div>
            <div class="cell-bar">
              <div class="dot" style="left:48%;"></div>
            </div>
            <div class="cell-bar">
              <div class="dot" style="left:8%;"></div>
              <div class="bar bar-light" style="left:22%;width:22%;"></div>
            </div>
            <div class="cell-bar">
              <div class="bar bar-dark" style="left:4%;width:55%;">重点工作任务</div>
            </div>
            <div class="cell-bar">
              <div class="bar bar-dark" style="left:4%;width:82%;">重点工作任务</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
