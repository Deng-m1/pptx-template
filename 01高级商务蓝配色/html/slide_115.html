<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; padding: 14px 30px; gap: 12px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .col-header { padding: 12px 16px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
  .col-title { font-size: 18px; font-weight: 700; color: white; }
  .col-icon { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .chart-area { border: 1.5px solid #dde4f0; border-radius: 4px; padding: 10px; flex: 1; display: flex; flex-direction: column; }
  .chart-y-label { font-size: 10px; color: #888; }
  .sales-table { border: 1.5px solid #dde4f0; border-radius: 4px; overflow: hidden; }
  .table-header { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .table-title { font-size: 14px; font-weight: 700; color: white; }
  .table-icon { font-size: 16px; }
  .table-row { padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; }
  .row-label { font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; }
  .row-arrow { color: #1a3a6b; font-size: 10px; }
  .row-num { font-size: 16px; font-weight: 700; color: #1a3a6b; }
</style>
</head>
