<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #fff;
  }
  .header-title {
    position: absolute;
    left: 48px;
    top: 30px;
    font-size: 31px;
    line-height: 1;
    font-weight: 900;
    color: #0f458e;
  }
  .header-sub {
    position: absolute;
    right: 48px;
    top: 49px;
    font-size: 19px;
    line-height: 1;
    font-style: italic;
    color: #123f82;
  }
  .top-line {
    position: absolute;
    left: 48px;
    top: 83px;
    width: 1184px;
    height: 2px;
    background: #1b5996;
  }

  .label {
    position: absolute;
    left: 48px;
    width: 86px;
    background: #0f47a1;
    color: #fff;
    font-size: 26px;
    line-height: 1.22;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 1px;
  }
  .l1 { top: 128px; height: 174px; }
  .l2 { top: 319px; height: 106px; }
  .l3 { top: 442px; height: 106px; }
  .l4 { top: 565px; height: 106px; }

  .phase-pill {
    position: absolute;
    top: 128px;
    height: 62px;
    border-radius: 31px;
    background: #bfd3ee;
    color: #ffffff;
    font-size: 24px;
    font-weight: 500;
    line-height: 62px;
    text-align: center;
  }
  .p1 { left: 149px; width: 374px; }
  .p2 { left: 532px; width: 343px; }
  .p3 { left: 884px; width: 349px; }

  .timeline {
    position: absolute;
    left: 193px;
    top: 214px;
    width: 1038px;
    height: 4px;
    background: #1f5f9d;
  }
  .timeline::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -4px;
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 11px solid #1f5f9d;
  }

  .week-pill {
    position: absolute;
    top: 238px;
    width: 164px;
    height: 63px;
    border-radius: 31px;
    background: #0f47a1;
    color: #ffffff;
    font-size: 24px;
    font-weight: 500;
    line-height: 63px;
    text-align: center;
  }
  .w1 { left: 180px; }
  .w2 { left: 354px; }
  .w3 { left: 529px; }
  .w4 { left: 709px; }
  .w5 { left: 886px; }
  .w6 { left: 1068px; }

  .row-bg {
    position: absolute;
    left: 182px;
    width: 1050px;
  }
  .dept-bg {
    top: 319px;
    height: 106px;
    background: #f6f6f6;
  }
  .task-bg {
    top: 442px;
    height: 106px;
    background: #b8cde7;
  }

  .box {
    position: absolute;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .dept-box {
    width: 126px;
    height: 90px;
    background: #c1d6ee;
    color: #3d3d3d;
    font-size: 16px;
    line-height: 1.28;
  }
  .d1 { left: 200px; top: 328px; }
  .d2 { left: 552px; top: 328px; }
  .d3 { left: 731px; top: 328px; }
  .d4 { left: 1084px; top: 328px; }

  .task-box {
    height: 88px;
    background: #8db2d5;
    color: #2f2f2f;
    font-size: 18px;
    line-height: 1.28;
  }
  .t1 { left: 200px; top: 452px; width: 125px; }
  .t2 { left: 375px; top: 452px; width: 302px; }
  .t3 { left: 906px; top: 452px; width: 126px; }

  .key-box {
    width: 125px;
    height: 90px;
    background: #c1d6ee;
    color: #2f2f2f;
    font-size: 18px;
    line-height: 1.28;
  }
  .k1 { left: 200px; top: 574px; }
  .k2 { left: 730px; top: 574px; }
  .k3 { left: 1084px; top: 574px; }
</style>
</head>
<body>
<div class="slide">
  <div class="header-title">工作汇报 Powerpoint Template</div>
  <div class="header-sub">Work Arrangement</div>
  <div class="top-line"></div>

  <div class="label l1">时间<br>节点</div>
  <div class="label l2">协助<br>部门</div>
  <div class="label l3">工作<br>任务</div>
  <div class="label l4">重点<br>任务</div>

  <div class="phase-pill p1">第一阶段任务：前期</div>
  <div class="phase-pill p2">第二阶段任务：中期</div>
  <div class="phase-pill p3">第三阶段任务：后期</div>

  <div class="timeline"></div>

  <div class="week-pill w1">第一周</div>
  <div class="week-pill w2">第二周</div>
  <div class="week-pill w3">第三周</div>
  <div class="week-pill w4">第四周</div>
  <div class="week-pill w5">第五周</div>
  <div class="week-pill w6">第六周</div>

  <div class="row-bg dept-bg"></div>
  <div class="row-bg task-bg"></div>

  <div class="box dept-box d1">设计部<br>策划部</div>
  <div class="box dept-box d2">采购部<br>商务部</div>
  <div class="box dept-box d3">设计部<br>策划部</div>
  <div class="box dept-box d4">工程部<br>财务部</div>

  <div class="box task-box t1">工作任务1<br>工作任务2</div>
  <div class="box task-box t2">工作任务1<br>工作任务2</div>
  <div class="box task-box t3">工作任务1<br>工作任务2</div>

  <div class="box key-box k1">重点任务1<br>重点任务2</div>
  <div class="box key-box k2">重点任务1<br>重点任务2</div>
  <div class="box key-box k3">重点任务1<br>重点任务2</div>
</div>
</body>
</html>
