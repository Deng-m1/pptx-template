<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; background: #fff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  .slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
  .header { height: 65px; padding: 10px 40px; border-bottom: 2px solid #1a3a6b; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 32px; font-weight: 900; color: #1a3a6b; }
  .header-sub { font-size: 20px; color: #1a3a6b; font-style: italic; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 16px 30px; gap: 0; }
  .gantt { width: 100%; flex: 1; display: flex; flex-direction: column; }
  .gantt-row { display: flex; align-items: stretch; border-bottom: 1px solid #e8edf5; min-height: 80px; }
  .gantt-row:last-child { border-bottom: none; }
  .row-label { width: 90px; background: #1a3a6b; color: white; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.4; flex-shrink: 0; }
  .row-content { flex: 1; display: flex; align-items: center; padding: 8px 10px; gap: 6px; }
  /* Phase row */
  .phase-row .row-content { gap: 0; }
  .phase-pill { flex: 1; background: #c0d4e8; border-radius: 20px; padding: 8px 16px; text-align: center; font-size: 14px; color: #1a3a6b; margin: 0 4px; }
  .phase-pill:first-child { margin-left: 0; }
  .phase-pill:last-child { margin-right: 0; }
  /* Timeline row */
  .timeline-row .row-content { position: relative; }
  .timeline-line { position: absolute; top: 50%; left: 10px; right: 10px; height: 2px; background: #1a3a6b; }
  .timeline-arrow { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid #1a3a6b; }
  .week-pills { display: flex; gap: 6px; width: 100%; justify-content: space-around; position: relative; z-index: 1; }
  .week-pill { background: #1a3a6b; color: white; border-radius: 20px; padding: 8px 20px; font-size: 14px; font-weight: 700; }
  /* Dept row */
  .dept-cell { flex: 1; display: flex; align-items: center; justify-content: center; }
  .dept-box { background: #e8edf5; border-radius: 4px; padding: 6px 12px; font-size: 12px; color: #555; text-align: center; line-height: 1.5; }
  /* Task row */
  .task-cell { flex: 1; display: flex; align-items: center; justify-content: center; }
  .task-block { background: #3a6abf; border-radius: 4px; padding: 8px 12px; font-size: 12px; color: white; line-height: 1.5; width: 90%; }
  .task-block.wide { width: 190%; }
  .task-block.light { background: #8ab0d0; }
  /* Key task row */
  .key-cell { flex: 1; display: flex; align-items: center; justify-content: center; }
  .key-block { background: #c0d4e8; border-radius: 4px; padding: 8px 12px; font-size: 12px; color: #1a3a6b; line-height: 1.5; width: 90%; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="header-title">工作汇报 Powerpoint Template</span>
    <span class="header-sub">Work Arrangement</span>
  </div>
  <div class="body">
    <div class="gantt">
      <!-- Phase row -->
      <div class="gantt-row phase-row" style="min-height:50px;">
        <div class="row-label" style="background:#1a3a6b;font-size:14px;">时间<br>节点</div>
        <div class="row-content" style="flex-direction:column; gap:6px;">
          <div style="display:flex; gap:6px; width:100%;">
            <div class="phase-pill">第一阶段任务：前期</div>
            <div class="phase-pill">第二阶段任务：中期</div>
            <div class="phase-pill">第三阶段任务：后期</div>
          </div>
          <div style="position:relative; width:100%; height:36px;">
            <div style="position:absolute; top:50%; left:0; right:0; height:2px; background:#1a3a6b;"></div>
            <div style="position:absolute; right:-2px; top:50%; transform:translateY(-50%); width:0; height:0; border-top:6px solid transparent; border-bottom:6px solid transparent; border-left:10px solid #1a3a6b;"></div>
            <div style="display:flex; justify-content:space-around; position:relative; z-index:1;">
              <div class="week-pill">第一周</div>
              <div class="week-pill">第二周</div>
              <div class="week-pill">第三周</div>
              <div class="week-pill">第四周</div>
              <div class="week-pill">第五周</div>
              <div class="week-pill">第六周</div>
            </div>
          </div>
        </div>
      </div>
      <!-- Dept row -->
      <div class="gantt-row" style="min-height:70px;">
        <div class="row-label">协助<br>部门</div>
        <div class="row-content">
          <div class="dept-cell">
            <div class="dept-box">设计部<br>策划部</div>
          </div>
          <div class="dept-cell"></div>
          <div class="dept-cell">
            <div class="dept-box">采购部<br>商务部</div>
          </div>
          <div class="dept-cell">
            <div class="dept-box">设计部<br>策划部</div>
          </div>
          <div class="dept-cell"></div>
          <div class="dept-cell">
            <div class="dept-box">工程部<br>财务部</div>
          </div>
        </div>
      </div>
      <!-- Task row -->
      <div class="gantt-row" style="min-height:80px;">
        <div class="row-label">工作<br>任务</div>
        <div class="row-content">
          <div class="task-cell">
            <div class="task-block">工作任务1<br>工作任务2</div>
          </div>
          <div class="task-cell" style="flex:2;">
            <div class="task-block" style="width:95%; background:#3a6abf;">工作任务1<br>工作任务2</div>
          </div>
          <div class="task-cell"></div>
          <div class="task-cell">
            <div class="task-block light">工作任务1<br>工作任务2</div>
          </div>
          <div class="task-cell"></div>
        </div>
      </div>
      <!-- Key task row -->
      <div class="gantt-row" style="min-height:80px;">
        <div class="row-label">重点<br>任务</div>
        <div class="row-content">
          <div class="key-cell">
            <div class="key-block">重点任务1<br>重点任务2</div>
          </div>
          <div class="key-cell"></div>
          <div class="key-cell"></div>
          <div class="key-cell">
            <div class="key-block">重点任务1<br>重点任务2</div>
          </div>
          <div class="key-cell"></div>
          <div class="key-cell">
            <div class="key-block">重点任务1<br>重点任务2</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
