<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Perfume Luxury Brand - Slide 33</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Calibri', 'Arial', sans-serif;
    background-color: #0D1B3E;
    color: #ffffff;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .page-title {
    font-size: 34px;
    font-weight: 400;
    color: #ffffff;
    text-align: center;
    margin-bottom: 20px;
  }
  .subtitle {
    font-size: 15px;
    color: #ccd6f0;
    text-align: center;
    margin-bottom: 32px;
  }
  .font-item {
    text-align: center;
    margin-bottom: 16px;
  }
  .font-name {
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 4px;
  }
  .font-link {
    font-size: 13px;
    color: #7EC8E3;
    text-decoration: underline;
  }
  .color-swatches {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 32px;
  }
  .swatch {
    width: 100px;
    height: 100px;
    border-radius: 8px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 10px;
  }
  .swatch-label {
    font-size: 13px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="page-title">Fonts &amp; colors used</div>
  <div class="subtitle">This presentation has been made using the following fonts:</div>

  <div class="font-item">
    <div class="font-name">Bodoni Moda</div>
    <div class="font-link">(https://fonts.google.com/specimen/Bodoni+Moda)</div>
  </div>
  <div class="font-item">
    <div class="font-name">Belleza</div>
    <div class="font-link">(https://fonts.google.com/specimen/Belleza)</div>
  </div>

  <div class="color-swatches">
    <div class="swatch" style="background:#f3eae0;">
      <span class="swatch-label" style="color:#333;">#f3eae0</span>
    </div>
    <div class="swatch" style="background:#111111; border:1px solid #444;">
      <span class="swatch-label" style="color:#fff;">#ffffff</span>
    </div>
    <div class="swatch" style="background:#9e5921;">
      <span class="swatch-label" style="color:#fff;">#9e5921</span>
    </div>
  </div>
</body>
</html>
