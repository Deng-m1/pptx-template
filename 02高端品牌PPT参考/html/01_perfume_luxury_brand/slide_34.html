<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Perfume Luxury Brand - Slide 34</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Calibri', 'Arial', sans-serif;
    background-color: #0D1B3E;
    color: #ffffff;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 80px 40px;

  .page-title {
    font-size: 34px;
    font-weight: 400;
    color: #ffffff;
    text-align: center;
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 14px;
    color: #ccd6f0;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 40px;
    max-width: 800px;
  }
  .subtitle a { color: #7EC8E3; text-decoration: underline; }
  .storyset-row {
    display: flex;
    gap: 32px;
    justify-content: center;
    align-items: flex-end;
  }
  .storyset-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .storyset-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .storyset-label {
    font-size: 15px;
    color: #ccd6f0;
    text-align: center;

</style>
</head>
