<!DOCTYPE html>

<style>

  /* 左侧拱形 */

    transform: translateY(-50%);

    height: 520px;
  }
  .arch-border { position: absolute; inset: 0; z-index: 2; }

  }
  .arch-bg {

    align-items: center;
    justify-content: center;
    position: relative;
  }
  .arch-label {

  /* 右侧引言区 */
  .right-quote {

    left: 480px;
    right: 72px;
    top: 50%;
    transform: translateY(-50%);

  .quote-text {

</html>
