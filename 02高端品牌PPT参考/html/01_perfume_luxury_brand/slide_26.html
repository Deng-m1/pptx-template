<!DOCTYPE html>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

  .arch-bg {
    width: 100%;

  }
  .arch-label {

    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: #3A2E22;

  }
  /* 右侧内容 */
  .right-content {

  .page-title {

    font-size: 30px;

    margin-bottom: 6px;

  .member-desc {

    color: #4A3C2C;
    line-height: 1.5;
  }
</style>
