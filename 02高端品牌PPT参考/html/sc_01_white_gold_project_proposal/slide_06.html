<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>sc_01 slide_06</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #efefef;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
    }
    body { position: relative; }
    .slide {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #efefef;
    }
    .header {
      position: absolute;
      right: 28px;
      top: 10px;
      font-size: 13px;
      color: #111;
      letter-spacing: 0.38px;
      text-transform: uppercase;
      z-index: 5;
    }
    .photo-top {
      position: absolute;
      left: 0;
      top: 0;
      width: 656px;
      height: 136px;
      border-right: 2px solid #d7c27a;
      border-bottom: 2px solid #d7c27a;
      overflow: hidden;
      background-image: url('../../slides/sc_01_white_gold_project_proposal/slide_06.jpg');
      background-repeat: no-repeat;
      background-size: 1280px 720px;
      background-position: 0 0;
    }
    .photo-bottom {
      position: absolute;
      right: 0;
      bottom: 39px;
      width: 800px;
      height: 208px;
      border-left: 2px solid #d7c27a;
      border-top: 2px solid #d7c27a;
      overflow: hidden;
      background-image: url('../../slides/sc_01_white_gold_project_proposal/slide_06.jpg');
      background-repeat: no-repeat;
      background-size: 1280px 720px;
      background-position: -480px -473px;
    }
    .corner-top-right {
      position: absolute;
      right: -8px;
      top: -2px;
      width: 360px;
      height: 98px;
      opacity: 0.90;
      background: repeating-radial-gradient(circle at 88% 6%, rgba(235,171,49,0.88) 0 8px, rgba(245,209,124,0.80) 8px 16px, rgba(253,248,237,0.84) 16px 21px, rgba(201,158,70,0.68) 21px 25px, rgba(255,255,255,0) 25px 33px);
      clip-path: polygon(6% 44%, 16% 30%, 32% 20%, 49% 18%, 67% 14%, 83% 7%, 100% 0, 100% 86%, 84% 82%, 68% 80%, 50% 79%, 32% 70%, 17% 58%);
    }
    .corner-bottom-left {
      position: absolute;
      left: -8px;
      bottom: 25px;
      width: 274px;
      height: 150px;
      opacity: 0.90;
      background: repeating-radial-gradient(circle at 6% 96%, rgba(235,171,49,0.90) 0 8px, rgba(245,209,124,0.82) 8px 16px, rgba(253,248,237,0.84) 16px 21px, rgba(201,158,70,0.70) 21px 25px, rgba(255,255,255,0) 25px 33px);
      clip-path: polygon(0 100%, 0 45%, 8% 34%, 19% 27%, 34% 22%, 49% 20%, 63% 14%, 77% 8%, 90% 4%, 100% 0, 100% 100%);
    }
    .title {
      position: absolute;
      left: 68px;
      top: 202px;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', Arial, sans-serif;
      font-size: 72px;
      line-height: 0.95;
      color: #050505;
      text-transform: uppercase;
      transform: scaleX(0.79);
      transform-origin: left top;
      white-space: nowrap;
      z-index: 3;
    }
    .title .dot { color: #f1c530; }
    .section {
      position: absolute;
      z-index: 3;
    }
    .section h2 {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', Arial, sans-serif;
      font-size: 29px;
      line-height: 1;
      text-transform: uppercase;
      transform: scaleX(0.82);
      transform-origin: left center;
      margin-bottom: 28px;
      white-space: nowrap;
    }
    .section p {
      width: 238px;
      font-size: 17px;
      line-height: 1.42;
      color: #171717;
    }
    .who {
      left: 68px;
      top: 300px;
    }
    .what {
      left: 640px;
      top: 300px;
    }
    .footer-line {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 35px;
      height: 2px;
      background: #111;
      z-index: 5;
    }
    .footer-left,
    .footer-right {
      position: absolute;
      bottom: 11px;
      font-size: 13px;
      text-transform: uppercase;
      color: #111;
      z-index: 5;
    }
    .footer-left { left: 28px; }
    .footer-right { right: 28px; }
  </style>
</head>
<body>
  <main class="slide">
    <div class="photo-top"></div>
    <div class="photo-bottom"></div>
    <div class="corner-top-right"></div>
    <div class="corner-bottom-left"></div>
    <div class="header">WHITE &amp; GOLD PROJECT PROPOSAL</div>

    <h1 class="title">OUR COMPANY<span class="dot">.</span></h1>

    <section class="section who">
      <h2>WHO WE ARE?</h2>
      <p>Briefly elaborate on what you want to discuss.</p>
    </section>

    <section class="section what">
      <h2>WHAT WE DO?</h2>
      <p>Briefly elaborate on what you want to discuss.</p>
    </section>

    <div class="footer-line"></div>
    <div class="footer-left">PRESENTED BY JANE DOE</div>
    <div class="footer-right">11.07.2023</div>
  </main>
</body>
</html>
