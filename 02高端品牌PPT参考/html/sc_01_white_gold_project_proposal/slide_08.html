<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>sc_01 slide_08</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', Arial, sans-serif;
      background: #a67234;
    }
    body { position: relative; }
    .slide {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background:
        radial-gradient(54% 42% at 60% 58%, rgba(248,216,154,0.96) 0%, rgba(232,187,109,0.90) 24%, rgba(164,111,49,0.30) 52%, rgba(0,0,0,0) 76%),
        radial-gradient(62% 96% at 42% 16%, rgba(61,31,18,0.96) 0%, rgba(77,38,19,0.94) 31%, rgba(115,67,29,0.64) 53%, rgba(0,0,0,0) 75%),
        radial-gradient(35% 96% at -2% 16%, rgba(135,92,40,0.90) 0%, rgba(103,68,31,0.96) 42%, rgba(60,34,20,0.98) 66%, rgba(0,0,0,0) 81%),
        linear-gradient(90deg, rgba(150,104,45,0.98) 0%, rgba(195,144,74,0.94) 36%, rgba(112,69,33,0.98) 58%, rgba(196,143,71,0.92) 80%, rgba(159,112,51,0.96) 100%),
        linear-gradient(180deg, #aa7538 0%, #996a34 100%);
    }
    .curve-left {
      position: absolute;
      left: -166px;
      top: -84px;
      width: 482px;
      height: 964px;
      border-right: 2px solid rgba(255,245,224,0.55);
      border-radius: 0 100% 100% 0 / 0 68% 68% 0;
      background: linear-gradient(180deg, rgba(110,69,28,0.08) 0%, rgba(99,62,25,0.38) 34%, rgba(63,35,17,0.82) 70%, rgba(158,110,49,0.86) 100%);
      transform: rotate(8deg);
      z-index: 2;
    }
    .curve-left::before {
      content: "";
      position: absolute;
      right: -10px;
      top: 192px;
      width: 22px;
      height: 646px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,246,222,0.52) 22%, rgba(255,249,236,0.82) 50%, rgba(255,255,255,0.06) 100%);
      filter: blur(1.4px);
      opacity: 0.86;
    }
    .title {
      position: absolute;
      left: 67px;
      top: 270px;
      color: #fff;
      font-size: 88px;
      line-height: 0.95;
      text-transform: uppercase;
      transform: scaleX(0.79);
      transform-origin: left top;
      text-shadow: 0 3px 0 rgba(0,0,0,0.12), 0 0 10px rgba(255,255,255,0.04);
      z-index: 4;
      white-space: nowrap;
    }
    .header {
      position: absolute;
      right: 28px;
      top: 10px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.90);
      letter-spacing: 0.42px;
      text-transform: uppercase;
      z-index: 5;
    }
    .footer-line {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 35px;
      height: 2px;
      background: rgba(255,255,255,0.74);
      z-index: 5;
    }
    .footer-left,
    .footer-right {
      position: absolute;
      bottom: 11px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.94);
      text-transform: uppercase;
      z-index: 5;
    }
    .footer-left { left: 28px; }
    .footer-right { right: 28px; }
  </style>
</head>
<body>
  <main class="slide">
    <div class="curve-left"></div>
    <div class="header">WHITE &amp; GOLD PROJECT PROPOSAL</div>
    <h1 class="title">OUR PRODUCTS.</h1>
    <div class="footer-line"></div>
    <div class="footer-left">PRESENTED BY JANE DOE</div>
    <div class="footer-right">11.07.2023</div>
  </main>
</body>
</html>
