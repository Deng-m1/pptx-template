<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>sc_01 slide_04</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', Arial, sans-serif;
      background: #a16e34;
    }
    body { position: relative; }
    .slide {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background:
        radial-gradient(42% 56% at 53% 56%, rgba(55,25,12,0.97) 0%, rgba(67,31,15,0.95) 25%, rgba(94,52,22,0.72) 40%, rgba(145,91,38,0.14) 61%, rgba(0,0,0,0) 70%),
        radial-gradient(26% 34% at 23% 25%, rgba(238,162,60,0.90) 0%, rgba(219,140,48,0.82) 42%, rgba(0,0,0,0) 74%),
        radial-gradient(24% 18% at 19% 80%, rgba(252,226,157,0.88) 0%, rgba(241,195,102,0.74) 28%, rgba(184,125,48,0.10) 60%, rgba(0,0,0,0) 72%),
        radial-gradient(24% 36% at 81% 50%, rgba(214,166,104,0.92) 0%, rgba(151,97,48,0.46) 46%, rgba(0,0,0,0) 76%),
        linear-gradient(90deg, rgba(158,96,38,0.96) 0%, rgba(178,118,53,0.94) 24%, rgba(104,64,32,0.98) 50%, rgba(181,126,58,0.94) 79%, rgba(164,113,52,0.96) 100%),
        linear-gradient(180deg, #b07b40 0%, #9b6d38 100%);
    }
    .slide::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(124deg, rgba(255,255,255,0) 0%, rgba(255,245,218,0.08) 28%, rgba(0,0,0,0) 46%, rgba(255,244,212,0.18) 70%, rgba(0,0,0,0) 100%),
        radial-gradient(62% 92% at 53% 54%, rgba(0,0,0,0) 0%, rgba(26,11,5,0.12) 48%, rgba(0,0,0,0) 65%);
      mix-blend-mode: screen;
      pointer-events: none;
    }
    .fold-right {
      position: absolute;
      right: -30px;
      bottom: -16px;
      width: 360px;
      height: 460px;
      border-left: 3px solid rgba(255,246,226,0.82);
      border-radius: 88% 0 0 0 / 96% 0 0 0;
      background: linear-gradient(180deg, rgba(94,53,20,0.08) 0%, rgba(74,41,16,0.48) 42%, rgba(200,149,76,0.90) 100%);
      transform: rotate(2deg);
      z-index: 2;
    }
    .fold-right::before {
      content: "";
      position: absolute;
      left: -14px;
      top: 10px;
      width: 30px;
      height: 392px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,246,222,0.86) 24%, rgba(255,249,238,0.94) 50%, rgba(255,255,255,0.10) 100%);
      filter: blur(1px);
      opacity: 0.95;
    }
    .title {
      position: absolute;
      left: 306px;
      top: 268px;
      color: #fff;
      font-size: 94px;
      line-height: 0.95;
      text-transform: uppercase;
      transform: scaleX(0.81);
      transform-origin: left top;
      text-shadow: 0 3px 0 rgba(0,0,0,0.10), 0 0 12px rgba(255,255,255,0.05);
      z-index: 4;
    }
    .header {
      position: absolute;
      right: 34px;
      top: 10px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      letter-spacing: 0.45px;
      color: rgba(255,255,255,0.92);
      text-transform: uppercase;
      z-index: 5;
    }
    .footer-line {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 28px;
      height: 2px;
      background: rgba(255,255,255,0.74);
      z-index: 5;
    }
    .footer-left,
    .footer-right {
      position: absolute;
      bottom: 9px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.94);
      text-transform: uppercase;
      z-index: 5;
    }
    .footer-left { left: 28px; }
    .footer-right { right: 28px; }
  </style>
</head>
<body>
  <main class="slide">
    <div class="fold-right"></div>
    <div class="header">WHITE &amp; GOLD PROJECT PROPOSAL</div>
    <h1 class="title">INTRODUCTION.</h1>
    <div class="footer-line"></div>
    <div class="footer-left">PRESENTED BY JANE DOE</div>
    <div class="footer-right">11.07.2023</div>
  </main>
</body>
</html>
