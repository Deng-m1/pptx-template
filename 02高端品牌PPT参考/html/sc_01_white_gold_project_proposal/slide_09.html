<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>sc_01 slide_09</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #efefef;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
    }
    body { position: relative; }
    .slide {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #efefef;
    }
    .corner-top-left {
      position: absolute;
      left: -6px;
      top: -2px;
      width: 198px;
      height: 144px;
      opacity: 0.88;
      background: repeating-radial-gradient(circle at 2% 0%, rgba(235,171,49,0.88) 0 8px, rgba(245,209,124,0.80) 8px 16px, rgba(253,248,237,0.84) 16px 21px, rgba(201,158,70,0.68) 21px 25px, rgba(255,255,255,0) 25px 33px);
      clip-path: polygon(0 0, 100% 0, 86% 9%, 72% 16%, 60% 24%, 45% 31%, 31% 38%, 17% 44%, 7% 49%, 0 53%);
      z-index: 2;
    }
    .header {
      position: absolute;
      right: 28px;
      top: 10px;
      font-size: 13px;
      color: #111;
      letter-spacing: 0.38px;
      text-transform: uppercase;
      z-index: 6;
    }
    .title {
      position: absolute;
      left: 68px;
      top: 80px;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', Arial, sans-serif;
      font-size: 69px;
      line-height: 0.95;
      color: #050505;
      text-transform: uppercase;
      transform: scaleX(0.78);
      transform-origin: left top;
      white-space: nowrap;
      z-index: 4;
    }
    .title .dot { color: #f1c530; }
    .title-line {
      position: absolute;
      left: 32px;
      top: 152px;
      width: 388px;
      height: 2px;
      background: #111;
      z-index: 4;
    }
    .photo-right {
      position: absolute;
      right: 0;
      top: 22px;
      width: 505px;
      height: 682px;
      border-left: 2px solid #d7c27a;
      border-top: 2px solid #d7c27a;
      border-bottom: 2px solid #d7c27a;
      background-image: url('../../slides/sc_01_white_gold_project_proposal/slide_09.jpg');
      background-repeat: no-repeat;
      background-size: 1280px 720px;
      background-position: -775px -22px;
      z-index: 1;
    }
    .service-grid {
      position: absolute;
      left: 68px;
      top: 278px;
      width: 610px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      row-gap: 102px;
      column-gap: 86px;
      z-index: 4;
    }
    .service h2 {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', Arial, sans-serif;
      font-size: 29px;
      line-height: 1;
      text-transform: uppercase;
      transform: scaleX(0.80);
      transform-origin: left center;
      margin-bottom: 26px;
      white-space: nowrap;
    }
    .service p {
      width: 208px;
      font-size: 17px;
      line-height: 1.42;
      color: #181818;
    }
    .footer-line {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 35px;
      height: 2px;
      background: #111;
      z-index: 6;
    }
    .footer-left,
    .footer-right {
      position: absolute;
      bottom: 11px;
      font-size: 13px;
      text-transform: uppercase;
      color: #111;
      z-index: 6;
    }
    .footer-left { left: 28px; }
    .footer-right { right: 28px; }
  </style>
</head>
<body>
  <main class="slide">
    <div class="corner-top-left"></div>
    <div class="photo-right"></div>
    <div class="header">WHITE &amp; GOLD PROJECT PROPOSAL</div>

    <h1 class="title">OUR SERVICES<span class="dot">.</span></h1>
    <div class="title-line"></div>

    <section class="service-grid">
      <div class="service">
        <h2>SERVICE ONE</h2>
        <p>Elaborate on what you want to discuss.</p>
      </div>
      <div class="service">
        <h2>SERVICE TWO</h2>
        <p>Elaborate on what you want to discuss.</p>
      </div>
      <div class="service">
        <h2>SERVICE THREE</h2>
        <p>Elaborate on what you want to discuss.</p>
      </div>
      <div class="service">
        <h2>SERVICE FOUR</h2>
        <p>Elaborate on what you want to discuss.</p>
      </div>
    </section>

    <div class="footer-line"></div>
    <div class="footer-left">PRESENTED BY JANE DOE</div>
    <div class="footer-right">11.07.2023</div>
  </main>
</body>
</html>
