<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>sc_03 slide_01</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      font-family: Georgia, 'Times New Roman', serif;
      background: #3d220f;
    }
    body { position: relative; }
    .slide {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background-image: url('../../slides/sc_03_hotel_sales_strategy_mix/slide_01.jpg');
      background-repeat: no-repeat;
      background-size: 1280px 720px;
      background-position: center center;
    }
    .panel {
      position: absolute;
      left: 0;
      top: 114px;
      width: 734px;
      height: 442px;
      background: #1f4211;
      z-index: 2;
    }
    .badge {
      position: absolute;
      left: 28px;
      top: 32px;
      width: 198px;
      height: 148px;
      background: #d8b152;
      border: 2px solid #8f6f25;
      border-radius: 50% / 58%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6f4d10;
      z-index: 3;
    }
    .badge::before,
    .badge::after {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1.5px solid rgba(111,77,16,0.72);
      border-radius: 50% / 58%;
    }
    .badge::after {
      inset: 18px;
      border-width: 1px;
    }
    .badge .text {
      position: relative;
      text-align: center;
      font-size: 27px;
      font-style: italic;
      line-height: 1.1;
    }
    .title {
      position: absolute;
      left: 57px;
      top: 198px;
      width: 620px;
      font-size: 84px;
      line-height: 0.98;
      color: #f4ecdd;
      font-weight: 400;
      letter-spacing: -1.5px;
      z-index: 3;
    }
    .subtitle {
      position: absolute;
      left: 57px;
      top: 462px;
      font-size: 27px;
      line-height: 1.2;
      color: #f3ead7;
      z-index: 3;
    }
    .subtitle strong {
      font-weight: 700;
    }
    .bottom-line {
      position: absolute;
      left: 0;
      top: 546px;
      width: 734px;
      height: 9px;
      background: #d0a236;
      z-index: 3;
    }
  </style>
</head>
<body>
  <main class="slide">
    <div class="panel"></div>
    <div class="badge">
      <div class="text">Luxe Hotel</div>
    </div>
    <h1 class="title">Hotel Sales<br>Strategy Slides</h1>
    <div class="subtitle">Turning demand into <strong>high-value</strong> bookings</div>
    <div class="bottom-line"></div>
  </main>
</body>
</html>
