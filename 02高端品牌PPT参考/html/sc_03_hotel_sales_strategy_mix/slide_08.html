<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>sc_03 slide_08</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #aa9b73;
      font-family: Georgia, 'Times New Roman', serif;
    }
    .slide {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #aa9b73;
    }
    .bg {
      position: absolute;
      inset: -40px;
      background-image: url('../../slides/sc_03_hotel_sales_strategy_mix/slide_08.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      filter: blur(18px) saturate(0.82) brightness(0.9);
      transform: scale(1.08);
      opacity: 0.95;
    }
    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(158,141,93,0.32);
    }
    .poster {
      position: absolute;
      left: 392px;
      top: 28px;
      width: 496px;
      height: 664px;
      background-image: url('../../slides/sc_03_hotel_sales_strategy_mix/slide_08.jpg');
      background-size: 496px 664px;
      background-position: center center;
      background-repeat: no-repeat;
      box-shadow: 0 18px 40px rgba(0,0,0,0.16);
      border-radius: 16px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <main class="slide">
    <div class="bg"></div>
    <div class="poster" aria-label="Resource Page poster"></div>
  </main>
</body>
</html>
